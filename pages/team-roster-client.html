<div id="asg-client-roster"></div>

<style>
  #asg-client-roster{
    --bg:#f7f7f5;
    --surface:#ffffff;
    --text:#111111;
    --muted:rgba(17,17,17,.62);
    --line:rgba(17,17,17,.11);
    --line-strong:rgba(17,17,17,.2);
    --pill:#f2f2ef;
    --radius-shell:30px;
    --radius-card:26px;
    --shadow:0 10px 24px rgba(17,17,17,.05);
    font-family:"Outfit","Satoshi","Poppins",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    width:100%;
    margin:0 auto;
  }

  #asg-client-roster *{
    box-sizing:border-box;
  }

  .asg-roster-shell{
    width:min(100%, 1480px);
    margin:0 auto;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:var(--radius-shell);
    padding:28px;
  }

  .asg-roster-top{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
  }

  .asg-roster-head h2{
    margin:0 0 6px;
    font-size:clamp(1.5rem,2.2vw,2rem);
    line-height:1.05;
    letter-spacing:-.03em;
    font-weight:800;
  }

  .asg-roster-sub{
    margin:0;
    color:var(--muted);
    font-size:.98rem;
    font-weight:500;
  }

  .asg-roster-search{
    display:flex;
    align-items:center;
    width:min(460px,100%);
    min-width:280px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0 16px;
    height:54px;
  }

  .asg-roster-search input{
    width:100%;
    height:100%;
    border:0;
    outline:none;
    background:transparent;
    color:var(--text);
    font:inherit;
    font-size:1rem;
  }

  .asg-roster-search input::placeholder{
    color:rgba(17,17,17,.45);
  }

  .asg-roster-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:18px;
  }

  .asg-roster-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-card);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;
    box-shadow:var(--shadow);
    transition:transform .18s ease, border-color .18s ease;
  }

  .asg-roster-card:hover{
    transform:translateY(-1px);
    border-color:var(--line-strong);
  }

  .asg-roster-photo-wrap{
    position:relative;
    aspect-ratio:4 / 5;
    background:#ecece8;
    overflow:hidden;
  }

  .asg-roster-photo{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
  }

  .asg-roster-initials{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#4f4f4f;
    font-weight:700;
    font-size:2rem;
    letter-spacing:.02em;
  }

  .asg-roster-tier{
    position:absolute;
    left:12px;
    top:12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.96);
    border:1px solid rgba(17,17,17,.08);
    font-size:.81rem;
    font-weight:700;
    color:#111;
    backdrop-filter:saturate(130%) blur(1px);
  }

  .asg-roster-body{
    padding:18px 18px 16px;
    display:grid;
    gap:13px;
  }

  .asg-roster-name{
    margin:0;
    font-size:1.2rem;
    line-height:1.1;
    letter-spacing:-.02em;
    font-weight:800;
  }

  .asg-roster-line{
    margin:0;
    display:grid;
    gap:3px;
  }

  .asg-roster-label{
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    font-weight:700;
  }

  .asg-roster-value{
    font-size:.96rem;
    color:var(--text);
    font-weight:600;
    word-break:break-word;
  }

  .asg-roster-value a{
    color:inherit;
    text-decoration:none;
  }

  .asg-roster-value a:hover{
    text-decoration:underline;
  }

  .asg-roster-actions{
    margin-top:2px;
  }

  .asg-roster-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    min-height:47px;
    border-radius:999px;
    border:1px solid #111;
    background:#111;
    color:#fff;
    text-decoration:none;
    font-size:.93rem;
    font-weight:700;
    transition:transform .18s ease, opacity .18s ease;
  }

  .asg-roster-btn:hover{
    transform:translateY(-1px);
    opacity:.95;
  }

  .asg-roster-btn[aria-disabled="true"]{
    background:var(--pill);
    border-color:var(--line);
    color:rgba(17,17,17,.45);
    pointer-events:none;
  }

  .asg-roster-empty{
    display:none;
    border:1px solid var(--line);
    border-radius:22px;
    background:var(--surface);
    padding:22px;
    font-size:1rem;
    color:var(--muted);
    font-weight:600;
  }

  @media (max-width:1120px){
    .asg-roster-grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
  }

  @media (max-width:760px){
    .asg-roster-shell{
      border-radius:22px;
      padding:16px;
    }

    .asg-roster-top{
      margin-bottom:14px;
    }

    .asg-roster-search{
      width:100%;
      min-width:0;
      height:50px;
    }

    .asg-roster-grid{
      grid-template-columns:1fr;
      gap:14px;
    }

    .asg-roster-body{
      padding:14px 14px 14px;
      gap:11px;
    }
  }
</style>

  const root = document.getElementById("asg-client-roster");
  if(!root) return;

  function esc(value){
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function telClean(value){
    return String(value || "").replace(/[^\d+]/g, "");
  }

  function initials(name){
    return String(name || "")
      .split(" ")
      .filter(Boolean)
      .slice(0, 2)
      .map(function(part){ return part[0]; })
      .join("")
      .toUpperCase();
  }

  const sortedRoster = roster.slice().sort(function(a,b){
    const tierScore = a.tier === b.tier ? 0 : (a.tier === "Senior" ? -1 : 1);
    if(tierScore !== 0) return tierScore;
    return a.name.localeCompare(b.name);
  });

  root.innerHTML = [
    '<section class="asg-roster-shell">',
      '<div class="asg-roster-top">',
        '<div class="asg-roster-head">',
          '<h2>Meet Our Team</h2>',
          '<p class="asg-roster-sub">Seniors are shown first, followed by juniors.</p>',
        '</div>',
        '<label class="asg-roster-search" aria-label="Search team members by name">',
          '<input type="search" placeholder="Search by name..." autocomplete="off">',
        '</label>',
      '</div>',
      '<div class="asg-roster-empty">No team members match that name.</div>',
      '<div class="asg-roster-grid"></div>',
    '</section>'
  ].join("");

  const input = root.querySelector(".asg-roster-search input");
  const grid = root.querySelector(".asg-roster-grid");
  const empty = root.querySelector(".asg-roster-empty");

  function render(){
    const q = input.value.trim().toLowerCase();
    const visible = q
      ? sortedRoster.filter(function(person){
          return person.name.toLowerCase().includes(q);
        })
      : sortedRoster;

    grid.innerHTML = visible.map(function(person){
      const hasLanding = /^https?:\/\//.test(person.landing);
      return [
        '<article class="asg-roster-card">',
          '<div class="asg-roster-photo-wrap">',
            '<span class="asg-roster-tier">' + esc(person.tier) + '</span>',
            person.photo
              ? '<img class="asg-roster-photo" src="' + esc(person.photo) + '" alt="' + esc(person.name) + '" loading="lazy">'
              : '<div class="asg-roster-initials" aria-label="' + esc(person.name) + '">' + esc(initials(person.name)) + '</div>',
          '</div>',
          '<div class="asg-roster-body">',
            '<h3 class="asg-roster-name">' + esc(person.name) + '</h3>',
            '<p class="asg-roster-line"><span class="asg-roster-label">Phone</span><span class="asg-roster-value"><a href="tel:' + esc(telClean(person.phone)) + '">' + esc(person.phone) + '</a></span></p>',
            '<p class="asg-roster-line"><span class="asg-roster-label">Email</span><span class="asg-roster-value"><a href="mailto:' + esc(person.email) + '">' + esc(person.email) + '</a></span></p>',
            '<div class="asg-roster-actions">',
              hasLanding
                ? '<a class="asg-roster-btn" href="' + esc(person.landing) + '" target="_blank" rel="noopener">View Landing Page</a>'
                : '<a class="asg-roster-btn" href="#" aria-disabled="true" onclick="return false;">Landing Page Coming Soon</a>',
            '</div>',
          '</div>',
        '</article>'
      ].join("");
    }).join("");

    empty.style.display = visible.length ? "none" : "block";
  }

  input.addEventListener("input", render);
  render();
})();
