      var rows = acts.length ? '<ul class="lw-tlx">' + acts.map(function (a) {
        return "<li><b>" + esc(a.label || a.type) + '</b><span class="lw-tlx-meta">' + esc([a.actor, when(a.ts)].filter(Boolean).join(" · ")) + "</span></li>";
      }).join("") + "</ul>" : '<div class="amd-empty" style="margin-top:12px">No activity yet.</div>';
      return '<article class="amd-lh-card is-marketing">' +
        '<div class="amd-lh-label">History</div>' +
        '<div class="amd-lh-fill">' + rows + "</div>" +
      "</article>";
    }

    function renderDetail(l) {
      var statusLabel = listingStatusLabel(l);
      var tone = statusToneClass(statusLabel);
      var agentName = l.agent || "Unassigned";
      var agentPhoto = rosterPhotoFor(agentName);
      var heroPrice = money(l.mlsSoldPrice || l.listPrice);
      var heroMls = String(l.idxListingId || l.mlsNumber || "").trim();
      var heroDetailsUrl = String(l.mlsFullDetailsUrl || l.idxDetailsUrl || "").trim();

      // Location line
      var locBits = [];
      if (l.neighborhood) locBits.push(l.neighborhood);
      if (l.mlsCity && l.mlsCity !== l.neighborhood) locBits.push(l.mlsCity);
      if (l.mlsZip) locBits.push(l.mlsZip);
      if (l.mlsCounty) locBits.push(l.mlsCounty + " County");

      // Property facts line
      var propBits = [];
      if (l.beds != null) propBits.push("<span><b>" + esc(l.beds) + "</b> bd</span>");
      if (l.baths != null) propBits.push("<span><b>" + esc(l.baths) + "</b> ba</span>");
      if (l.sqFt) propBits.push("<span><b>" + esc(Number(l.sqFt).toLocaleString()) + "</b> sf</span>");
      var propType = [l.mlsPropType, l.mlsPropSubType].filter(function (v, i, a) { return v && a.indexOf(v) === i; }).join(" · ") || l.listingType;
      if (propType) propBits.push("<span>" + esc(propType) + "</span>");
      if (l.mlsYearBuilt) propBits.push("<span>Built " + esc(l.mlsYearBuilt) + "</span>");
      if (heroMls) {
        propBits.push(heroDetailsUrl
          ? '<span><a class="amd-lh-hero-meta-link" href="' + esc(heroDetailsUrl) + '" target="_blank" rel="noopener">MLS# ' + esc(heroMls) + " ↗</a></span>"
          : "<span>MLS# " + esc(heroMls) + "</span>");
      }
      if (l.mlsDaysOnMarket != null) propBits.push("<span>" + esc(l.mlsDaysOnMarket) + " days on market</span>");
      if (l.mlsTaxes) propBits.push("<span>Taxes <b>" + esc(money(l.mlsTaxes)) + "</b>/yr</span>");
      if (l.mlsHoaDues) propBits.push("<span>HOA <b>" + esc(money(l.mlsHoaDues)) + "</b></span>");

      var heroHtml = '<div class="amd-lh-hero">' +
        (heroPrice ? '<div class="amd-lh-hero-price">' + esc(heroPrice) + "</div>" : "") +
        (locBits.length ? '<div class="amd-lh-hero-loc">' + esc(locBits.join(" · ")) + "</div>" : "") +
        (propBits.length ? '<div class="amd-lh-hero-specs">' + propBits.join('<span class="amd-lh-hero-sep" aria-hidden="true">·</span>') + "</div>" : "") +
      "</div>";

      /* ---- tiles ---- */
      // Open House tile
      var ohMatStatus = String(l.openHouseMaterialsStatus || "").toLowerCase();
      var ohDelivered = ohMatStatus.indexOf("deliver") > -1;
      var ohRequested = ohDelivered || ohMatStatus.indexOf("request") > -1 || ohMatStatus.indexOf("build") > -1;
      var ohValueHtml = l.nextOpenHouseDate
        ? '<div class="amd-lh-stat-meta" style="margin-top:0"><b>' + esc(fmtDay(l.nextOpenHouseDate)) + "</b></div>"
        : '<span style="color:rgba(60,60,67,0.6);font-weight:500;">No open house scheduled</span>';
      ohValueHtml += '<div class="amd-lh-stat-meta" style="margin-top:6px;">Marketing: <b>' + (ohDelivered ? "Delivered" : ohRequested ? "Requested" : "Not Requested") + "</b></div>";
      var ohActions = ohDelivered
        ? '<button class="amd-lh-stat-action is-secondary" type="button" disabled>✓ Delivered</button>'
        : ohRequested
          ? '<button class="amd-lh-stat-action is-secondary" type="button" disabled>✓ Requested</button>'
          : '<button class="amd-lh-stat-action" type="button" data-request-kind="open_house_materials">Request Marketing</button>';
      var ohTile = '<div class="amd-lh-stat is-openhouse">' +
        '<div class="amd-lh-stat-k">Open House</div>' +
        '<div class="amd-lh-stat-v">' + ohValueHtml + "</div>" +
        '<div class="amd-lh-stat-actions">' + ohActions + "</div>" +
      "</div>";

      // Seller Questionnaire tile
      var sqReceived = !!(l.sellerQuestionnaireContent || "").trim();
      var sellerLine, sellerMeta = "", sellerActions = "";
      if (sqReceived) {
        sellerLine = l.sellerName ? esc(l.sellerName) : '<span style="color:rgba(60,60,67,0.6);font-weight:500;">Details received</span>';
        var mb = [];
        if (l.sellerEmail) mb.push(esc(l.sellerEmail));
        if (l.sellerPhone) mb.push(esc(l.sellerPhone));
        if (mb.length) sellerMeta = '<div class="amd-lh-stat-meta">' + mb.join(" · ") + "</div>";
        sellerActions = '<div class="amd-lh-stat-actions"><button class="amd-lh-stat-action" type="button" id="lwSqToggle">Questionnaire Details</button></div>';
      } else {
        sellerLine = '<span style="color:rgba(60,60,67,0.6);font-weight:500;">Not sent yet</span>';
        sellerMeta = '<div class="amd-lh-stat-meta">Send the seller questionnaire so we can capture their goals before the listing goes live.</div>';
      }
      var sellerTile = '<div class="amd-lh-stat is-seller">' +
        '<div class="amd-lh-stat-k">Seller Questionnaire</div>' +
        '<div class="amd-lh-stat-v">' + sellerLine + "</div>" + sellerMeta + sellerActions +
      "</div>";

      // Compass link tile
      var compassLink = String(l.compassLink || "").trim();
      var compassTile;
      if (compassLink) {
        var disp = compassLink.replace(/^https?:\/\//i, "").replace(/\/$/, "");
        if (disp.length > 48) disp = disp.slice(0, 45) + "…";
        compassTile = '<div class="amd-lh-stat is-compass">' +
          '<div class="amd-lh-stat-k">Compass Link</div>' +
          '<div class="amd-lh-stat-v"><a href="' + esc(compassLink) + '" target="_blank" rel="noopener" title="' + esc(compassLink) + '">' + esc(disp) + " ↗</a></div>" +
          '<div class="amd-lh-stat-actions"><button class="amd-lh-stat-action" type="button" data-copy="' + esc(compassLink) + '">Copy URL</button></div>' +
        "</div>";
      } else {
        compassTile = '<div class="amd-lh-stat is-compass">' +
          '<div class="amd-lh-stat-k">Compass Link</div>' +
          '<div class="amd-lh-stat-v"><span style="color:rgba(60,60,67,0.6);font-weight:500;">Not posted yet</span></div>' +
          '<div class="amd-lh-stat-meta">Add the Compass listing URL under Marketing Assets → Edit links.</div>' +
        "</div>";
      }

      // Financials tile
      var financeK, financeV, financeMeta = "";
      if (l.mlsTaxes) {
        financeK = "Annual Taxes"; financeV = esc(money(l.mlsTaxes));
        financeMeta = l.mlsHoaDues ? "HOA " + esc(money(l.mlsHoaDues)) + (l.mlsHoaFrequency ? " · " + esc(l.mlsHoaFrequency) : "") : "";
      } else if (l.mlsHoaDues) {
        financeK = "HOA / Assessments"; financeV = esc(money(l.mlsHoaDues));
        financeMeta = l.mlsHoaFrequency ? esc(l.mlsHoaFrequency) : "";
      } else if (l.mlsListDate || l.mlsDaysOnMarket != null) {
        financeK = "On Market";
        financeV = l.mlsDaysOnMarket != null ? esc(l.mlsDaysOnMarket) + " days" : esc(fmtDate(l.mlsListDate));
        financeMeta = l.mlsListDate ? "Listed " + esc(fmtDate(l.mlsListDate)) : "";
      } else {
        financeK = "Activity"; financeV = '<span style="color:rgba(60,60,67,0.6);font-weight:500;">—</span>';
      }
      var financeTile = '<div class="amd-lh-stat">' +
        '<div class="amd-lh-stat-k">' + esc(financeK) + "</div>" +
        '<div class="amd-lh-stat-v">' + financeV + "</div>" +
        (financeMeta ? '<div class="amd-lh-stat-meta">' + financeMeta + "</div>" : "") +
      "</div>";

      /* ---- full details foldout (remarks + MLS facts) ---- */
      var remarks = String(l.mlsRemarks || "").trim();
      var soldVsAsk = "";
      if (l.mlsSoldPrice) {
        soldVsAsk = money(l.mlsSoldPrice);
        if (l.listPrice) {
          var diff = Number(l.mlsSoldPrice) - Number(l.listPrice);
          var pctd = ((diff / Number(l.listPrice)) * 100).toFixed(1);
          soldVsAsk += " (vs ask " + money(l.listPrice) + ", " + (diff >= 0 ? "+" : "−") + Math.abs(pctd) + "%)";
        }
      }
      var fullRows = [
        ["MLS #", heroMls],
        ["Status", statusLabel],
        ["List Price", money(l.listPrice)],
        ["List Date", fmtDate(l.mlsListDate || l.listDate)],
        ["Days on Market", l.mlsDaysOnMarket],
        ["Property Type", propType],
        ["Home Type", l.mlsHomeType],
        ["Year Built", l.mlsYearBuilt],
        ["Year Rehabbed", l.mlsRehabYear],
        ["Stories", l.mlsStories],
        ["Total Rooms", l.mlsTotalRooms],
        ["Garage", l.mlsGarageSpaces],
        ["Parking", l.mlsParking],
        ["Lot Size", l.mlsLotSize],
        ["Ownership", l.mlsOwnership],
        ["Exposure", l.mlsExposure],
        ["Pets", l.mlsPetsAllowed],
        ["Waterfront", l.mlsWaterfront],
        ["Open Houses", l.mlsOhCount],
        ["Sold Price", soldVsAsk],
        ["Sold Date", fmtDate(l.mlsSoldDate)],
        ["Annual Taxes", l.mlsTaxes ? money(l.mlsTaxes) + (l.mlsTaxYear ? " (" + l.mlsTaxYear + ")" : "") : ""],
        ["HOA / Assessments", l.mlsHoaDues ? money(l.mlsHoaDues) + (l.mlsHoaFrequency ? " · " + l.mlsHoaFrequency : "") : ""],
        ["HOA Includes", l.mlsHoaIncludes],
        ["MLS Area", String(l.mlsAreaMajor || "").replace(/^CHI\s*-\s*/i, "")],
        ["Township", l.mlsTownship],
        ["City", l.mlsCity],
        ["County", l.mlsCounty],
        ["Zip", l.mlsZip],
        ["School District", l.mlsSchoolDistrict],
        ["Elementary", l.mlsElementarySchool],
        ["Middle", l.mlsMiddleSchool],
        ["High", l.mlsHighSchool],
        ["Seller", l.sellerName],
        ["Co-list Agent", l.coListAgentName]
      ].filter(function (r) { return r[1] != null && String(r[1]).trim() !== ""; });
      var detailsFoldout = "";
      if (remarks || fullRows.length) {
        var grid = fullRows.map(function (r) {
          var wide = String(r[1]).length > 30;
          return '<div class="amd-lh-detail-row' + (wide ? " amd-lh-detail-row--wide" : "") + '"><dt class="amd-lh-detail-k">' + esc(r[0]) + '</dt><dd class="amd-lh-detail-v">' + esc(r[1]) + "</dd></div>";
        }).join("");
        var mlsFoot = String(l.mlsListOffice || "").trim();
        detailsFoldout = '<details class="amd-lh-foldout">' +
          '<summary class="amd-lh-foldout-summary">' +
            "<span>Full listing details</span>" +
            '<span class="amd-lh-foldout-hint">Description, schools, taxes &amp; more</span>' +
            '<svg class="amd-lh-foldout-chev" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          "</summary>" +
          '<div class="amd-lh-foldout-body">' +
            (remarks ? '<div class="amd-lh-mred-remarks">' + esc(remarks) + "</div>" : "") +
            (grid ? '<dl class="amd-lh-detail-list">' + grid + "</dl>" : "") +
            '<div class="amd-lh-mls-foot">' +
              (mlsFoot ? '<div class="amd-lh-mls-agent">Listed by ' + esc(mlsFoot) + "</div>" : "<div></div>") +
              (heroDetailsUrl ? '<a class="amd-mini-btn is-dark" href="' + esc(heroDetailsUrl) + '" target="_blank" rel="noopener">Open MLS Detail ↗</a>' : "") +
            "</div>" +
          "</div>" +
        "</details>";
      }

      var html =
        '<div class="amd-panel-head amd-panel-head--listing">' +
          '<h3 class="amd-panel-title amd-panel-title--listing">' + esc(l.address || "") + "</h3>" +
          '<div class="amd-sell-overlay-actions">' +
            '<button class="amd-mini-btn" type="button" id="lwBook">Book media</button>' +
            '<button class="amd-mini-btn is-dark" type="button" id="lwShare">Share with agent</button>' +
            '<button class="amd-sell-overlay-x" type="button" id="lwClose" aria-label="Close">' +
              '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>' +
            "</button>" +
          "</div>" +
        "</div>" +
        '<div class="amd-sell-detail-page">' +
          '<section class="amd-lh-status">' +
            '<div class="amd-lh-label">Listing Overview</div>' +
            '<div class="amd-lh-overview">' +
              '<div class="amd-lh-agent" id="lwAgentBlock">' +
                (agentPhoto
                  ? '<img class="amd-lh-agent-photo" src="' + esc(agentPhoto) + '" alt="' + esc(agentName) + '" loading="lazy">'
                  : '<div class="amd-lh-agent-photo" aria-hidden="true"></div>') +
                '<div><div class="amd-lh-agent-name" id="lwAgentName">' + esc(agentName) +
                  ' <button class="lw-agent-edit" type="button" id="lwAgentEdit" title="Change listing agent">✎</button></div>' +
                '<div class="amd-lh-agent-role">Listing Agent</div></div>' +
              "</div>" +
              (statusLabel ? '<div class="amd-lh-overview-status"><span class="amd-lh-hero-pill' + (tone ? " " + tone : "") + '">' + esc(statusLabel) + "</span></div>" : "") +
            "</div>" +
            heroHtml +
            '<div class="amd-lh-status-grid amd-lh-status-grid--quad">' + ohTile + sellerTile + compassTile + financeTile + "</div>" +
            (sqReceived ? '<div class="lw-sq-content" id="lwSqContent"><pre>' + esc(l.sellerQuestionnaireContent) + "</pre></div>" : "") +
            detailsFoldout +
          "</section>" +
          '<div class="amd-lh-stage-area"><div class="amd-lh-stage-content">' +
            marketingStatusCard(l) +
            marketingAssetsCard(l) +
            '<section class="amd-lh-trio">' + photosCard(l) + matterportCard(l) + "</section>" +
            requestsCard(l) +
            historyCard(l) +
          "</div></div>" +
        "</div>";
      detailEl.innerHTML = html;
      bindDetail(l);
    }

    function bindDetail(l) {
      document.getElementById("lwClose").addEventListener("click", showList);

      // agent assignment (✎ swaps the name for a roster select)
      document.getElementById("lwAgentEdit").addEventListener("click", async function () {
        var nameEl = document.getElementById("lwAgentName");
        var roster = await loadAgentRoster();
        var names = roster.filter(function (a) { return a.tier !== "admin"; }).map(function (a) { return a.name; });
        if (l.agent && names.indexOf(l.agent) === -1) names.unshift(l.agent);
        var sel = document.createElement("select");
        sel.className = "lw-agent-select";
        sel.innerHTML = '<option value="">Unassigned</option>' + names.map(function (n) {
          return '<option value="' + esc(n) + '"' + (n === l.agent ? " selected" : "") + ">" + esc(n) + "</option>";
        }).join("");
        nameEl.replaceWith(sel);
        sel.focus();
        sel.addEventListener("change", async function () {
          var name = sel.value;
          try {
            await jsend("PATCH", "/api/admin/listings/" + l.id, { agentName: name || null });
            toast(name ? "Assigned to " + name : "Listing unassigned");
            await refreshDetail(l.id);
            loadList();
          } catch (e) { toast(e.message || "Assignment failed", true); }
        });
        sel.addEventListener("blur", function () { setTimeout(function () { if (current && current.id === l.id) renderDetail(current); }, 150); });
      });

      // status roadmap selects
      detailEl.querySelectorAll("select[data-status]").forEach(function (sel) {
        sel.addEventListener("change", async function () {
          var body = {}; body[sel.getAttribute("data-status")] = sel.value;
          try {
            await jsend("PATCH", "/api/admin/listings/" + l.id, body);
            toast("Status updated");
            await refreshDetail(l.id);
          } catch (e) { toast(e.message || "Update failed", true); }
        });
      });

      // asset links editor
      document.getElementById("lwEditAssets").addEventListener("click", function () {
        document.getElementById("lwAssetEditor").classList.toggle("is-open");
      });
      document.getElementById("lwSaveAssets").addEventListener("click", async function () {
        var body = {};
        detailEl.querySelectorAll("input[data-asset]").forEach(function (inp) { body[inp.getAttribute("data-asset")] = inp.value.trim(); });
        try { await jsend("PATCH", "/api/admin/listings/" + l.id, body); toast("Assets saved"); await refreshDetail(l.id); }
        catch (e) { toast(e.message || "Save failed", true); }
      });

      // copy buttons
      detailEl.querySelectorAll("[data-copy]").forEach(function (btn) {
        btn.addEventListener("click", function () { copyText(btn.getAttribute("data-copy")); });
      });

      // book media (Acuity) — head button + any "Book →" tile button
      async function bookMedia() {
        try { var d = await jget("/api/admin/listings/" + l.id + "/acuity-link"); if (d.ok && d.url) window.open(d.url, "_blank", "noopener"); else throw new Error(d.error || "no link"); }
        catch (e) { toast(e.message || "Could not open Acuity", true); }
      }
      document.getElementById("lwBook").addEventListener("click", bookMedia);
      detailEl.querySelectorAll("[data-book-media]").forEach(function (btn) { btn.addEventListener("click", bookMedia); });

      // share
      document.getElementById("lwShare").addEventListener("click", async function () {
        try { var d = await jsend("POST", "/api/admin/listings/" + l.id + "/share", {}); if (d.gmailUrl) window.open(d.gmailUrl, "_blank", "noopener"); toast("Opening email to " + d.to); }
        catch (e) { toast(e.message || "Share failed", true); }
      });

      // request buttons (tiles + requests card)
      detailEl.querySelectorAll("[data-request-kind]").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          try {
            await jsend("POST", "/api/admin/listings/" + l.id + "/requests", { kind: btn.getAttribute("data-request-kind") });
            toast("Request created");
            await refreshDetail(l.id);
          } catch (e) { toast(e.message || "Request failed", true); }
        });
      });
      var reqBtn = document.getElementById("lwReqBtn");
      if (reqBtn) reqBtn.addEventListener("click", async function () {
        var kind = document.getElementById("lwReqKind").value;
        try {
          await jsend("POST", "/api/admin/listings/" + l.id + "/requests", { kind: kind });
          toast("Request created");
          await refreshDetail(l.id);
        } catch (e) { toast(e.message || "Request failed", true); }
      });

      // seller questionnaire toggle
      var sqToggle = document.getElementById("lwSqToggle");
      if (sqToggle) sqToggle.addEventListener("click", function () {
        document.getElementById("lwSqContent").classList.toggle("is-open");
      });

      // photo carousel
      var prev = detailEl.querySelector("[data-photo-prev]");
      var next = detailEl.querySelector("[data-photo-next]");
      if (prev) prev.addEventListener("click", function () { slideIdx--; renderDetail(current); });
      if (next) next.addEventListener("click", function () { slideIdx++; renderDetail(current); });
      var delBtn = detailEl.querySelector("[data-del]");
      if (delBtn) delBtn.addEventListener("click", async function () {
        try {
          await jsend("DELETE", "/api/admin/photos/" + delBtn.getAttribute("data-del"), {});
          toast("Photo removed");
          slideIdx = 0;
          await refreshDetail(l.id);
        } catch (e) { toast(e.message || "Delete failed", true); }
      });

      // uploads
      var fileInput = document.getElementById("lwFile");
      document.getElementById("lwUploadBtn").addEventListener("click", function () { fileInput.click(); });
      fileInput.addEventListener("change", function () { if (fileInput.files.length) uploadPhotos(l.id, fileInput.files); });
    }

    async function uploadPhotos(id, fileList) {
      var files = Array.prototype.slice.call(fileList).filter(function (f) { return /^image\//.test(f.type); });
      if (!files.length) return;
      var prog = document.getElementById("lwProg");
      prog.textContent = "Uploading 0/" + files.length + "…";
      try {
        var signed = await jsend("POST", "/api/admin/listings/" + id + "/photo-uploads", {
          files: files.map(function (f) { return { name: f.name, contentType: f.type }; })
        });
        var uploads = signed.uploads || [];
        var registered = [];
        for (var i = 0; i < uploads.length; i++) {
          var u = uploads[i], file = files[i];
          var put = await fetch(u.signedUrl, { method: "PUT", headers: { "content-type": file.type || "application/octet-stream", "x-upsert": "true" }, body: file });
          if (!put.ok) throw new Error("upload failed (" + put.status + ")");
          registered.push({ path: u.path, contentType: file.type });
          prog.textContent = "Uploading " + (i + 1) + "/" + files.length + "…";
        }
        await jsend("POST", "/api/admin/listings/" + id + "/photos/register", { photos: registered });
        prog.textContent = "";
        toast(registered.length + " photo(s) added");
        await refreshDetail(id);
      } catch (e) { prog.textContent = ""; toast(e.message || "Upload failed", true); }
    }

    /* ---------- wiring ---------- */
    root.addEventListener("click", function (e) {
      var c = e.target.closest("[data-open]");
      if (c && !detailEl.contains(c)) openListing(c.getAttribute("data-open"));
    });
    root.addEventListener("keydown", function (e) {
      if (e.key !== "Enter" && e.key !== " ") return;
      var c = e.target.closest("article[data-open]");
      if (c) { e.preventDefault(); openListing(c.getAttribute("data-open")); }
    });

    C.onSurface(function (name) {
      if (name === "listings" && !loaded) { loaded = true; loadList(); }
    });
  }
  boot();
})();
</script>
