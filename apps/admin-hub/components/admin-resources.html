<!-- ASG Admin Resources — console "Resources" surface.
     All the team's shareable links in one place. Every card opens the link and
     has a one-click copy button so admins can paste links to agents fast.
     Self-contained: markup + logic + scoped styles (.rs-*). -->
<div class="rs" id="rsRoot">
  <header class="rs-hero">
    <h1>Resources</h1>
    <p>Every team link in one place — click to open, or copy to send to an agent.</p>
  </header>

  <label class="rs-search">
    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="4.6" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="rsSearch" type="search" placeholder="Search links…" autocomplete="off">
  </label>

  <div id="rsGroups"></div>
  <div class="rs-toast" id="rsToast">Link copied</div>
</div>

<style>
  .rs { max-width: 1080px; margin: 0 auto; padding: 8px 16px 80px; }
  .rs-hero { padding: 24px 4px 14px; }
  .rs-hero h1 { font-size: 30px; font-weight: 700; margin: 0 0 4px; letter-spacing: -.02em; }
  .rs-hero p { color: rgba(0,0,0,.55); margin: 0; font-size: 15px; }
  .rs-search { display: flex; align-items: center; gap: 9px; background: #fff; border: 1px solid rgba(0,0,0,.1);
    border-radius: 999px; padding: 10px 16px; margin: 4px 4px 20px; max-width: 420px; color: rgba(0,0,0,.4); }
  .rs-search svg { width: 15px; height: 15px; flex-shrink: 0; }
  .rs-search input { border: none; outline: none; background: none; font-family: inherit; font-size: 14px; color: #111; width: 100%; }
  .rs-group { margin-bottom: 26px; }
  .rs-group h2 { font-size: 12px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: rgba(0,0,0,.45); margin: 0 4px 10px; }
  .rs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .rs-card { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid rgba(0,0,0,.09);
    border-radius: 14px; padding: 13px 14px; text-decoration: none; color: #111; min-width: 0;
    transition: border-color .15s, transform .15s; }
  .rs-card:hover { border-color: rgba(0,0,0,.28); transform: translateY(-1px); }
  .rs-card .rs-body { flex: 1; min-width: 0; }
  .rs-card .t { font-size: 14px; font-weight: 700; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rs-card .s { font-size: 12px; color: rgba(0,0,0,.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rs-copy { flex-shrink: 0; border: 1px solid rgba(0,0,0,.12); background: #f6f6f4; border-radius: 9px;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: rgba(0,0,0,.55); transition: background .15s, color .15s; }
  .rs-copy:hover { background: #111; color: #fff; }
  .rs-copy svg { width: 14px; height: 14px; }
  .rs-empty { color: rgba(0,0,0,.42); font-size: 13.5px; margin: 6px 4px; }
  .rs-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: #111; color: #fff; font-size: 13.5px; font-weight: 600; border-radius: 999px; padding: 10px 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 999; }
  .rs-toast.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 900px) { .rs-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .rs-grid { grid-template-columns: 1fr; } }
</style>

<script>
(function () {
  var GROUPS = [
    {
      name: "Tools",
      links: [
        { title: "Follow Up Boss", sub: "CRM dashboard", href: "https://login.followupboss.com/login?start_url=/2/admin/overview&subdomain=compass219" },
        { title: "MLS", sub: "MRED log in", href: "https://connectmls-api.mredllc.com/oid/login" },
        { title: "Compass", sub: "Compass app", href: "https://www.compass.com/app/home/" },
        { title: "Zillow", sub: "Agent showcase", href: "https://www.zillow.com/agents/showcase/" },
        { title: "Matterport", sub: "3D tours", href: "https://my.matterport.com/models?organization=vuif7isneoC" },
        { title: "Book Marketing", sub: "Acuity scheduling", href: "https://asgmarketing.as.me/" },
      ],
    },
    {
      name: "ASG pages",
      links: [
        { title: "Team Resources", sub: "ASG website", href: "https://www.alexstoykovgroup.com/resources" },
        { title: "Team Updates", sub: "Update center", href: "https://www.alexstoykovgroup.com/updatecenter" },
        { title: "Deal Tracker", sub: "ASG website", href: "https://www.alexstoykovgroup.com/dealtracker" },
        { title: "Senior Hub", sub: "ASG website", href: "https://www.alexstoykovgroup.com/seniorhubhome" },
        { title: "Junior Hub", sub: "ASG website", href: "https://www.alexstoykovgroup.com/juniorhub" },
        { title: "Senior Meetings", sub: "ASG website", href: "https://www.alexstoykovgroup.com/seniorteammeetings" },
        { title: "Blog", sub: "ASG website", href: "https://www.alexstoykovgroup.com/blog" },
      ],
    },
    {
      name: "Send to clients",
      links: [
        { title: "Buyer Onboarding", sub: "Client wizard", href: "https://www.alexstoykovgroup.com/buyer-onboarding" },
        { title: "Seller Onboarding", sub: "Client wizard", href: "https://www.alexstoykovgroup.com/seller-onboarding" },
        { title: "Search Homes", sub: "IDX search", href: "https://www.alexstoykovgroup.com/idx" },
        { title: "Client Portal", sub: "Client hub", href: "https://www.alexstoykovgroup.com/client-portal" },
      ],
    },
  ];

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  var copyIcon = '<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5.2" y="5.2" width="8" height="8" rx="1.6" stroke="currentColor" stroke-width="1.4"/><path d="M10.8 5.2V4A1.5 1.5 0 0 0 9.3 2.5H4A1.5 1.5 0 0 0 2.5 4v5.3A1.5 1.5 0 0 0 4 10.8h1.2" stroke="currentColor" stroke-width="1.4"/></svg>';

  function render(filter) {
    var q = String(filter || "").toLowerCase().trim();
    var host = document.getElementById("rsGroups");
    var html = GROUPS.map(function (g) {
      var links = g.links.filter(function (l) {
        return !q || (l.title + " " + l.sub + " " + l.href).toLowerCase().indexOf(q) !== -1;
      });
      if (!links.length) return "";
      return '<div class="rs-group"><h2>' + esc(g.name) + '</h2><div class="rs-grid">' +
        links.map(function (l) {
          return '<a class="rs-card" href="' + esc(l.href) + '" target="_blank" rel="noopener">' +
            '<span class="rs-body"><span class="t">' + esc(l.title) + '</span><br><span class="s">' + esc(l.sub) + "</span></span>" +
            '<button class="rs-copy" type="button" data-copy="' + esc(l.href) + '" aria-label="Copy link" title="Copy link">' + copyIcon + "</button>" +
            "</a>";
        }).join("") +
        "</div></div>";
    }).join("");
    host.innerHTML = html || '<p class="rs-empty">No links match your search.</p>';
  }

  function showToast() {
    var t = document.getElementById("rsToast");
    t.classList.add("is-on");
    clearTimeout(t._t);
    t._t = setTimeout(function () { t.classList.remove("is-on"); }, 1600);
  }

  function boot() {
    render("");
    document.getElementById("rsSearch").addEventListener("input", function (e) { render(e.target.value); });
    document.getElementById("rsGroups").addEventListener("click", function (e) {
      var btn = e.target.closest && e.target.closest("[data-copy]");
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      var url = btn.getAttribute("data-copy");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(showToast).catch(function () {});
      } else {
        var ta = document.createElement("textarea");
        ta.value = url; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); showToast(); } catch (err) {}
        ta.remove();
      }
    });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
