    {title:"Team Updates",sub:"ASG website",href:"https://www.alexstoykovgroup.com/updatecenter",logo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/fab4526a-3108-47f6-88fb-cc55decbef88/Logo.png?format=1500w",fallback:"ASG",keywords:[]},

  const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const clip=(s,max)=>{const t=String(s||"").trim();if(!max||t.length<=max)return t;return t.slice(0,Math.max(0,max-1)).trim()+"…";};
  const normalize=s=>String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"").trim();
  const firstName=s=>String(s||"").trim().split(/\s+/)[0]||"";
  const fmt=n=>{const val=Number(n)||0;if(val>=1e6)return "$"+(val/1e6).toFixed(1)+"M";if(val>=1e3)return "$"+Math.round(val/1e3)+"K";return "$"+val.toLocaleString();};
  const safeHref=url=>{
    const raw=String(url||"").trim();
    if(/^https?:\/\//i.test(raw))return raw;
    if(/^#[A-Za-z0-9_-]+$/.test(raw))return raw;
    return "#";
  };
  const statusLabel=s=>{const raw=String(s||"").trim();if(!raw)return"Unknown";return raw.toLowerCase().split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");};
  const resolveDriveImageUrl=url=>{
    const raw=String(url||"").trim();
    if(!raw)return "";
    if(!/drive\.google\.com|docs\.google\.com/.test(raw))return raw;
    if(/\/drive\/folders\//.test(raw))return "";
    const filePathMatch=raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(filePathMatch&&filePathMatch[1])return "https://drive.google.com/thumbnail?id="+filePathMatch[1]+"&sz=w1200";

    if(idParamMatch&&idParamMatch[1])return "https://drive.google.com/thumbnail?id="+idParamMatch[1]+"&sz=w1200";
    return raw;
  };

  function renderEventsPanel_ph(panel,eventsData,updatesData){
    var ev=eventsData||{};
    var up=updatesData||{};
    var nextUp=ev.nextUp||null;
    var moreEvents=(ev.upcoming||[]).filter(function(e){return !nextUp||e._rowNumber!==nextUp._rowNumber;});
    if(ev.future&&ev.future.length)moreEvents=moreEvents.concat(ev.future);
    var latestUpdate=up.latest||null;
    var olderUpdates=(up.ordered||[]).filter(function(u){return !latestUpdate||u._rowNumber!==latestUpdate._rowNumber;});
    var evCol='<div class="asg-ph-eu-head">Events</div>';
    evCol+=nextUp?buildEventFeature(nextUp):'<div class="asg-ph-eu-empty">No upcoming events</div>';
    if(moreEvents.length){
      evCol+='<div class="asg-ph-ev-subhd">Coming Up</div>';
      evCol+='<div class="asg-ph-eu-list">'+moreEvents.map(buildEventMini).join("")+"</div>";
    }
    var upCol='<div class="asg-ph-eu-head">Updates</div>';
    upCol+=latestUpdate?buildUpdateLead(latestUpdate):'<div class="asg-ph-eu-empty">No updates yet</div>';
    if(olderUpdates.length){
      upCol+='<div class="asg-ph-ev-subhd">Past Updates</div>';
      upCol+='<div class="asg-ph-eu-list">'+olderUpdates.map(buildUpdateRow).join("")+"</div>";
    }
    panel.innerHTML='<div class="asg-ph-eu-split"><div class="asg-ph-eu-col">'+evCol+'</div><div class="asg-ph-eu-col">'+upCol+"</div></div>";
  }
  function buildEventFeature(ev){
    var coverUrl=ev.cover_image_url||"";
    var coverHtml=coverUrl?'<div class="asg-ph-ev-feature-media"><img class="asg-ph-ev-feature-img" src="'+esc(coverUrl)+'" alt="" loading="lazy"></div>':"";
    var meta=[ev.start_date_display,ev.start_time_display,ev.location_name].filter(Boolean).join(" \u00b7 ");
    var detailsBtn=ev.details_url?'<a class="asg-ph-download-btn asg-ph-ev-detail-btn" href="'+esc(safeHref(ev.details_url))+'" target="_blank" rel="noopener">View details</a>':"";
    return '<div class="asg-ph-ev-feature">'+coverHtml+
      '<div class="asg-ph-ev-feature-body">'+
        '<span class="asg-ph-ev-feature-eyebrow">Next Up</span>'+
        '<h3 class="asg-ph-ev-feature-title">'+esc(ev.title||"")+"</h3>"+
        '<div class="asg-ph-ev-feature-meta">'+esc(meta)+"</div>"+
        (ev.attire_display?'<div class="asg-ph-ev-feature-meta">Attire: '+esc(ev.attire_display)+"</div>":"")+
        detailsBtn+
      "</div></div>";
  }
  function buildEventMini(ev){
    var meta=[ev.start_date_display,ev.start_time_display].filter(Boolean).join(" \u00b7 ");
    return '<div class="asg-ph-ev-mini">'+
      '<h4 class="asg-ph-ev-mini-title">'+esc(ev.title||"")+"</h4>"+
      '<div class="asg-ph-ev-mini-meta">'+esc(meta)+"</div>"+
      (ev.location_name?'<div class="asg-ph-ev-mini-meta">'+esc(ev.location_name)+"</div>":"")+
    "</div>";
  }
  function categoryClass(cat){
    var c=String(cat||"").toLowerCase();
    if(c==="training")return "is-training";
    if(c==="alert"||c==="urgent")return "is-alert";
    if(c==="reminder")return "is-reminder";
    return "is-notice";
  }
  function buildUpdateLead(up){
    var cat=up.category||"";
    var pillCls=cat?" "+categoryClass(cat):"";
    var link=up.post_url?'<a class="asg-ph-up-link" href="'+esc(safeHref(up.post_url))+'" target="_blank" rel="noopener">Read more</a>':"";
    return '<div class="asg-ph-up-lead">'+
      '<div class="asg-ph-up-top"><h4 class="asg-ph-up-title">'+esc(up.title||"")+"</h4>"+
        (cat?'<span class="asg-ph-up-pill'+pillCls+'">'+esc(cat)+"</span>":"")+
      "</div>"+
      '<div class="asg-ph-up-meta">'+esc(up.publish_date_display||"")+"</div>"+
      '<p class="asg-ph-up-msg">'+esc(clip(up.message_short,120))+"</p>"+
      link+"</div>";
  }
  function buildUpdateRow(up){
    var cat=up.category||"";
    var pillCls=cat?" "+categoryClass(cat):"";
    return '<div class="asg-ph-up-row">'+
      '<div class="asg-ph-up-top"><h4 class="asg-ph-up-title">'+esc(up.title||"")+"</h4>"+
        (cat?'<span class="asg-ph-up-pill'+pillCls+'">'+esc(cat)+"</span>":"")+
      "</div>"+
      '<div class="asg-ph-up-meta">'+esc(up.publish_date_display||"")+"</div>"+
      '<p class="asg-ph-up-msg">'+esc(clip(up.message_short,80))+"</p>"+
    "</div>";
  }
  function renderQuickLinksGrid_ph(container){
    container.innerHTML=QUICK_LINKS.map(function(link){
      const href=safeHref(link.href);
      const isDead=!/^https?:\/\//i.test(href);
      const fb=link.fallback?esc(link.fallback):esc(link.title.slice(0,3).toUpperCase());
      const logo=link.logo
        ?'<img class="asg-ph-ql-logo" src="'+esc(link.logo)+'" alt="" loading="lazy">'
        :'<div class="asg-ph-ql-logo-fallback">'+fb+"</div>";
      return '<a class="asg-ph-ql-card" href="'+esc(href)+'"'+(isDead?' onclick="return false" style="opacity:.68"':' target="_blank" rel="noopener"')+">"+
        logo+
        '<span class="asg-ph-ql-title">'+esc(link.title)+"</span>"+
        '<span class="asg-ph-ql-sub">'+esc(link.sub||"Quick access")+"</span>"+
      "</a>";
    }).join("");
  }
  function loadEventsAndUpdates(){
    var panel=root.querySelector("#asgPhEventsPanel");
    if(!panel)return Promise.resolve();
    return fetch(HUB_DATA_API+"?view=all",{method:"GET",cache:"no-store"})
      .then(function(r){return r.json();})
      .then(function(payload){
        if(!payload||!payload.success||!payload.data)throw new Error("Bad hub payload");
        renderEventsPanel_ph(panel,payload.data.events||{},payload.data.updates||{});
      })
      .catch(function(){
        panel.innerHTML='<div class="asg-ph-error">Unable to load events &amp; updates right now.</div>';
      });
  }

  const calendarIcon='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="3" y="4" width="14" height="13" rx="3" stroke="#16a34a" stroke-width="1.6"/><path d="M3 8h14" stroke="#16a34a" stroke-width="1.6"/><path d="M7 2.8v2.8M13 2.8v2.8" stroke="#16a34a" stroke-width="1.6" stroke-linecap="round"/></svg>';
  const designIcon='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M4 14.5L14.2 4.3a1.6 1.6 0 0 1 2.3 0l.2.2a1.6 1.6 0 0 1 0 2.3L6.5 17H4v-2.5Z" stroke="#7c3aed" stroke-width="1.6" stroke-linejoin="round"/><path d="M12.6 5.9l1.5 1.5" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round"/></svg>';
  const landingIcon='<svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M10 3.2 3.2 8.8v7h4.7v-4.1h4.2v4.1h4.7v-7L10 3.2Z" stroke="#2563eb" stroke-width="1.6" stroke-linejoin="round"/></svg>';

  let currentListingView="active";
  let currentStatsPeriod="allTime";
  let listings={active:[],closed:[]};

  root.innerHTML=`
    <div class="asg-ph-shell">
      <div class="asg-ph-grid">
        <div class="asg-ph-card" role="region" aria-label="Personal stats">
          <div class="asg-ph-stats-head">
            <div>
              <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-blue)"></span>Personal Stats</div>
              <div class="asg-ph-profile">
                <img class="asg-ph-avatar" src="${esc(AGENT_PROFILE.photo)}" alt="${esc(AGENT_PROFILE.name)}" onerror="this.style.opacity=.3">
                <div>
                  <h2 class="asg-ph-name">${esc(AGENT_PROFILE.name)}</h2>
                  <p class="asg-ph-sub">${esc(AGENT_PROFILE.tier)}</p>
                </div>
              </div>
            </div>
            <div class="asg-ph-stats-tabs">
              <button class="asg-ph-stats-tab is-on" data-period="allTime">All Time</button>
              <button class="asg-ph-stats-tab" data-period="ytd2026">2026</button>
            </div>
          </div>
          <div class="asg-ph-kpis" id="asgPhKpis">
            ${kpiSkeleton()}
          </div>
          <div class="asg-ph-team-strip">
            <div class="asg-ph-team-top" id="asgPhTeamTop">
              <div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Total Volume (2026)</div><div class="asg-ph-team-stat-value">—</div></div>
              <div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Transactions</div><div class="asg-ph-team-stat-value">—</div></div>
            </div>
          </div>
        </div>

        <div class="asg-ph-card" role="region" aria-label="Marketing actions">
          <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-purple)"></span>Marketing Actions</div>
          <div class="asg-ph-actions">
            ${actionLink("Book a Shoot","Schedule marketing for your listing",AGENT_PROFILE.book,"rgba(34,197,94,.15)",calendarIcon)}
            ${actionLink("Design Request","Request social or print collateral",AGENT_PROFILE.request,"rgba(139,92,246,.15)",designIcon)}
            ${actionLink("My Landing Page","Open your public ASG page",AGENT_PROFILE.landing,"rgba(59,130,246,.15)",landingIcon,AGENT_PROFILE.landing)}
          </div>
        </div>
      </div>

      <div class="asg-ph-main">
        <div class="asg-ph-card" role="region" aria-label="Listing assets">
          <div class="asg-ph-list-head">
            <div>
              <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-dark)"></span>My Listing Assets</div>
              <p class="asg-ph-note">Filtered to ${esc(AGENT_PROFILE.name)}. Quick access to photos, 3D, floor plans, and collateral.</p>
            </div>
            <div class="asg-ph-tabs">
              <button class="asg-ph-tab is-on" data-view="active">Active</button>
              <button class="asg-ph-tab" data-view="closed">Closed</button>
            </div>
          </div>
          <div class="asg-ph-list" id="asgPhListings">
            <div class="asg-ph-empty">Loading listings...</div>
          </div>
        </div>

        <div class="asg-ph-card" role="region" aria-label="Marketing materials">
          <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-orange)"></span>Marketing Materials</div>
          <div class="asg-ph-downloads" id="asgPhDownloads"></div>
        </div>
      </div>

      <div class="asg-ph-bottom-row">
        <div class="asg-ph-card asg-ph-bento-grow" role="region" aria-label="Events and updates">
          <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-green)"></span>Events &amp; Updates</div>
          <p class="asg-ph-note">Next event and latest team updates from the Hub.</p>
          <div id="asgPhEventsPanel">
            <div class="asg-ph-empty">Loading events &amp; updates...</div>
          </div>
        </div>

        <div class="asg-ph-card asg-ph-bento-grow" role="region" aria-label="Quick links">
          <div class="asg-ph-label"><span class="asg-ph-label-dot" style="background:var(--asg-ph-blue)"></span>Useful Links</div>
          <p class="asg-ph-note">Handy shortcuts from the Admin Hub — tools and ASG site pages.</p>
          <div class="asg-ph-ql-scroll">
            <div class="asg-ph-ql-grid" id="asgPhQuickLinks"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="asg-ph-copy-toast" id="asgPhCopyToast">Copied URL</div>
  `;

  const kpiWrap=root.querySelector("#asgPhKpis");
  const teamTop=root.querySelector("#asgPhTeamTop");
  const listWrap=root.querySelector("#asgPhListings");
  const downloadsWrap=root.querySelector("#asgPhDownloads");
  const tabs=root.querySelectorAll(".asg-ph-tab");
  const statsTabs=root.querySelectorAll(".asg-ph-stats-tab");
  const copyToast=root.querySelector("#asgPhCopyToast");
  let copyToastTimer=null;

  downloadsWrap.innerHTML=DOWNLOADABLES.map(link=>downloadRow(link)).join("");
  const quickLinksEl=root.querySelector("#asgPhQuickLinks");
  if(quickLinksEl)renderQuickLinksGrid_ph(quickLinksEl);
  root.querySelectorAll(".asg-ph-action-circle[data-copy]").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.preventDefault();
      copyToClipboard(this.getAttribute("data-copy")||"");
      showCopyToast();
    });
  });

  tabs.forEach(btn=>{
    btn.addEventListener("click",function(){
      currentListingView=this.getAttribute("data-view")==="closed"?"closed":"active";
      tabs.forEach(tab=>tab.classList.toggle("is-on",tab===this));
      renderListings();
    });
  });

  statsTabs.forEach(btn=>{
    btn.addEventListener("click",function(){
      const period=this.getAttribute("data-period")==="ytd2026"?"ytd2026":"allTime";
      currentStatsPeriod=period;
      statsTabs.forEach(tab=>tab.classList.toggle("is-on",tab===this));
      loadStats(period);
    });
  });

  Promise.allSettled([loadStats(currentStatsPeriod),loadTeamYtd(),loadListings(),loadEventsAndUpdates()]).then(function(){ renderListings(); });

  function loadStats(period){
    const targetPeriod=period||"ytd2026";
    const periodLabel=targetPeriod==="allTime"?"All-Time":"2026";
    kpiWrap.innerHTML=kpiSkeleton(periodLabel);
    return fetch(STATS_API+"?period="+encodeURIComponent(targetPeriod),{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success||!Array.isArray(data.agents))throw new Error("Bad stats payload");
        const agent=findBestAgentMatch(data.agents,AGENT_PROFILE.name);
        if(!agent){
          kpiWrap.innerHTML='<div class="asg-ph-error" style="grid-column:1/-1">Unable to find '+esc(AGENT_PROFILE.name)+' in '+esc(periodLabel)+' stats.</div>';
          return;
        }
        const totalVolume=Number(agent.grandTotal)||0;
        const totalDeals=Number(agent.totalDeals)||0;
        const closedVol=Number(agent.closedVolume)||0;
        const pendingVol=Number(agent.pendingVolume)||0;
        const pendingDeals=Number(agent.pendingDeals)||0;
        const closedDeals=Number(agent.closedDeals)||0;
        const buyPctNum=(agent.buyPct===undefined||agent.buyPct===null)?null:Math.round(Number(agent.buyPct)||0);
        const buyPct=buyPctNum===null?"-":buyPctNum+"%";
        const sellPct=buyPctNum===null?"-":Math.max(0,100-buyPctNum)+"%";
        if(targetPeriod==="allTime"){
          kpiWrap.innerHTML=[
            kpiCard("All-Time Volume",fmt(totalVolume),totalDeals+" deals"),
            kpiCard("# Transactions",String(totalDeals),closedDeals+" closed · "+pendingDeals+" pending"),
            kpiCard("Seller Side Mix",sellPct,buyPctNum===null?"—":"Buy side "+buyPct),
            kpiCard("Buy Side Mix",buyPct,String(agent.totalZillow||0)+" Zillow reviews")
          ].join("");
        }else{
          kpiWrap.innerHTML=[
            kpiCard(periodLabel+" Volume",fmt(totalVolume),totalDeals+" deals"),
            kpiCard("Closed Volume",fmt(closedVol),closedDeals+" closed"),
            kpiCard("Pending Volume",fmt(pendingVol),pendingDeals+" pending"),
            kpiCard("Buy Side Mix",buyPct,String(agent.totalZillow||0)+" Zillow reviews")
          ].join("");
        }
      })
      .catch(()=>{
        kpiWrap.innerHTML='<div class="asg-ph-error" style="grid-column:1/-1">Unable to load '+esc(periodLabel)+' stats right now.</div>';
      });
  }

  function loadListings(){
    const fetchView=view=>fetch(LISTINGS_API+"?view="+encodeURIComponent(view),{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(d=>{
        if(!d||!Array.isArray(d.listings))throw new Error("Bad listings payload");
        return d.listings;
      })
      .then(items=>items.map(item=>({
        address:item.address||"",
        neighborhood:item.neighborhood||"",
        agent:item.agent||"",
        status:item.status||"",
        listingType:item.listingType||"",
        coverImage:item.coverImage||"",
        photos:item.photos||"",
        matterport:item.matterport||"",
        floorPlan:item.floorPlan||"",
        factSheet:item.factSheet||"",
        openHouse:item.openHouse||"",
        video:item.video||""
      })).filter(item=>normalize(item.agent)===normalize(AGENT_PROFILE.name)));

    return Promise.all([fetchView("active"),fetchView("closed")])
      .then(results=>{
        listings.active=results[0];
        listings.closed=results[1];
      })
      .catch(()=>{
        listings.active=[];
        listings.closed=[];
        listWrap.innerHTML='<div class="asg-ph-error">Unable to load listings. Check Listings API deployment.</div>';
      });
  }

  function loadTeamYtd(){
    return fetch(STATS_API+"?period=ytd2026",{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success||!data.summary)throw new Error("Bad team summary");
        const s=data.summary;
        const totalVolume=Number(s.totalVolume!==undefined?s.totalVolume:((s.closedVolume||0)+(s.pendingVolume||0)))||0;
        const totalTransactions=Number(s.totalTransactions!==undefined?s.totalTransactions:((s.closedDeals||0)+(s.pendingDeals||0)))||0;
        teamTop.innerHTML=[
          `<div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Total Volume (2026)</div><div class="asg-ph-team-stat-value">${esc(fmt(totalVolume))}</div></div>`,
          `<div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Transactions</div><div class="asg-ph-team-stat-value">${esc(String(totalTransactions))}</div></div>`
        ].join("");
      })
      .catch(()=>{
        teamTop.innerHTML=[
          `<div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Total Volume (2026)</div><div class="asg-ph-team-stat-value">—</div></div>`,
          `<div class="asg-ph-team-stat"><div class="asg-ph-team-stat-label">Team Transactions</div><div class="asg-ph-team-stat-value">—</div></div>`
        ].join("");
      });
  }

  function renderListings(){
    const items=listings[currentListingView]||[];
    if(!items.length){
      listWrap.innerHTML='<div class="asg-ph-empty">No '+esc(currentListingView)+' listings found for '+esc(AGENT_PROFILE.name)+'.</div>';
      return;
    }
    listWrap.innerHTML=items.map(item=>{
      const cover=resolveDriveImageUrl(item.coverImage);
      const status=(currentListingView==="closed")?"Closed":"Active";
      const meta=[item.neighborhood,item.listingType].filter(Boolean).join(" - ");
      return `
        <article class="asg-ph-listing">
          <div class="asg-ph-listing-top">
            ${cover?`<img class="asg-ph-listing-cover" src="${esc(cover)}" alt="${esc(item.address||'Listing')}" loading="lazy" onerror="this.style.opacity=.2">`:'<div class="asg-ph-listing-cover"></div>'}
            <div style="min-width:0">
              <h3 class="asg-ph-listing-title">${esc(item.address||"Untitled Listing")}</h3>
              <div class="asg-ph-listing-meta">${esc(meta||statusLabel(item.status||status))}</div>
            </div>
            <span class="asg-ph-badge ${currentListingView==="closed"?"is-closed":"is-active"}">${esc(status)}</span>
          </div>
          <div class="asg-ph-assets">
            ${assetLink("Photos",item.photos)}
            ${assetLink("Matterport",item.matterport)}
            ${assetLink("Floor Plan",item.floorPlan)}
            ${assetLink("Fact Sheet",item.factSheet)}
            ${assetLink("Open House",item.openHouse)}
            ${assetLink("Video",item.video)}
          </div>
        </article>
      `;
    }).join("");
  }

  function kpiSkeleton(periodLabel){
    const safeLabel=periodLabel||"All-Time";
    return [
      kpiCard(safeLabel+" Volume","-","Loading..."),
      kpiCard("Closed Volume","-","Loading..."),
      kpiCard("Pending Volume","-","Loading..."),
      kpiCard("Buy Side Mix","-","Loading...")
    ].join("");
  }
  function kpiCard(label,value,sub){
    return `<div class="asg-ph-kpi"><div class="asg-ph-kpi-label">${esc(label)}</div><div class="asg-ph-kpi-value">${esc(value)}</div><div class="asg-ph-kpi-sub">${esc(sub)}</div></div>`;
  }
  function assetLink(label,url){
    const href=safeHref(url);
    if(href==="#")return `<span class="asg-ph-asset is-off">${esc(label)}</span>`;
    return `<a class="asg-ph-asset" href="${esc(href)}" target="_blank" rel="noopener">${esc(label)}</a>`;
  }
  function downloadRow(item){
    const label=item.label;
    const url=item.href;
    const logo=item.logo;
    const updated=item.updated;
    var logoHtml=logo?`<img class="asg-ph-drive-logo" src="${esc(logo)}" alt="Google Drive" loading="lazy">`:"";
    var updatedHtml=updated?`<span class="asg-ph-download-updated">Last updated ${esc(updated)}</span>`:"";
    return `<div class="asg-ph-download-row"><div class="asg-ph-download-main"><div class="asg-ph-download-label-wrap">${logoHtml}<span class="asg-ph-download-label-stack"><span class="asg-ph-download-label">${esc(label)}</span>${updatedHtml}</span></div></div><a class="asg-ph-download-btn" href="${esc(safeHref(url))}" target="_blank" rel="noopener" aria-label="Open ${esc(label)}">Open</a></div>`;
  }
  function actionLink(title,sub,href,bg,short,copyValue){
    const safe=safeHref(href);
    const isMailOrTel=/^(mailto:|tel:)/i.test(String(href||""));
    const isAnchor=/^#/.test(safe);
    const target=(isMailOrTel||isAnchor)?"":" target=\"_blank\" rel=\"noopener\"";
    if(safe==="#"&&!isMailOrTel&&!isAnchor){
      return `<span class="asg-ph-action" style="opacity:.45;pointer-events:none"><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><span class="asg-ph-action-copy-spacer"></span><span class="asg-ph-action-arrow"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span></span>`;
    }
    if(copyValue){
      return `<div class="asg-ph-action"><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><button type="button" class="asg-ph-action-circle" data-copy="${esc(copyValue)}" aria-label="Copy link"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5.1" y="4.9" width="7.2" height="8.4" rx="1.6" stroke="currentColor" stroke-width="1.6"/><rect x="2.7" y="2.7" width="7.2" height="8.4" rx="1.6" stroke="currentColor" stroke-width="1.6"/></svg></button><a class="asg-ph-action-arrow" href="${esc(isMailOrTel?href:safe)}"${target}><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a></span></div>`;
    }
    return `<a class="asg-ph-action" href="${esc(isMailOrTel?href:safe)}"${target}><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><span class="asg-ph-action-copy-spacer"></span><span class="asg-ph-action-arrow"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span></a>`;
  }
  function copyToClipboard(text){
    const value=String(text||"").trim();
    if(!value)return;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(value).catch(function(){fallbackCopy(value);});
      return;
    }
    fallbackCopy(value);
  }
  function fallbackCopy(value){
    const ta=document.createElement("textarea");
    ta.value=value;
    ta.setAttribute("readonly","");
    ta.style.position="absolute";
    ta.style.left="-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  function showCopyToast(){
    if(!copyToast)return;
    copyToast.classList.add("show");
    if(copyToastTimer)clearTimeout(copyToastTimer);
    copyToastTimer=setTimeout(function(){
      copyToast.classList.remove("show");
    },1200);
  }
  function findBestAgentMatch(agents,targetName){
    const targetNorm=normalize(targetName);
    const targetFirst=normalize(firstName(targetName));
    let found=agents.find(a=>normalize(a&&a.name)===targetNorm);
    if(found)return found;
    found=agents.find(a=>{
      const n=normalize(a&&a.name);
      return n.startsWith(targetNorm)||targetNorm.startsWith(n);
    });
    if(found)return found;
    found=agents.find(a=>normalize(a&&a.name).includes(targetNorm));
    if(found)return found;
    const firstMatches=agents.filter(a=>normalize(firstName(a&&a.name))===targetFirst);
    if(firstMatches.length===1)return firstMatches[0];
    return null;
  }
})();
</script>
