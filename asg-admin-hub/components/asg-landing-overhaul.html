.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);}

.hero-fade{opacity:0;transform:translateY(16px);animation:heroFade .8s cubic-bezier(.16,1,.3,1) forwards;}

.btn-light{appearance:none;border:1px solid rgba(17,17,17,.2);border-radius:999px;padding:13px 24px;background:#fff;color:#111;font-family:'Outfit',sans-serif;font-size:.93rem;font-weight:700;cursor:pointer;transition:transform .18s ease,border-color .18s ease;white-space:nowrap;}

/* ─── Scroll Reveal Hook ─────────────────────────────────── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

/* ─── Counter ────────────────────────────────────────────── */
function CountUp({ end, suffix = '', prefix = '', duration = 1600, isLoading = false, loadingEnd = 0, step = 1, tickMs = 70, useLinearFinish = false }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const valRef = useRef(0);

  useEffect(() => {
    valRef.current = val;
  }, [val]);

  useEffect(() => {
    if (isLoading) {
      const target = Math.max(0, Number(loadingEnd) || 0);
      const stepSize = Math.max(1, Number(step) || 1);
      const timer = setInterval(() => {
        setVal((prev) => {
          if (prev >= target) return target;
          return Math.min(target, prev + stepSize);
        });
      }, tickMs);
      return () => clearInterval(timer);
    }

    if (useLinearFinish) {
      const target = Math.max(0, Number(end) || 0);
      const stepSize = Math.max(1, Number(step) || 1);
      const timer = setInterval(() => {
        setVal((prev) => {
          if (prev >= target) return target;
          return Math.min(target, prev + stepSize);
        });
      }, tickMs);
      return () => clearInterval(timer);
    }

    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        io.disconnect();
        const startVal = valRef.current;
        const start = Date.now();
        const tick = () => {
          const p = Math.min((Date.now() - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(startVal + (end - startVal) * ease));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.5 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, [end, duration, isLoading, loadingEnd, step, tickMs, useLinearFinish]);
  return <span ref={ref}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

/* ─── Listings ───────────────────────────────────────────── */
function Listings() {
  const visible = LISTINGS.slice(0, 3);
  const idxHostRef = useRef(null);
  const [idxReady, setIdxReady] = useState(false);

  useEffect(() => {
    const host = idxHostRef.current;
    if (!host) return;

    host.innerHTML = '';
    const injectedIds = [];
    function injectScript({ id, src }) {
      return new Promise((resolve, reject) => {
        const existing = id ? document.getElementById(id) : null;
        if (existing) {
          resolve(existing);
          return;
        }
        const el = document.createElement('script');
        el.charset = 'UTF-8';
        el.type = 'text/javascript';
        if (id) el.id = id;
        el.src = src;
        el.onload = () => resolve(el);
        el.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(el);
        if (id) injectedIds.push(id);
      });
    }

    injectScript({
      id: 'idx_jquery_include_tag',
      src: 'https://middleware.idxbroker.com/graphical/javascript/jqwidx.js?commitCacheBreaker=0954cf5973ebd92cae81c71096e6b04ffb0a2bb5'
    })
      .then(() => injectScript({
        id: 'idxwidgetsrc-33467',
        src: 'https://search.alexstoykovgroup.com/idx/customshowcasejs.php?widgetid=33467'
      }))
      .catch(() => {
        // keep static fallback if vendor scripts fail
      });

    let attempts = 0;
    const maxAttempts = 36; // ~9 seconds
    const timer = setInterval(() => {
      attempts += 1;
      const gallery = document.getElementById('IDX-showcaseGallery-33467');
      const hasGallery = !!gallery;
      const hasCells = gallery ? gallery.querySelectorAll('.IDX-showcaseCell').length >= 1 : false;
      if (hasGallery && hasCells) {
        setIdxReady(true);
        clearInterval(timer);
      } else if (attempts >= maxAttempts) {
        clearInterval(timer);
      }
    }, 250);

    return () => {
      clearInterval(timer);
      host.innerHTML = '';
      injectedIds.forEach((id) => {
        const script = document.getElementById(id);
        if (script && script.parentNode) script.parentNode.removeChild(script);
      });
    };
  }, []);

  return (
    <section id="listings" style={{ margin:'0 auto 20px', padding:'0 20px' }}>
      <div className="reveal" style={{ maxWidth:1480, margin:'0 auto', background:'#fff', border:'1px solid var(--line)', borderRadius:'var(--r-shell)', padding:28 }}>

            <p style={{ fontSize:'.76rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'rgba(17,17,17,.44)', marginBottom:6 }}>Properties</p>
            <h2 style={{ fontFamily:"'Outfit',sans-serif", fontWeight:800, fontSize:'1.65rem', letterSpacing:'-.035em' }}>Featured Listings</h2>
          </div>
          <a href="https://search.alexstoykovgroup.com/" target="_blank" rel="noopener noreferrer" style={{ textDecoration:'none' }}>
            <button className="btn-light" style={{ fontSize:'.86rem', padding:'9px 18px' }}>View All Listings</button>
          </a>
        </div>
        <div className="asg-idx-shell" ref={idxHostRef} style={{ display: idxReady ? 'block' : 'none' }} />
        <div style={{ display: idxReady ? 'none' : 'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
          {visible.map((l, i) => (
            <article key={i} className={`card-lift reveal reveal-d${(i%3)+1}`} style={{ background:'#f6f6f3', border:'1px solid var(--line)', borderRadius:'var(--r-listing)', overflow:'hidden' }}>

    { label:'Career Volume', end:659, loadingEnd:659, prefix:'$', suffix:'M+', step:6, tickMs:70, useLinearFinish:false },
    { label:'Avg. Days on Market', end:18, loadingEnd:18, prefix:'', suffix:'', step:1, tickMs:80, useLinearFinish:false },
    { label:'Total Agents', end:28, loadingEnd:28, prefix:'', suffix:'', step:1, tickMs:220, useLinearFinish:true }
  ]);

  useEffect(() => {
    const imgRadiusGuard = document.createElement('style');
    imgRadiusGuard.id = 'asg-landing-image-radius-guard';
    imgRadiusGuard.textContent = `#root img{border-radius:0 !important;}`;
    document.head.appendChild(imgRadiusGuard);

    document.documentElement.style.background = '#fff';
    const selectors = [
      '#header', 'header', '#footer', 'footer', '#headerSpacer', '#header-spacer', '.header-spacer',
      '.Header', '.Footer', '.site-header', '.site-footer', '.sqs-announcement-bar-dropzone',
      '.header-announcement-bar-wrapper', '.Header-announcement-bar-wrapper'
    ];
    const hiddenEls = [];
    selectors.forEach((selector) => {
      document.querySelectorAll(selector).forEach((el) => {
        if (el && !el.closest('#root')) {
          hiddenEls.push({
            el,
            display: el.style.display,
            visibility: el.style.visibility,
            height: el.style.height,
            minHeight: el.style.minHeight,
            margin: el.style.margin,
            padding: el.style.padding
          });
          el.style.display = 'none';
          el.style.visibility = 'hidden';
          el.style.height = '0';
          el.style.minHeight = '0';
          el.style.margin = '0';
          el.style.padding = '0';
        }
      });
    });

    const bodyPrevBg = document.body.style.background;
    const bodyPrevMargin = document.body.style.marginTop;
    const bodyPrevPadding = document.body.style.paddingTop;
    document.body.style.background = '#fff';
    document.body.style.marginTop = '0';
    document.body.style.paddingTop = '0';

    return () => {
      if (imgRadiusGuard.parentNode) imgRadiusGuard.parentNode.removeChild(imgRadiusGuard);
      hiddenEls.forEach(({ el, display, visibility, height, minHeight, margin, padding }) => {
        el.style.display = display;
        el.style.visibility = visibility;
        el.style.height = height;
        el.style.minHeight = minHeight;
        el.style.margin = margin;
        el.style.padding = padding;
      });
      document.body.style.background = bodyPrevBg;
      document.body.style.marginTop = bodyPrevMargin;
      document.body.style.paddingTop = bodyPrevPadding;
    };
  }, []);

  useEffect(() => {
    const nextStats = [
      { label:'Career Volume', end:659, loadingEnd:659, prefix:'$', suffix:'M+', step:6, tickMs:70, useLinearFinish:false },
      { label:'Avg. Days on Market', end:18, loadingEnd:18, prefix:'', suffix:'', step:1, tickMs:80, useLinearFinish:false },
      { label:'Total Agents', end:28, loadingEnd:28, prefix:'', suffix:'', step:1, tickMs:220, useLinearFinish:true }
    ];

    const requests = [];
    if (STATS_API) requests.push(fetch(STATS_API + "?period=allTime", { cache: "no-store" }).then((r) => r.json()).catch(() => null));
    if (HUB_DATA_API) requests.push(fetch(HUB_DATA_API + "?view=directory", { cache: "no-store" }).then((r) => r.json()).catch(() => null));

    if (!requests.length) return;

    Promise.all(requests)
      .then((results) => {
        results.forEach((result) => {
          if (!result || !result.success) return;

          if (result.summary) {
            const gross = Number(result.summary.grandTotal || result.summary.totalVolume || 0);
            if (gross > 0) {
              nextStats[0].end = Math.max(1, Math.round(gross / 1000000));
            }
            const dom = Number(result.summary.avgDaysOnMarket || result.summary.averageDaysOnMarket || result.summary.daysOnMarket || 0);
            if (dom > 0) {
              nextStats[1].end = Math.round(dom);
            }
          }

          const totalAgents = Number(result?.data?.directory?.summary?.total || result?.summary?.total || 0);
          if (totalAgents > 0) {
            nextStats[2].end = Math.max(totalAgents, nextStats[2].loadingEnd);
          }
        });
        setHeroStats(nextStats);
      })
      .finally(() => {
        setStatsLoading(false);
      });
  }, []);

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)' }}>
      <Nav />
      <Hero heroStats={heroStats} statsLoading={statsLoading} />
      <Listings />
      <Process />
      <Team />
      <Neighborhoods />
      <Testimonials />
      <ContactCTA />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
