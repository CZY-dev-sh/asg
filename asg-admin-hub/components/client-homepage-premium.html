  const listingsGrid = root.querySelector("#asg-home-listings-grid");
  const neighborhoodsGrid = root.querySelector("#asg-home-neighborhoods-grid");
  const testimonialsGrid = root.querySelector("#asg-home-testimonials-grid");
  const faqList = root.querySelector("#asg-home-faq-list");
  const range = root.querySelector("#asg-home-price-range");
  const rangeLabel = root.querySelector("#asg-home-price-label");

  listingsGrid.innerHTML = featuredListings.map(function(item){
    return `
      <article class="asg-home-listing">
        <div class="asg-home-listing-media">
          <span class="asg-home-chip">${esc(item.status)}</span>
          <img src="${esc(item.image)}" alt="${esc(item.address)}" loading="lazy">
        </div>
        <div class="asg-home-listing-body">
          <p class="asg-home-listing-price">${esc(item.price)}</p>
          <p class="asg-home-listing-meta">${esc(item.address)}<br>${esc(item.info)}</p>
          <a class="asg-home-btn secondary" href="#">View Details</a>
        </div>
      </article>
    `;
  }).join("");

  neighborhoodsGrid.innerHTML = neighborhoods.map(function(item){
    return `
      <article class="asg-home-neighborhood">
        <img src="${esc(item.image)}" alt="${esc(item.name)}" loading="lazy">
        <p>${esc(item.name)}</p>
      </article>
    `;
  }).join("");

  testimonialsGrid.innerHTML = testimonials.map(function(item){
    return `
      <article class="asg-home-quote">
        <p>"${esc(item.quote)}"</p>
        <small>${esc(item.author)}</small>
      </article>
    `;
  }).join("");

  faqList.innerHTML = faqs.map(function(item, idx){
    return `
      <article class="asg-home-faq-item">
        <button class="asg-home-faq-btn" data-faq-index="${idx}" type="button">
          <span>${esc(item.q)}</span>
          <span>+</span>
        </button>
        <div class="asg-home-faq-panel">${esc(item.a)}</div>
      </article>
    `;
  }).join("");

  function fmtPrice(value){
    const num = Number(value || 0);
    if(num >= 1000000){
      return "$" + (num / 1000000).toFixed(1).replace(/\.0$/,"") + "M";
    }
    return "$" + Math.round(num / 1000) + "K";
  }

  function syncRange(){
    rangeLabel.textContent = fmtPrice(range.value);
  }

  range.addEventListener("input", syncRange);
  syncRange();

  faqList.addEventListener("click", function(event){
    const btn = event.target.closest(".asg-home-faq-btn");
    if(!btn) return;
    const item = btn.closest(".asg-home-faq-item");
    const panel = item.querySelector(".asg-home-faq-panel");
    const icon = btn.querySelector("span:last-child");
    const isOpen = panel.style.display === "block";
    panel.style.display = isOpen ? "none" : "block";
    icon.textContent = isOpen ? "+" : "-";
  });
})();
</script>
