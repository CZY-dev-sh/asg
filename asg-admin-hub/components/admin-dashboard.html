<div id="asg-hero-dash"></div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
@keyframes asg-h-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes asg-h-fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes asg-h-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes asg-h-barGrow{from{width:0}to{width:var(--bar-w)}}
@keyframes asg-h-popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes asg-h-popOut{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.92) translateY(8px)}}
@keyframes asg-h-overlayIn{from{opacity:0}to{opacity:1}}
@keyframes asg-h-overlayOut{from{opacity:1}to{opacity:0}}

#asg-hero-dash{
  font-family:'Poppins',system-ui,sans-serif;color:#111;width:100%;padding:0;
  --card:#ffffff;--card-border:rgba(0,0,0,.06);--card-shadow:0 12px 40px rgba(0,0,0,.06);
  --card-radius:28px;--pill-bg:#f2f2f0;--accent:#111;
  --muted:rgba(0,0,0,.42);--muted-light:rgba(0,0,0,.25);
  --blue:#3b82f6;--yellow:#eab308;--orange:#f97316;--green:#22c55e;--purple:#8b5cf6;
}
#asg-hero-dash *{box-sizing:border-box}
.asg-h-shell{max-width:1440px;margin:0 auto;padding:0 0 32px;position:relative}

/* ── KPI STRIP ─────────────────────────────────────────────── */
.asg-h-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.asg-h-kpi{
  background:#fff;
  border:1px solid rgba(0,0,0,.06);border-radius:22px;
  box-shadow:0 12px 36px rgba(15,23,42,.06);
  padding:26px 28px;position:relative;overflow:hidden;
  animation:asg-h-fadein .5s ease both;cursor:pointer;
  transition:transform .28s ease,background .28s ease,border-color .28s ease,box-shadow .28s ease;
  transform-origin:center center;
}
.asg-h-kpi:nth-child(2){animation-delay:.06s}
.asg-h-kpi:nth-child(3){animation-delay:.12s}
.asg-h-kpi:nth-child(4){animation-delay:.18s}
.asg-h-kpi:hover{
  transform:translateY(-2px);
  background:#f8f8f6;
  border-color:rgba(0,0,0,.09);
  box-shadow:0 16px 42px rgba(15,23,42,.08);
}
.asg-h-kpi:nth-child(1):hover{
  background:#f4f7ff;
  border-color:#dce6ff;
}
.asg-h-kpi.active{
  transform:translateY(-2px);
  box-shadow:0 18px 46px rgba(15,23,42,.1);
}
.asg-h-kpi:nth-child(1).active{background:#f4f7ff;border-color:#dce6ff}
.asg-h-kpi:nth-child(2).active{background:#f4f7ff;border-color:#dce6ff}
.asg-h-kpi:nth-child(3).active{background:#f4fbf7;border-color:#d9efe1}
.asg-h-kpi:nth-child(4).active{background:#fff8f1;border-color:#f4e1c8}
.asg-h-kpi-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.asg-h-kpi-value{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1;color:#111}
.asg-h-kpi-sub{font-size:13px;color:var(--muted-light);margin-top:8px;font-weight:500}
.asg-h-kpi.is-loading .asg-h-kpi-value{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:400px 100%;animation:asg-h-shimmer 1.5s infinite;
  border-radius:8px;color:transparent;display:inline-block;min-width:100px;height:34px;
}

/* ── BENTO GRID ────────────────────────────────────────────── */
.asg-h-bento{
  display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.3fr) minmax(0,1fr);
  grid-template-rows:auto auto auto auto;gap:22px;
}
.asg-h-bottom-row{
  grid-column:1 / span 3;grid-row:3;
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;
}
.asg-h-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);padding:30px;display:flex;flex-direction:column;
  animation:asg-h-fadein .5s ease both;overflow:hidden;
}
.asg-h-card-label{
  display:inline-flex;align-items:center;gap:8px;width:fit-content;
  padding:7px 14px;border-radius:999px;background:var(--pill-bg);
  font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(0,0,0,.5);margin-bottom:18px;
}
.asg-h-card-label-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.asg-h-card h3{margin:0 0 6px;font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1;color:#111}
.asg-h-card-desc{font-size:14px;color:var(--muted);line-height:1.55;margin:0 0 18px}

/* ── LISTING HUB EMBEDDED ──────────────────────────────────── */
.asg-h-listings-hub{animation-delay:.3s}
.asg-h-listings-hub .asg-h-card-label{font-size:12px;padding:8px 15px;margin-bottom:14px}
.asg-h-listings-hub h3{font-size:24px;margin-bottom:8px}
.asg-h-listings-hub>.asg-h-card-desc{font-size:15px;margin-bottom:16px}
.asg-h-lh-controls{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:nowrap}
.asg-h-lh-controls .asg-h-lh-tabs{flex-shrink:0}
.asg-h-lh-tabs{
  display:inline-flex;gap:4px;padding:3px;height:38px;box-sizing:border-box;
  align-items:center;border-radius:999px;background:#f7f7f7;border:1px solid rgba(0,0,0,.06);
}
.asg-h-lh-tab{
  appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;
  font-size:12px;font-weight:600;padding:0 12px;height:32px;box-sizing:border-box;
  border-radius:999px;cursor:pointer;
  transition:all 180ms ease;
  display:inline-flex;align-items:center;gap:6px;
}
.asg-h-lh-tab.is-active{background:#111;color:#fff}
.asg-h-lh-tab-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.45}
.asg-h-lh-tab[data-view="active"] .asg-h-lh-tab-dot{background:#22c55e;opacity:1}
.asg-h-lh-tab-dot.is-closed{background:#ef4444;opacity:1}
.asg-h-lh-search-wrap{position:relative;flex:1;min-width:0;width:100%}
.asg-h-lh-search{
  width:100%;box-sizing:border-box;height:38px;border-radius:999px;border:1px solid rgba(0,0,0,.08);
  background:#fafafa;color:#111;padding:0 36px 0 14px;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .18s ease,background .18s ease;
}
.asg-h-lh-search:focus{background:#fff;border-color:rgba(0,0,0,.16)}
.asg-h-lh-search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;padding:0;border:0;border-radius:999px;
  background:rgba(120,120,128,.16);color:#1c1c1e;cursor:pointer;
  display:none;align-items:center;justify-content:center;line-height:1;
}
.asg-h-lh-search-clear.is-visible{display:inline-flex}
.asg-h-lh-search-clear:hover{background:rgba(120,120,128,.26)}
.asg-h-lh-search-clear svg{display:block}
.asg-h-lh-filter{
  min-width:110px;height:34px;border-radius:999px;border:1px solid rgba(0,0,0,.08);
  background:#fafafa;color:#111;padding:0 10px;font-size:11px;font-family:inherit;outline:none;
  transition:border-color .18s ease;appearance:none;-webkit-appearance:none;
}
.asg-h-lh-summary{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.asg-h-lh-pill{
  display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;
  background:#fff;border:1px solid rgba(0,0,0,.06);font-size:11px;font-weight:600;
}
.asg-h-lh-pill span{color:var(--muted);font-weight:500}
.asg-h-lh-pill.is-closed::before{
  content:"";width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;
}

.asg-h-lh-list-container{position:relative;overflow:hidden;min-height:0}
.asg-h-lh-scroll{
  overflow-y:auto;
  /* Two full card rows: 120px cover + ~86px body, 12px grid gap, small buffer */
  max-height:calc((120px + 86px) * 2 + 12px + 16px);
  padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent;
}

.asg-h-lh-list{display:flex;flex-direction:column;gap:0}
.asg-h-lh-list-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-bottom:1px solid rgba(0,0,0,.04);transition:background .15s;
  cursor:default;
}
.asg-h-lh-list-item:last-child{border-bottom:none}
.asg-h-lh-list-item:hover{background:rgba(0,0,0,.02)}
.asg-h-lh-list-thumb{
  width:72px;height:54px;min-width:72px;border-radius:6px;overflow:hidden;
  background:linear-gradient(135deg,rgba(17,17,17,.06),rgba(17,17,17,.12));
  position:relative;
}
.asg-h-lh-list-thumb img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px!important}
.asg-h-lh-list-thumb-empty{
  width:100%;height:100%;display:grid;place-items:center;color:rgba(255,255,255,.7);
  font-size:8px;font-weight:600;text-align:center;
  background:radial-gradient(circle at top left,rgba(255,255,255,.14),transparent 35%),
    linear-gradient(145deg,#3a3a3a,#1f1f1f);
}
.asg-h-lh-list-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.asg-h-lh-list-address{font-size:15px;font-weight:800;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em;line-height:1.15}
.asg-h-lh-list-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.asg-h-lh-list-details{display:flex;flex-direction:column;gap:3px}
.asg-h-lh-list-details-line{font-size:11px;color:rgba(0,0,0,.52);font-weight:600;line-height:1.35}
.asg-h-lh-list-details-line.is-price{font-size:12px;font-weight:800;color:#111;letter-spacing:-.01em}
.asg-h-lh-list-details-line.is-oh{color:#047857}
.asg-h-lh-meta-text{font-size:11px;color:var(--muted);font-weight:600;line-height:1.2}
.asg-h-lh-meta-sep{font-size:11px;color:rgba(0,0,0,.28);line-height:1}
.asg-h-lh-list-tags{display:flex;flex-direction:column;align-items:flex-start;gap:4px;flex-shrink:0}
.asg-h-lh-list-type{
  padding:3px 9px;border-radius:999px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;line-height:1;border:1px solid transparent;
}
.asg-h-lh-list-type.is-rent{background:rgba(59,130,246,.1);color:#1d4ed8;border-color:rgba(59,130,246,.24)}
.asg-h-lh-list-type.is-sale{background:rgba(16,185,129,.11);color:#047857;border-color:rgba(16,185,129,.3)}
.asg-h-lh-list-type.is-other{background:rgba(107,114,128,.1);color:#374151;border-color:rgba(107,114,128,.25)}
.asg-h-lh-list-status{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 8px;border-radius:999px;font-size:9px;font-weight:700;
  line-height:1;text-transform:uppercase;letter-spacing:.02em;flex-shrink:0;
  background:rgba(255,255,255,.95);border:1px solid rgba(17,17,17,.08);color:#111;
}
.asg-h-lh-list-status::before{
  content:"";width:6px;height:6px;border-radius:50%;background:#9ca3af;flex-shrink:0;
}
.asg-h-lh-list-status.status-closed::before{background:#ef4444}
.asg-h-lh-list-status.status-coming-soon::before{background:#8b5cf6}
.asg-h-lh-list-status.status-under-contract::before{background:#eab308}
.asg-h-lh-list-actions{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:240px}
.asg-h-lh-list-btn{
  display:inline-flex;align-items:center;justify-content:center;min-height:24px;
  padding:0 8px;border-radius:999px;border:1px solid rgba(17,17,17,.08);
  background:#f7f7f7;color:#111;text-decoration:none;font-size:8px;
  font-weight:600;line-height:1;transition:all 180ms ease;white-space:nowrap;
}
.asg-h-lh-list-btn:hover{background:#111;color:#fff;border-color:#111}
.asg-h-lh-list-btn.is-missing{pointer-events:none;opacity:.3;background:#f7f7f7;color:rgba(17,17,17,.4)}

/* Listing cards (master-dashboard style, scoped to hub) */
.asg-h-lh-card-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;
  grid-auto-rows:max-content;align-content:start;
}
.asg-h-lh-card{
  display:flex;flex-direction:column;gap:0;border:1px solid rgba(0,0,0,.08);border-radius:14px;
  overflow:hidden;background:#fff;cursor:pointer;text-align:left;width:100%;
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  font:inherit;color:inherit;padding:0;
  -webkit-appearance:none;appearance:none;
}
.asg-h-lh-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.08);border-color:rgba(0,0,0,.14)}
.asg-h-lh-card:focus-visible{outline:2px solid #111;outline-offset:2px}
.asg-h-lh-card-cover{
  position:relative;height:120px;background:linear-gradient(135deg,rgba(17,17,17,.06),rgba(17,17,17,.12));
  overflow:hidden;border-radius:14px 14px 0 0;
}
.asg-h-lh-card-cover-media{width:100%;height:100%}
.asg-h-lh-card-status{
  position:absolute;top:8px;right:8px;z-index:2;
  display:inline-flex;align-items:center;max-width:calc(100% - 16px);
  padding:5px 11px;border-radius:999px;
  font-size:10px;font-weight:700;line-height:1.2;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#fff;
  border:1px solid rgba(255,255,255,.28);
  box-shadow:0 2px 8px rgba(0,0,0,.14);
  pointer-events:none;
  backdrop-filter:blur(10px) saturate(1.35);
  -webkit-backdrop-filter:blur(10px) saturate(1.35);
  text-shadow:0 1px 2px rgba(0,0,0,.18);
}
.asg-h-lh-card-status.is-live{
  background:rgba(34,197,94,.62);
  border-color:rgba(134,239,172,.55);
  box-shadow:0 0 16px rgba(34,197,94,.48),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-contingent{
  background:rgba(250,204,21,.68);
  border-color:rgba(253,224,71,.6);
  box-shadow:0 0 16px rgba(250,204,21,.45),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-closed{
  background:rgba(239,68,68,.62);
  border-color:rgba(252,165,165,.55);
  box-shadow:0 0 16px rgba(239,68,68,.46),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-prelisting{
  background:rgba(148,163,184,.58);
  border-color:rgba(203,213,225,.5);
  box-shadow:0 0 14px rgba(148,163,184,.38),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-soon{
  background:rgba(251,146,60,.65);
  border-color:rgba(253,186,116,.55);
  box-shadow:0 0 16px rgba(251,146,60,.42),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-muted{
  background:rgba(107,114,128,.55);
  border-color:rgba(209,213,219,.45);
  box-shadow:0 0 12px rgba(107,114,128,.32),0 2px 8px rgba(0,0,0,.12);
}
.asg-h-lh-card-status.is-default{
  background:rgba(100,116,139,.55);
  border-color:rgba(203,213,225,.45);
  box-shadow:0 0 12px rgba(100,116,139,.3),0 2px 8px rgba(0,0,0,.12);
}
#asg-hero-dash .asg-h-lh-card-cover img,
#asg-hero-dash .asg-h-lh-card-cover-media img{
  width:100%;height:100%;object-fit:cover;display:block;
  border-radius:14px 14px 0 0!important;
  border:0!important;box-shadow:none!important;
}
.asg-h-lh-card-cover-empty{height:100%;display:grid;place-items:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.75);
  background:radial-gradient(circle at top left,rgba(255,255,255,.14),transparent 35%),linear-gradient(145deg,#3a3a3a,#1f1f1f)}
.asg-h-lh-card-body{padding:12px 12px 13px;display:flex;flex-direction:column;gap:7px;min-width:0}
.asg-h-lh-card-address{margin:0;font-size:14px;font-weight:800;letter-spacing:-.02em;color:#111;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-lh-card-meta{margin:0;font-size:11px;color:var(--muted);font-weight:600;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-lh-card-specs{margin:0;font-size:11px;color:rgba(0,0,0,.5);font-weight:600}

/* Listing detail overlay (fixed to viewport so Squarespace stacking cannot hide it) */
.asg-h-lh-backdrop{
  position:fixed;inset:0;background:rgba(15,23,42,.42);
  z-index:2147483640;display:none;
}
.asg-h-lh-backdrop.is-open{display:block}
#asgLhWorkspace.asg-h-lh-workspace,
#asgLhWorkspace.asg-h-lh-workspace *{
  box-sizing:border-box;
  font-family:'Poppins',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif!important;
  -webkit-font-smoothing:antialiased;
}
#asgLhWorkspace.asg-h-lh-workspace button,
#asgLhWorkspace.asg-h-lh-workspace input,
#asgLhWorkspace.asg-h-lh-workspace select,
#asgLhWorkspace.asg-h-lh-workspace textarea,
#asgLhWorkspace.asg-h-lh-workspace a{
  font-family:inherit!important;
  letter-spacing:inherit;
  text-transform:none;
}
#asgLhWorkspace.asg-h-lh-workspace{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:2147483641;display:none;flex-direction:column;
  overflow-x:hidden;overflow-y:auto;
  width:min(98vw,1680px);max-height:96vh;height:auto;
  background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:24px;
  box-shadow:0 26px 60px rgba(0,0,0,.22);
  color:#111;
}
#asgLhWorkspace.asg-h-lh-workspace.is-open{display:flex}
#asgLhWorkspace .amd-panel-head,
#asgLhWorkspace .amd-panel-head--listing{
  display:flex;flex-direction:row;align-items:center;justify-content:space-between;
  gap:16px;flex-shrink:0;padding:18px 22px 14px;
  margin:0;border-bottom:1px solid rgba(60,60,67,.12);
}
#asgLhWorkspace .amd-panel-title--listing{
  margin:0;flex:1;min-width:0;
  font-size:clamp(28px,2.2vw,40px)!important;font-weight:800!important;
  line-height:1.08!important;letter-spacing:-.04em!important;color:#111!important;
}
#asgLhWorkspace .amd-sell-overlay-actions{flex-shrink:0;margin:0 0 0 auto}
#asgLhWorkspace .amd-sell-overlay-x{
  appearance:none!important;border:0!important;
  background:#111!important;color:#fff!important;
  width:36px!important;height:36px!important;border-radius:999px!important;
  padding:0!important;display:inline-flex!important;align-items:center!important;
  justify-content:center!important;cursor:pointer!important;
  transition:background .16s ease,transform .16s ease!important;
  box-shadow:none!important;line-height:1!important;
}
#asgLhWorkspace .amd-sell-overlay-x:hover{background:#000!important;color:#fff!important}
#asgLhWorkspace .amd-sell-overlay-x:active{transform:scale(.94)}
#asgLhWorkspace .amd-sell-overlay-x svg{display:block;stroke:#fff!important}
#asgLhWorkspace .amd-sell-detail-page{
  flex:1;min-height:0;overflow:visible;
  padding:16px 20px 28px;background:#f8fafc;
}
#asgLhWorkspace .amd-lh-trio{
  margin-bottom:22px;padding-bottom:6px;
}
#asgLhWorkspace .amd-lh-trio>.amd-lh-card{height:100%}
#asgLhWorkspace .amd-lh-trio .amd-lh-fill{
  display:flex;flex-direction:column;flex:1;min-height:0;
}
#asgLhWorkspace .amd-lh-trio .amd-sell-carousel,
#asgLhWorkspace .amd-lh-trio .amd-lh-media-block{
  flex:1;display:flex;flex-direction:column;min-height:0;
}
#asgLhWorkspace .amd-lh-trio .amd-sell-carousel-img-wrap,
#asgLhWorkspace .amd-lh-trio .amd-sell-carousel-stage,
#asgLhWorkspace .amd-lh-trio .amd-lh-embed,
#asgLhWorkspace .amd-lh-trio .amd-sell-cover-empty{

}
#asgLhWorkspace .amd-lh-edit-chips.is-readonly .amd-lh-status-chip{

}
#asgLhWorkspace .amd-lh-status{padding:16px;margin-bottom:10px}
#asgLhWorkspace .amd-lh-card{padding:14px 16px}
#asgLhWorkspace .amd-lh-stage-content{gap:10px}
@media(max-width:900px){
  .asg-h-lh-card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}

.asg-h-lh-empty,.asg-h-lh-loading,.asg-h-lh-error{

}
.asg-h-lh-loading-spinner{

  border-top-color:#111;margin:0 auto 7px;animation:hubSpin .8s linear infinite;
}
@keyframes hubSpin{to{transform:rotate(360deg)}}

.asg-h-quick-links{animation-delay:.34s}
.asg-h-listings-hub,.asg-h-quick-links{padding:24px}
.asg-h-ql-top{
  display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;
  margin-bottom:14px;
}
.asg-h-ql-head{min-width:0;flex:1}
.asg-h-ql-search-wrap{width:min(360px,100%);display:flex;flex-direction:column;gap:8px}
.asg-h-ql-search{
  width:100%;height:42px;border:1.5px solid rgba(0,0,0,.08);border-radius:999px;
  padding:0 15px;background:#fafafa;color:#111;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .18s ease,background .18s ease,box-shadow .18s ease;
}
.asg-h-ql-search:focus{
  background:#fff;border-color:rgba(0,0,0,.16);box-shadow:0 0 0 4px rgba(0,0,0,.03);
}
.asg-h-ql-helper{font-size:11px;color:var(--muted);padding-left:4px}
.asg-h-ql-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.asg-h-ql-btn{
  display:flex;align-items:center;gap:10px;min-height:68px;padding:12px 13px;
  background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:16px;
  text-decoration:none;transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;
  color:#111;
}
.asg-h-ql-btn:hover{
  background:#f3f3f1;border-color:rgba(0,0,0,.1);
  transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,23,42,.06);
}
.asg-h-ql-logo-wrap{
  width:38px;height:38px;min-width:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid rgba(0,0,0,.06);overflow:hidden;
}
.asg-h-ql-logo{width:22px;height:22px;object-fit:contain;display:block}
.asg-h-ql-logo-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;letter-spacing:.08em;color:rgba(0,0,0,.56);
}
.asg-h-ql-logo-fallback--icon{
  width:30px;height:30px;border-radius:9px;
  background:rgba(59,130,246,.1);
  border:1px solid rgba(59,130,246,.24);
  color:#3b82f6;
}
.asg-h-ql-logo-fallback--icon svg{
  width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.asg-h-ql-text{min-width:0;display:flex;flex-direction:column}
.asg-h-ql-title{font-size:13px;font-weight:700;color:#111;line-height:1.15}
.asg-h-ql-sub{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-ql-empty{
  text-align:center;padding:24px 18px;border:1px dashed rgba(0,0,0,.1);border-radius:18px;
  color:var(--muted);font-size:14px;background:#fafafa;
}

/* ── LEFT: TEAM DIRECTORY ──────────────────────────────────── */
.asg-h-directory{grid-column:1;grid-row:1 / span 2;animation-delay:.1s}
.asg-h-dir-search{
  width:100%;height:46px;border:1.5px solid rgba(0,0,0,.08);border-radius:999px;
  padding:0 18px;font-size:14px;font-family:inherit;color:#111;outline:none;
  background:#fafafa;transition:border-color .2s;margin-bottom:12px;
}
.asg-h-dir-search:focus{border-color:rgba(0,0,0,.2);background:#fff}
.asg-h-dir-scroll-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.asg-h-dir-results{
  overflow-y:auto;max-height:668px;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent;
  padding-bottom:36px;
}
.asg-h-dir-fade{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,rgba(255,255,255,0),rgba(255,255,255,1));
  pointer-events:none;z-index:2;
}
.asg-h-dir-item{
  display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:14px;
  cursor:pointer;transition:background .15s;
}
.asg-h-dir-item:hover{background:rgba(0,0,0,.03)}
.asg-h-dir-item-photo{
  width:38px;height:38px;min-width:38px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-dir-item-photo.is-init{
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#666;background:#ececec;
}
.asg-h-dir-item-info{flex:1;min-width:0}
.asg-h-dir-item-name{font-size:14px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-dir-item-role{font-size:11px;color:var(--muted);font-weight:500}
.asg-h-dir-item-actions{display:flex;gap:5px;flex-shrink:0}
.asg-h-dir-act{
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(0,0,0,.08);background:#fafafa;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;text-decoration:none;
}
.asg-h-dir-act:hover{background:#111;border-color:#111}
.asg-h-dir-act:hover svg{stroke:#fff}
.asg-h-dir-act svg{width:14px;height:14px;stroke:#555;stroke-width:1.8;fill:none}
.asg-h-dir-jump{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding-top:10px;font-size:14px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:color .15s;text-decoration:none;
}
.asg-h-dir-jump:hover{color:#111}

/* ── POPUP ─────────────────────────────────────────────────── */
.asg-h-overlay{
  position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.asg-h-overlay.is-entering{animation:asg-h-overlayIn .25s ease both}
.asg-h-overlay.is-leaving{animation:asg-h-overlayOut .2s ease both}
.asg-h-popup{
  background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.18);
  width:min(400px,92vw);max-height:90vh;overflow-y:auto;padding:36px 32px 28px;position:relative;
}
.asg-h-popup.is-entering{animation:asg-h-popIn .35s cubic-bezier(.34,1.56,.64,1) both}
.asg-h-popup.is-leaving{animation:asg-h-popOut .2s ease both}
.asg-h-popup-close{
  position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.05);border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .15s;
}
.asg-h-popup-close:hover{background:rgba(0,0,0,.1)}
.asg-h-popup-close svg{width:16px;height:16px;stroke:#555;stroke-width:2;fill:none}
.asg-h-popup-top{display:flex;align-items:center;gap:18px;margin-bottom:22px}
.asg-h-popup-photo{width:72px;height:72px;min-width:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(0,0,0,.06);background:#eee}
.asg-h-popup-photo.is-init{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#666;background:#ececec}
.asg-h-popup-name{font-size:22px;font-weight:800;letter-spacing:-.02em;color:#111;margin:0 0 4px}
.asg-h-popup-badges{display:flex;gap:6px;flex-wrap:wrap}
.asg-h-popup-badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid rgba(0,0,0,.08)}
.asg-h-popup-badge.tier-senior{background:#111;color:#fff;border-color:#111}
.asg-h-popup-badge.tier-junior{background:#eaf2ff;color:#2157a6;border-color:#cfe0ff}
.asg-h-popup-badge.tier-admin{background:#f4efe2;color:#7c5b11;border-color:#e7d7ab}
.asg-h-popup-line{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-top:1px solid rgba(0,0,0,.06)}
.asg-h-popup-line:first-child{border-top:0;padding-top:0}
.asg-h-popup-line-label{color:var(--muted);font-size:13px;flex:0 0 auto}
.asg-h-popup-line-value{color:#111;font-size:14px;font-weight:600;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asg-h-popup-line-value a{color:inherit;text-decoration:none}
.asg-h-popup-line-value a:hover{text-decoration:underline}
.asg-h-popup-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.asg-h-popup-btn{
  display:inline-flex;align-items:center;justify-content:center;min-height:46px;
  padding:0 16px;border-radius:999px;font-size:14px;font-weight:700;
  text-decoration:none;transition:all .15s;border:1px solid rgba(0,0,0,.08);cursor:pointer;font-family:inherit;
}
.asg-h-popup-btn.primary{background:#111;color:#fff;border-color:#111}
.asg-h-popup-btn.primary:hover{background:#333}
.asg-h-popup-btn.secondary{background:#f4f4f2;color:#111}
.asg-h-popup-btn.secondary:hover{background:#eaeae8}

/* TOAST */
.asg-h-copied{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;padding:10px 22px;border-radius:999px;
  font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:all .25s ease;z-index:10001;
}
.asg-h-copied.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CENTER TOP: MARKETING ASSETS ──────────────────────────── */
.asg-h-marketing{grid-column:2;grid-row:2;animation-delay:.2s}
.asg-h-mkt-folders{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.asg-h-mkt-folder{
  display:flex;flex-direction:column;justify-content:flex-end;
  min-height:100px;padding:14px;
  background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.06);
  border-radius:20px;text-decoration:none;
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.asg-h-mkt-folder:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.07)}
.asg-h-mkt-folder-icon{
  position:absolute;top:14px;left:14px;
  width:40px;height:30px;border-radius:8px 8px 10px 10px;
  background:linear-gradient(180deg,#8ec5ff,#56a8ff);
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.08);
}
.asg-h-mkt-folder-icon::before{
  content:"";position:absolute;top:-6px;left:5px;
  width:18px;height:10px;border-radius:6px 6px 0 0;background:#9dd0ff;
}
.asg-h-mkt-folder-name{font-size:13px;font-weight:700;color:#111;line-height:1.2;word-break:break-word}
.asg-h-mkt-folder.is-loading{pointer-events:none;opacity:.5}
.asg-h-mkt-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
.asg-h-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;padding:0 20px;border-radius:14px;
  text-decoration:none;font-size:14px;font-weight:700;
  transition:all .2s;white-space:nowrap;border:none;cursor:pointer;font-family:inherit;
}
.asg-h-btn-dark{background:#111;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.asg-h-btn-dark:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(0,0,0,.16)}
.asg-h-btn-light{background:#f4f4f2;color:#111;border:1px solid rgba(0,0,0,.06)}
.asg-h-btn-light:hover{background:#eee}

/* ── CENTER BOTTOM: INSIGHTS ───────────────────────────────── */
.asg-h-insights{grid-column:2;grid-row:1;animation-delay:.15s}
.asg-h-ins-pills{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.asg-h-ins-pill{
  padding:8px 16px;border-radius:999px;border:1.5px solid rgba(0,0,0,.08);
  background:#fff;color:rgba(0,0,0,.45);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.asg-h-ins-pill:hover{border-color:rgba(0,0,0,.2);color:rgba(0,0,0,.7)}
.asg-h-ins-pill.active{background:#111;color:#fff;border-color:#111}
.asg-h-ins-scroll-wrap{flex:1;position:relative;overflow:visible}
.asg-h-ins-body{overflow-y:auto;overflow-x:visible;max-height:380px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent;padding-bottom:36px}
.asg-h-ins-fade{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,rgba(255,255,255,0),rgba(255,255,255,1));
  pointer-events:none;z-index:2;
}

/* Leaderboard */
.asg-h-lb-total{font-size:28px;font-weight:800;letter-spacing:-.03em;color:#111;margin-bottom:4px}
.asg-h-lb-sub{font-size:13px;color:var(--muted-light);margin-bottom:18px;font-weight:500}
.asg-h-lb-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;position:relative}
.asg-h-lb-hit{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.asg-h-lb-name{
  width:90px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;
  cursor:pointer;transition:color .18s ease;
}
.asg-h-lb-name:hover{color:#111}
.asg-h-lb-bar-wrap{flex:1;height:28px;background:rgba(0,0,0,.03);border-radius:14px;overflow:hidden;position:relative}
.asg-h-lb-bar{
  height:100%;border-radius:14px;display:flex;align-items:center;padding:0 12px;
  font-size:11px;font-weight:700;color:#fff;white-space:nowrap;
  animation:asg-h-barGrow .8s cubic-bezier(.25,.46,.45,.94) both;
  width:var(--bar-w);min-width:fit-content;
}
.asg-h-lb-float{
  position:fixed;top:0;left:0;width:340px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:24px;
  box-shadow:0 28px 70px rgba(0,0,0,.16);padding:18px;z-index:10020;
  opacity:0;visibility:hidden;transform:translateY(10px) scale(.97);
  transition:opacity .18s ease,transform .18s ease,visibility .18s ease;
}
.asg-h-lb-float.show{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.asg-h-lb-hover-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.asg-h-lb-hover-photo{
  width:48px;height:48px;min-width:48px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-lb-hover-photo.is-init{
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#666;background:#ececec;
}
.asg-h-lb-hover-name{font-size:16px;font-weight:800;line-height:1.1;color:#111}
.asg-h-lb-hover-role{font-size:11px;color:var(--muted);margin-top:2px}
.asg-h-lb-hover-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;
}
.asg-h-lb-hover-stat{
  padding:10px 12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:14px;
}
.asg-h-lb-hover-stat-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.38);margin-bottom:4px;
}
.asg-h-lb-hover-stat-value{
  font-size:14px;font-weight:800;color:#111;line-height:1.1;
}
.asg-h-lb-hover-chart-wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;margin-bottom:12px}
.asg-h-lb-mini-bars{padding:12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:16px}
.asg-h-lb-mini-bar-row+.asg-h-lb-mini-bar-row{margin-top:10px}
.asg-h-lb-mini-bar-label{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.42);margin-bottom:6px}
.asg-h-lb-mini-bar-track{height:8px;background:rgba(0,0,0,.06);border-radius:999px;overflow:hidden}
.asg-h-lb-mini-bar-fill{height:100%;border-radius:999px}
.asg-h-lb-mini-rings{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.asg-h-lb-ring-card{padding:12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:16px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;overflow:hidden}
.asg-h-lb-ring{
  --pct:0; position:relative; width:56px;height:56px;border-radius:50%;margin:0 auto;
  background:conic-gradient(#111 calc(var(--pct) * 1%), rgba(0,0,0,.08) 0);
  display:grid;place-items:center;flex-shrink:0;
}
.asg-h-lb-ring::before{content:"";position:absolute;inset:8px;border-radius:50%;background:#fff;display:block}
.asg-h-lb-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#111;line-height:1;margin:0;pointer-events:none;z-index:2}
.asg-h-lb-ring-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.42);line-height:1.1;text-align:center}
.asg-h-lb-hover-btn{
  width:100%;min-height:42px;border:none;border-radius:999px;background:#111;color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
}
.asg-h-lb-hover-btn:hover{background:#2a2a2a}

.asg-h-agent-modal{
  background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.18);
  width:min(560px,92vw);max-height:90vh;overflow-y:auto;padding:34px 30px 28px;position:relative;
}
.asg-h-agent-modal-top{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.asg-h-agent-modal-photo{
  width:74px;height:74px;min-width:74px;border-radius:50%;object-fit:cover;border:3px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-agent-modal-photo.is-init{
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#666;background:#ececec;
}
.asg-h-agent-modal-name{font-size:24px;font-weight:800;letter-spacing:-.03em;color:#111;line-height:1.05}
.asg-h-agent-modal-role{font-size:13px;color:var(--muted);margin-top:3px}
.asg-h-agent-modal-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;
}
.asg-h-agent-modal-stat{
  padding:14px;background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:18px;
}
.asg-h-agent-modal-stat-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.38);margin-bottom:6px;
}
.asg-h-agent-modal-stat-value{
  font-size:18px;font-weight:800;color:#111;line-height:1.05;
}
.asg-h-agent-modal-chart-area{
  display:flex;justify-content:center;align-items:center;margin:18px 0 8px;
}
.asg-h-agent-modal-chart-card{
  padding:14px;background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:18px;
}
.asg-h-agent-modal-rings{
  display:grid;grid-template-columns:repeat(2,minmax(128px,148px));gap:14px;justify-content:center;width:100%;
}
.asg-h-agent-modal-rings .asg-h-lb-ring-card{
  min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 12px;
}
.asg-h-agent-modal-rings .asg-h-lb-ring{width:76px;height:76px;margin:0 auto 10px}

.asg-h-agent-modal-rings .asg-h-lb-ring-val{font-size:14px}
.asg-h-agent-modal-btn{
  width:100%;min-height:76px;border:none;border-radius:999px;background:#06070a;color:#fff;
  font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;position:relative;z-index:3;

.asg-h-agent-modal-btn:hover{background:#111319}

/* Recent deals */
.asg-h-rd-item{

.asg-h-rd-item:last-child{border-bottom:none}
.asg-h-rd-item:hover{background:rgba(0,0,0,.02)}
.asg-h-rd-photo{width:38px;height:38px;min-width:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,0,0,.06);background:#eee}

.asg-h-rd-info{flex:1;min-width:0}
.asg-h-rd-addr{font-size:15px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-rd-agent{font-size:12px;color:var(--muted);font-weight:500}
.asg-h-rd-right{text-align:right;flex-shrink:0}
.asg-h-rd-price{font-size:15px;font-weight:800;color:#111}
.asg-h-rd-badge{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-top:4px;
}

/* Stage health */
.asg-h-sh-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.asg-h-sh-row:last-child{border-bottom:none}
.asg-h-sh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.asg-h-sh-label{flex:1;font-size:14px;font-weight:600;color:#111}
.asg-h-sh-count{font-size:22px;font-weight:800;color:#111;min-width:40px;text-align:right}
.asg-h-sh-vol{font-size:12px;color:var(--muted);text-align:right;min-width:80px}
.asg-h-sh-bar-wrap{flex:1.5;height:8px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden;max-width:160px}
.asg-h-sh-bar{height:100%;border-radius:4px;animation:asg-h-barGrow .8s ease both;width:var(--bar-w)}

/* ── RIGHT: MARKETING ACTIONS ──────────────────────────────── */
.asg-h-actions{grid-column:3;grid-row:1 / span 2;animation-delay:.25s}
.asg-h-agents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.asg-h-agent-thumb{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 4px;border-radius:16px;cursor:pointer;
  transition:all .2s;text-decoration:none;border:2px solid transparent;background:transparent;
}
.asg-h-agent-thumb:hover{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}

.asg-h-agent-thumb-photo{
  width:42px;height:42px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);transition:all .2s;
}
.asg-h-agent-thumb.selected .asg-h-agent-thumb-photo{border-color:var(--blue)}
.asg-h-agent-thumb-name{font-size:10px;font-weight:600;color:var(--muted);text-align:center;line-height:1.15;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asg-h-agent-thumb.selected .asg-h-agent-thumb-name{color:#111;font-weight:700}

.asg-h-agent-actions-area{min-height:0;overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1)}
.asg-h-agent-actions-area.collapsed{max-height:0;opacity:0;margin:0}
.asg-h-agent-actions-area.expanded{max-height:500px;opacity:1;margin-top:12px}
.asg-h-selected-agent-header{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);
  border-radius:16px;margin-bottom:12px;
}
.asg-h-selected-agent-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(59,130,246,.2)}
.asg-h-selected-agent-name{font-size:14px;font-weight:700;color:#111;flex:1}
.asg-h-selected-agent-clear{
  width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.05);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;font-family:inherit;
}
.asg-h-selected-agent-clear:hover{background:rgba(0,0,0,.1)}
.asg-h-selected-agent-clear svg{width:14px;height:14px;stroke:#555;stroke-width:2;fill:none}

.asg-h-act-grid{display:flex;flex-direction:column;gap:8px}
.asg-h-act-btn{
  display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;
  background:#fafafa;border:1px solid rgba(0,0,0,.06);text-decoration:none;
  transition:all .15s;cursor:pointer;
}
.asg-h-act-btn:hover{background:#f0f0f0;border-color:rgba(0,0,0,.1);transform:translateY(-1px)}
.asg-h-act-icon{width:38px;height:38px;min-width:38px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.asg-h-act-icon svg{width:18px;height:18px}
.asg-h-act-text{flex:1;min-width:0}
.asg-h-act-title{font-size:14px;font-weight:700;color:#111;line-height:1.2}
.asg-h-act-sub{font-size:11px;color:var(--muted);margin-top:1px}
.asg-h-act-arrow{color:rgba(0,0,0,.18);flex-shrink:0;transition:color .15s}
.asg-h-act-btn:hover .asg-h-act-arrow{color:rgba(0,0,0,.45)}
.asg-h-act-placeholder{
  text-align:center;padding:28px 16px;color:var(--muted-light);font-size:14px;font-weight:500;
  border:1.5px dashed rgba(0,0,0,.1);border-radius:16px;
}

/* RESPONSIVE */
@media(max-width:1200px){
  .asg-h-bento{grid-template-columns:1fr 1fr;grid-template-rows:auto}
  .asg-h-directory{grid-column:1;grid-row:1}

  #asgLhWorkspace .amd-lh-roadmap-track::before {
    content: "";
    position: absolute;
    /* Center the rail on the dot midpoint (dot height 28px → midpoint 14px,
       line is 2px → top:13px puts the rail exactly through the dot center). */
    top: 13px;
    /* Rail starts at the first dot's center and ends at the last dot's center,
       so the offsets equal half a column width. */
    left: calc(50% / var(--amd-roadmap-cols));
    right: calc(50% / var(--amd-roadmap-cols));
    height: 2px;
    background: rgba(60, 60, 67, 0.14);
    border-radius: 999px;
    z-index: 0;

  #asgLhWorkspace .amd-lh-roadmap-track::after {
    content: "";
    position: absolute;
    top: 13px;
    left: calc(50% / var(--amd-roadmap-cols));
    /* The rail spans (100% − 1 column). Multiply by --amd-roadmap-progress
       (a unitless 0–1 value) to keep the gradient aligned to the dot
       centers regardless of column count. */
    width: calc((100% - 100% / var(--amd-roadmap-cols)) * var(--amd-roadmap-progress, 0));
    height: 2px;
    background: linear-gradient(90deg, #34c759, #007aff);
    border-radius: 999px;

  function parseDate(raw){
    if(raw==null)return null;
    if(typeof raw==="number"&&isFinite(raw)){
      if(raw>1000000000000){
        const epochMsDate=new Date(raw);
        if(!isNaN(epochMsDate.getTime()))return epochMsDate;
      }
      if(raw>1000000000&&raw<1000000000000){
        const epochSecDate=new Date(raw*1000);
        if(!isNaN(epochSecDate.getTime()))return epochSecDate;
      }
      if(raw>25000&&raw<80000){
        const serialDate=new Date(Math.round((raw-25569)*86400*1000));
        if(!isNaN(serialDate.getTime()))return serialDate;
      }
    }
    const txt=String(raw).trim();
    if(!txt)return null;
    if(/^\d+(\.\d+)?$/.test(txt)){
      const numVal=Number(txt);
      if(isFinite(numVal)){
        if(numVal>1000000000000){
          const txtEpochMsDate=new Date(numVal);
          if(!isNaN(txtEpochMsDate.getTime()))return txtEpochMsDate;
        }
        if(numVal>1000000000&&numVal<1000000000000){
          const txtEpochSecDate=new Date(numVal*1000);
          if(!isNaN(txtEpochSecDate.getTime()))return txtEpochSecDate;
        }
        if(numVal>25000&&numVal<80000){
          const txtSerialDate=new Date(Math.round((numVal-25569)*86400*1000));
          if(!isNaN(txtSerialDate.getTime()))return txtSerialDate;
        }
      }
    }
    const d=new Date(txt);
    if(!isNaN(d.getTime()))return d;
    const m=txt.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if(m){
      let yr=Number(m[3]);
      if(yr<100)yr+=2000;
      const usDate=new Date(yr,Number(m[1])-1,Number(m[2]));
      if(!isNaN(usDate.getTime()))return usDate;
    }
    return null;
  }

    try{

        month:"long",
        day:"numeric",
        year:"numeric"
      });

    }
  }

    try{

  function resolveDriveImageUrl(url){
    const raw=String(url||"").trim();
    if(!raw)return"";
    if(!/drive\.google\.com|docs\.google\.com/.test(raw))return raw;
    if(/\/drive\/folders\//.test(raw))return"";

    const filePathMatch=raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(filePathMatch&&filePathMatch[1]){
      return `https://drive.google.com/thumbnail?id=${filePathMatch[1]}&sz=w1200`;
    }

    const idParamMatch=raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(idParamMatch&&idParamMatch[1]){
      return `https://drive.google.com/thumbnail?id=${idParamMatch[1]}&sz=w1200`;
    }

    return raw;
  }

  function positionLeaderboardFloat(rowEl){
    if(!rowEl) return;
    const rect=rowEl.getBoundingClientRect();
    const gap=18;
    const cardW=340;
    let left=rect.right + gap;
    let top=rect.top + rect.height/2;
    if(left + cardW > window.innerWidth - 18){
      left=Math.max(18, rect.left - cardW - gap);
    }
    const maxTop=window.innerHeight - leaderboardFloat.offsetHeight - 18;
    const safeTop=Math.min(Math.max(18, top - leaderboardFloat.offsetHeight/2), Math.max(18,maxTop));
    leaderboardFloat.style.left=left+"px";
    leaderboardFloat.style.top=safeTop+"px";
  }

  function showLeaderboardFloat(agent,rowEl){

  function hideLeaderboardFloat(force){

      ?`${filtered.length} shortcut${filtered.length===1?"":"s"} found`

  function normalizeListingRow(item){
    const row=Object.assign({},item||{});
    row.address=row.address||"";
    row.neighborhood=row.neighborhood||"";
    row.agent=row.agent||"";
    row.agentCanonical=row.agentCanonical||row.agent||"";
    row.archived=!!row.archived;
    return row;
  }

  function normalizeListingAgent(row){
    return String((row&&(row.agentCanonical||row.agent))||"").trim();
  }

  function listingIsClosed(row){
    if(!row)return false;
    if(row.archived===true||String(row.archived).toLowerCase()==="true")return true;
    const key=normalizeText(row.phaseKey||row.status||row.phase||"");
    return key.indexOf("closed")>-1||key.indexOf("sold")>-1;
  }

  function listingIsCancelled(row){
    if(!row)return false;
    const key=normalizeText(row.phaseKey||row.status||row.phase||"");
    return key.indexOf("cancel")>-1;
  }

  function sortListingsNewestFirst(rows){
    return (rows||[]).slice().sort((a,b)=>{
      const ra=Number(a.sheetRow||a._sheetOrder||0);
      const rb=Number(b.sheetRow||b._sheetOrder||0);
      return rb-ra;
    });
  }

  function looksLikeFloorPlanImage(value){
    const s=String(value||"").toLowerCase();
    return /floor[\s_.-]*plan|floorplan|cubicasa|2d[\s_.-]*(floor|plan|fp)|\bfp[\s_.-]|blueprint|site[\s_.-]*plan|schematic|matterport[\s_.-]*floor|layout[\s_.-]*plan/i.test(s);
  }

  const lhCardCoverPrefetch=new Set();
  const lhCardCoverOverrides={};

  function pickListingPhotoCover(addr){
    const photos=lhSellDetail.photoCacheByAddress&&lhSellDetail.photoCacheByAddress[addr];
    if(!photos||!photos.length)return"";
    for(let i=0;i<photos.length;i++){
      const p=photos[i]||{};
      const u=toLhCoverUrl(p.url||p.viewUrl||p.src||"");
      if(u&&!looksLikeFloorPlanImage(u)&&!looksLikeFloorPlanImage(p.name))return u;
    }
    return"";
  }

  function resolveListingCardCover(item){
    const addr=String(item&&item.address||"").trim();
    if(addr&&lhCardCoverOverrides[addr])return lhCardCoverOverrides[addr];
    const rawCover=String(item&&item.coverImage||"").trim();
    let cover=toLhCoverUrl(rawCover);
    if(cover&&!looksLikeFloorPlanImage(cover)&&!looksLikeFloorPlanImage(rawCover))return cover;
    const cached=pickListingPhotoCover(addr);
    if(cached)return cached;
    return"";
  }

  function prefetchListingCardCovers(items){
    const queue=(items||[]).filter(item=>{
      const addr=String(item.address||"").trim();
      if(!addr||lhCardCoverPrefetch.has(addr))return false;
      if(!String(item.photos||"").trim())return false;
      if(resolveListingCardCover(item))return false;
      return looksLikeFloorPlanImage(item.coverImage)||!item.coverImage;
    }).slice(0,8);
    queue.forEach(item=>{
      const addr=String(item.address||"").trim();
      lhCardCoverPrefetch.add(addr);
      const sep=LISTINGS_API.indexOf("?")>=0?"&":"?";
      fetch(LISTINGS_API+sep+"view=listingphotos&address="+encodeURIComponent(addr),{method:"GET",cache:"no-store"})
        .then(r=>r.ok?r.json():Promise.reject())
        .then(data=>{
          const photos=Array.isArray(data&&data.photos)?data.photos:[];
          lhSellDetail.photoCacheByAddress[addr]=photos;
          const url=pickListingPhotoCover(addr);
          if(url){
            lhCardCoverOverrides[addr]=url;
            renderListingCards(getFilteredListings());
          }
        })
        .catch(()=>{});
    });
  }

  function listingPhaseLabel(row){
    const raw=String((row&&(row.phaseKey||row.status||row.phase))||"").trim();
    if(!raw)return"—";
    const key=raw.toLowerCase().replace(/[\s_\-]+/g,"");
    if(/prelisting|prelist/.test(key)||key.indexOf("pre")===0&&key.indexOf("list")>-1)return"Coming Soon";
    return raw
      .replace(/([a-z])([A-Z])/g,"$1 $2")
      .replace(/[_\-]+/g," ")
      .replace(/\s+/g," ")
      .replace(/\b\w/g,c=>c.toUpperCase());
  }

  function listingChipLabels(row){
    const phase=listingPhaseLabel(row);
    return phase&&phase!=="—"?[phase]:[];
  }

  function listingCardStatusKey(row){
    const raw=String((row&&(row.phaseKey||row.status||row.phase))||"").toLowerCase().trim();
    return raw.replace(/[\s_\-]+/g,"");
  }

  function listingCardStatusLabel(row){
    const key=listingCardStatusKey(row);
    if(!key)return"";
    if(/prelisting|prelist/.test(key)||key.indexOf("pre")===0&&key.indexOf("list")>-1)return"Coming Soon";
    if(/live|active/.test(key))return"Live";
    if(/undercontract|contract|contingent|pending/.test(key))return"Contingent";
    if(/closed|sold/.test(key))return"Closed";
    if(/coming|soon/.test(key))return"Coming Soon";
    const label=listingPhaseLabel(row);
    if(/under\s*contract/i.test(label))return"Contingent";
    return label==="—"?"":label;
  }

  function listingCardStatusTone(row){
    const key=listingCardStatusKey(row);
    if(!key)return"is-default";
    if(/prelisting|prelist/.test(key)||key.indexOf("pre")===0&&key.indexOf("list")>-1)return"is-prelisting";
    if(/live|active/.test(key))return"is-live";
    if(/undercontract|contract|contingent|pending/.test(key))return"is-contingent";
    if(/closed|sold/.test(key))return"is-closed";
    if(/coming|soon/.test(key))return"is-soon";
    if(/off|withdraw|expir/.test(key))return"is-muted";
    return"is-default";
  }

  function matchesListingQuery(parts,query){
    const q=normalizeText(query);
    if(!q)return true;
    return parts.join(" ").toLowerCase().indexOf(q)>-1;
  }

  function toLhCoverUrl(url){
    const raw=String(url||"").trim();
    if(!raw)return"";
    const m=raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(m&&m[1])return"https://lh3.googleusercontent.com/d/"+m[1]+"=w1200";
    const q=raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(q&&q[1])return"https://lh3.googleusercontent.com/d/"+q[1]+"=w1200";
    return resolveDriveImageUrl(raw);
  }

  function resolveAgentPhotoByName(agentName){
    const key=String(agentName||"").trim().toLowerCase();

  function getScopedListingRows(){
    return lhState.rows.filter(row=>{
      if(lhState.view==="active"&&listingIsCancelled(row))return false;
      const closed=listingIsClosed(row);
      return lhState.view==="closed"?closed:!closed;

  function getFilteredListings(){
    const query=lhSearch?lhSearch.value||"":"";

    function listingPhaseLabel(row) {
      var raw = String((row && (row.phaseKey || row.status || row.phase)) || "").trim();
      if (!raw) return "—";
      var key = raw.toLowerCase().replace(/[\s_\-]+/g, "");
      if (/prelisting|prelist/.test(key) || (key.indexOf("pre") === 0 && key.indexOf("list") > -1)) return "Coming Soon";
      if (/coming|soon/.test(key)) return "Coming Soon";
      if (/live|active/.test(key)) return "Live";
      if (/undercontract|contract|contingent|pending/.test(key)) return "Contingent";
      if (/closed|sold/.test(key)) return "Closed";
      return raw
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[_\-]+/g, " ")
        .replace(/\s+/g, " ")
        .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }
    function listingPhaseChipTone(label) {
      var k = String(label || "").toLowerCase();
      if (/coming/.test(k)) return "is-blue";
      if (/live|active/.test(k)) return "is-green";
      if (/contingent|under|pending/.test(k)) return "is-yellow";
      if (/closed|sold/.test(k)) return "is-muted";
      return "is-blue";
    }
    function buildOptionList(options, current, formatLabel) {
      var seen = {};
      var out = [];
      var trimmed = String(current || "").trim();
      function push(displayLabel, value) {
        var key = String(value || "").toLowerCase().trim();
        if (!key || seen[key]) return;
        seen[key] = true;
        var sel = trimmed && trimmed.toLowerCase() === key ? " selected" : "";
        out.push('<option value="' + esc(value) + '"' + sel + ">" + esc(displayLabel) + "</option>");
      }
      if (trimmed) {
        var disp = formatLabel ? formatLabel(trimmed) : trimmed;
        push(disp, trimmed);
      }
      for (var i = 0; i < options.length; i++) {
        push(options[i], options[i]);
      }
      return out.join("");
    }

    // Determine the marketing action-plan completion + which stage the

    function getMarketingActionPlanState(row, address) {

      // Stage 2 if: photos already delivered (link on sheet), both action-plan
      // steps done, or user clicked Continue locally.
      var stage = override || bothDone || hasPhotosLink ? 2 : 1;
      return {
        stage: stage,
        questionnaireSent: questionnaireSent,
        marketingBooked: marketingBooked,
        bookingDate: bookingDate,
        bothDone: bothDone,
        hasPhotosLink: hasPhotosLink
      };
    }
    function parseListingBookingDate(row) {
      var raw = row && (row.photosDatetime || row.photoBookingAt || row.acuityDatetime);
      if (!raw) return null;
      // photosDatetime is typically an ISO string from Acuity. Parse defensively.
      var d = parseDate(raw);
      return d && !isNaN(d.getTime()) ? d : null;
    }
    function formatBookingDate(d) {
      if (!d || isNaN(d.getTime())) return "";
      try {
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
      } catch (e) {
        return d.toDateString();
      }
    }
    function formatBookingTime(d) {
      if (!d || isNaN(d.getTime())) return "";
      try {

      } catch (e) {
        return "";
      }
    }
    function bookingDateLabel(d) {
      var dt = formatBookingDate(d);
      var tm = formatBookingTime(d);
      if (dt && tm) return dt + " · " + tm;
      return dt || tm || "";
    }

    // Stage-1 overlay: Marketing Action Plan checklist (Send Questionnaire +

    // ── Marketing delivery ETA helpers ─────────────────────────────────────
    // Photos/Matterport: booking + 1 calendar day. Floor plan: +2 business
    // days. Video: +5 business days from filming. Marketing materials: +1
    // business day from when the request is submitted. Per spec we only ever
    // surface the *date*, never the "hours" duration.
    function addCalendarDays(d, n) {
      if (!d || isNaN(d.getTime())) return null;
      var out = new Date(d.getTime());
      out.setDate(out.getDate() + n);
      return out;
    }
    function addBusinessDays(d, n) {
      if (!d || isNaN(d.getTime())) return null;
      var out = new Date(d.getTime());
      var added = 0;
      while (added < n) {
        out.setDate(out.getDate() + 1);
        var dow = out.getDay();
        if (dow !== 0 && dow !== 6) added++;
      }
      return out;
    }
    var SERVICE_DELIVERY_OFFSETS = {
      photos:               { mode: "calendar",  days: 1 },
      matterport:           { mode: "calendar",  days: 1 },
      floor_plan:           { mode: "business",  days: 2 },
      video:                { mode: "business",  days: 5 },
      marketing_materials:  { mode: "business",  days: 1 }
    };
    function computeServiceEta(serviceKey, anchorDate) {
      if (!anchorDate) return null;
      var cfg = SERVICE_DELIVERY_OFFSETS[serviceKey];
      if (!cfg) return null;
      return cfg.mode === "business"
        ? addBusinessDays(anchorDate, cfg.days)
        : addCalendarDays(anchorDate, cfg.days);
    }
    // List of services covered by the marketing booking. When Acuity wires
    // this through (description parsing on the Apps Script side), it will
    // come back as row.servicesBooked = ["photos","matterport",…]. Until
    // then we assume the standard 4-service shoot is booked together.
    var DEFAULT_BOOKED_SERVICES = ["photos", "matterport", "floor_plan", "video"];
    function listingHasService(row, key) {
      if (isRentalOnlyListing(row)) return key === "photos";
      var list = row && row.servicesBooked;
      if (Array.isArray(list) && list.length) {
        for (var i = 0; i < list.length; i++) {
          if (String(list[i]).toLowerCase().replace(/\s+/g, "_") === key) return true;
        }
        return false;
      }
      return DEFAULT_BOOKED_SERVICES.indexOf(key) >= 0;
    }
    // Derive a milestone's display state from sheet fields. Returns one of:
    //   not_booked | booked | editing | delivered
    // (for marketing materials the equivalent enum is not_requested |
    //  requested | building | delivered — we use that nomenclature on the
    //  status label only; the tone/state machine is identical).
    function getCaptureServiceState(row, key) {
      var statusField = {
        photos: "photosStatus",
        matterport: "matterportStatus",
        floor_plan: "floorPlanStatus",
        video: "videoStatus"
      }[key];
      var urlField = {
        photos: "photos",
        matterport: "matterport",
        floor_plan: "floorPlan",
        video: "video"
      }[key];
      var raw = String((row && row[statusField]) || "").trim().toLowerCase();
      var hasAsset = !!String((row && row[urlField]) || "").trim();
      var booked = !!parseListingBookingDate(row) && listingHasService(row, key);
      if (hasAsset || raw.indexOf("deliver") >= 0 || raw.indexOf("done") >= 0 || raw.indexOf("complete") >= 0 || raw.indexOf("ready") >= 0) {
        return "delivered";
      }
      if (raw.indexOf("edit") >= 0 || raw.indexOf("retouch") >= 0 || raw.indexOf("post") >= 0) return "editing";
      if (raw.indexOf("book") >= 0 || raw.indexOf("schedul") >= 0 || booked) return "booked";
      return "not_booked";
    }
    // Returns the *next* (soonest-future) open-house request from a row's
    // marketingRequests JSON array, or null. We sort future requests
    // ascending so an agent with consecutive-weekend OHs sees the closest
    // deadline first. Past requests are ignored except for status rollup.
    function getNextOpenHouseRequest(row) {
      var list = row && row.marketingRequests;
      if (!Array.isArray(list) || !list.length) return null;
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var upcoming = list.filter(function (r) {
        if (!r || !r.open_house_date) return false;
        var d = parseDate(r.open_house_date);
        return d && d >= today;
      });
      if (!upcoming.length) return null;
      upcoming.sort(function (a, b) {
        return String(a.open_house_date).localeCompare(String(b.open_house_date));
      });
      return upcoming[0];
    }
    function getWeekStartDate(refDate) {
      var d = refDate ? new Date(refDate) : new Date();
      if (isNaN(d.getTime())) d = new Date();
      var dow = d.getDay();
      var delta = dow === 0 ? -6 : 1 - dow;
      d.setDate(d.getDate() + delta);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function isTimestampInCurrentWeek(isoStr) {
      if (!isoStr) return false;
      var t = parseDate(isoStr);
      if (!t) return false;
      var ws = getWeekStartDate();
      var we = new Date(ws.getTime());
      we.setDate(we.getDate() + 7);
      return t >= ws && t < we;
    }
    function marketingRequestIncludesOpenHouse(rec) {
      if (!rec) return false;
      var mats = rec.materials;
      if (Array.isArray(mats)) {
        for (var mi = 0; mi < mats.length; mi++) {
          if (/open\s*house/i.test(String(mats[mi] || ""))) return true;
        }
      }
      var blob = String(rec.notes || "") + " " + String(rec.asana_task_url || "");
      return /open\s*house|broker\s*tour|door\s*hanger|directional/i.test(blob);
    }
    function pickCurrentWeekOpenHouseRequest(row) {
      var list = row && row.marketingRequests;
      if (!Array.isArray(list) || !list.length) return null;
      var best = null;
      var bestAt = "";
      for (var i = 0; i < list.length; i++) {
        var r = list[i] || {};
        if (!marketingRequestIncludesOpenHouse(r)) continue;
        var at = String(r.requested_at || r.open_house_date || "").trim();
        if (!isTimestampInCurrentWeek(at)) continue;
        if (!best || at > bestAt) {
          best = r;
          bestAt = at;
        }
      }
      return best;
    }
    function hasDeliverableAssetUrl(raw) {
      var u = String(raw || "").trim();
      if (!u) return false;
      if (u === "#" || u === "—" || u === "-") return false;
      return /^https?:\/\//i.test(u) || /drive\.google\.com|docs\.google\.com/i.test(u);
    }
    function getFactSheetState(row) {
      if (!row) return "not_requested";
      if (hasDeliverableAssetUrl(row.factSheet)) return "delivered";
      var raw = String(row.factSheetStatus || "").trim().toLowerCase();
      if (raw.indexOf("deliver") >= 0 || raw.indexOf("done") >= 0 || raw.indexOf("complete") >= 0) return "delivered";
      if (raw.indexOf("build") >= 0 || raw.indexOf("progress") >= 0 || raw.indexOf("on it") >= 0) return "building";
      if (raw.indexOf("request") >= 0) return "requested";
      return "not_requested";
    }
    /** Weekly open-house materials: not_requested → requested → building → delivered (resets each Monday). */
    function getOpenHouseMaterialsState(row) {
      if (!row) return "not_requested";
      if (hasDeliverableAssetUrl(row.openHouseMaterialsUrl)) return "delivered";
      var pick = pickCurrentWeekOpenHouseRequest(row);
      if (pick) {
        var ps = String(pick.status || "").trim().toLowerCase();
        if (ps === "delivered") return "delivered";
        if (ps === "building" || ps.indexOf("progress") >= 0 || ps.indexOf("on it") >= 0) return "building";
        return "requested";
      }
      var raw = String(row.openHouseMaterialsStatus || "").trim().toLowerCase();
      var requestedAt = row.openHouseMaterialsRequestedAt || "";
      var deliveredAt = row.openHouseMaterialsDeliveredAt || "";
      if (!isTimestampInCurrentWeek(requestedAt) && !isTimestampInCurrentWeek(deliveredAt)) {
        return "not_requested";
      }
      if (raw.indexOf("deliver") >= 0 || raw.indexOf("done") >= 0 || raw.indexOf("complete") >= 0) return "delivered";
      if (raw.indexOf("build") >= 0 || raw.indexOf("progress") >= 0 || raw.indexOf("on it") >= 0) return "building";
      if (raw.indexOf("request") >= 0) return "requested";
      return "not_requested";
    }
    function getMarketingMaterialsState(row) {
      // Prefer the structured request list when present — its statuses are
      // authoritative since they come from Asana custom fields.
      var list = row && row.marketingRequests;
      if (Array.isArray(list) && list.length) {
        var anyBuilding = false, anyRequested = false, anyUndelivered = false;
        for (var i = 0; i < list.length; i++) {
          var s = String(list[i].status || "").trim().toLowerCase();
          if (s === "delivered") continue;
          anyUndelivered = true;
          if (s === "building" || s === "in progress" || s.indexOf("on it") >= 0) anyBuilding = true;
          else if (s === "requested" || s === "new") anyRequested = true;
        }
        if (!anyUndelivered) return "delivered";
        if (anyBuilding) return "building";
        if (anyRequested) return "requested";
      }
      var raw = String((row && row.marketingStatus) || "").trim().toLowerCase();
      if (raw.indexOf("deliver") >= 0 || raw === "done" || raw.indexOf("complete") >= 0) return "delivered";
      if (raw.indexOf("progress") >= 0 || raw.indexOf("build") >= 0 || raw.indexOf("working") >= 0 || raw.indexOf("on it") >= 0) return "building";
      if (raw && raw.indexOf("not") < 0 && raw !== "n/a" && raw !== "none") return "requested";
      return "not_requested";
    }
    // Tone (drives roadmap dot color) for each state-machine value.
    var SERVICE_STATE_TONE = {
      not_booked:     "pending",
      not_requested:  "pending",
      booked:         "progress",
      requested:      "progress",
      editing:        "waiting",
      building:       "waiting",
      delivered:      "done"
    };
    // Human-readable label for each state, including an optional date.
    function serviceStateLabel(state, dateStr) {
      switch (state) {
        case "not_booked":    return "Not Booked";
        case "not_requested": return "Not Requested";
        case "booked":        return dateStr ? "Booked · " + dateStr : "Booked";
        case "requested":     return dateStr ? "Requested · " + dateStr : "Requested";
        case "editing":       return "Editing";
        case "building":      return "Building";
        case "delivered":     return "Delivered";
        default:              return "Not Booked";
      }
    }

    // Stage-2 "Marketing Status" section: horizontal roadmap of milestones
    // with checkpoints + dates + delivery ETAs. Driven by the Listing Hub
    // sheet (photos_status / photos_datetime / matterport_status / etc.).
    function renderMarketingStatusSection(active, address /*, agentBookUrl, agentRequestUrl */) {
      var rentalOnly = isRentalOnlyListing(active);
      var bookingDate = parseListingBookingDate(active);
      var bookingLabel = bookingDate ? formatBookingDate(bookingDate) : "";
      var sq = getSellerQuestionnaire(active);
      var qSent = !!String(active && (active.sellerQuestionnaireSent || active.sellerQuestionnaireSentAt) || "").trim() ||
                  !!(sq.answers && sq.answers.length) ||

    // Resolve a single milestone's status using {URL present → Done,
    // explicit status field, sane fallback}. Returns { label, tone } where
    // tone drives the pill color (done/progress/waiting/pending).
    function resolveMilestoneStatus(rawStatus, hasUrl, fallbackTone) {
      if (hasUrl) return { label: "Done", tone: "done" };
      var raw = String(rawStatus || "").trim();
      if (!raw) return { label: "Not Started", tone: fallbackTone || "pending" };
      var key = raw.toLowerCase();
      if (
        key === "not started" ||
        key === "not scheduled" ||
        key === "n/a" ||
        key === "none" ||
        key === "tbd" ||
        key === "—" ||
        key === "-"
      ) {
        return { label: "Not Started", tone: fallbackTone || "pending" };
      }
      if (
        key.indexOf("done") >= 0 ||
        key.indexOf("complete") >= 0 ||
        key.indexOf("delivered") >= 0 ||
        key.indexOf("received") >= 0 ||
        key.indexOf("ready") >= 0 ||
        key.indexOf("live") >= 0
      ) {
        return { label: titleCase(raw), tone: "done" };
      }
      if (key.indexOf("progress") >= 0 || key.indexOf("scheduled") >= 0 || key.indexOf("booked") >= 0) {
        return { label: titleCase(raw), tone: "progress" };
      }
      if (key.indexOf("request") >= 0 || key.indexOf("pending") >= 0 || key.indexOf("waiting") >= 0) {
        return { label: titleCase(raw), tone: "waiting" };
      }
      return { label: titleCase(raw), tone: fallbackTone || "pending" };
    }

    }
