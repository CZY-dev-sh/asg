<div id="asg-hero-dash"></div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
@keyframes asg-h-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes asg-h-fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes asg-h-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes asg-h-barGrow{from{width:0}to{width:var(--bar-w)}}
@keyframes asg-h-popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes asg-h-popOut{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.92) translateY(8px)}}
@keyframes asg-h-overlayIn{from{opacity:0}to{opacity:1}}
@keyframes asg-h-overlayOut{from{opacity:1}to{opacity:0}}

#asg-hero-dash{
  font-family:'Poppins',system-ui,sans-serif;color:#111;width:100%;padding:0;
  --card:#ffffff;--card-border:rgba(0,0,0,.06);--card-shadow:0 12px 40px rgba(0,0,0,.06);
  --card-radius:28px;--pill-bg:#f2f2f0;--accent:#111;
  --muted:rgba(0,0,0,.42);--muted-light:rgba(0,0,0,.25);
  --blue:#3b82f6;--yellow:#eab308;--orange:#f97316;--green:#22c55e;--purple:#8b5cf6;
}
#asg-hero-dash *{box-sizing:border-box}
.asg-h-shell{max-width:1440px;margin:0 auto;padding:0 0 32px}

/* ── KPI STRIP ─────────────────────────────────────────────── */
.asg-h-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.asg-h-kpi{
  background:#fff;
  border:1px solid rgba(0,0,0,.06);border-radius:22px;
  box-shadow:0 12px 36px rgba(15,23,42,.06);
  padding:26px 28px;position:relative;overflow:hidden;
  animation:asg-h-fadein .5s ease both;cursor:pointer;
  transition:transform .28s ease,background .28s ease,border-color .28s ease,box-shadow .28s ease;
  transform-origin:center center;
}
.asg-h-kpi:nth-child(2){animation-delay:.06s}
.asg-h-kpi:nth-child(3){animation-delay:.12s}
.asg-h-kpi:nth-child(4){animation-delay:.18s}
.asg-h-kpi:hover{
  transform:translateY(-2px);
  background:#f8f8f6;
  border-color:rgba(0,0,0,.09);
  box-shadow:0 16px 42px rgba(15,23,42,.08);
}
.asg-h-kpi:nth-child(1):hover{
  background:#f4f7ff;
  border-color:#dce6ff;
}
.asg-h-kpi.active{
  transform:translateY(-2px);
  box-shadow:0 18px 46px rgba(15,23,42,.1);
}
.asg-h-kpi:nth-child(1).active{background:#f4f7ff;border-color:#dce6ff}
.asg-h-kpi:nth-child(2).active{background:#f4f7ff;border-color:#dce6ff}
.asg-h-kpi:nth-child(3).active{background:#f4fbf7;border-color:#d9efe1}
.asg-h-kpi:nth-child(4).active{background:#fff8f1;border-color:#f4e1c8}
.asg-h-kpi-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.asg-h-kpi-value{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1;color:#111}
.asg-h-kpi-sub{font-size:13px;color:var(--muted-light);margin-top:8px;font-weight:500}
.asg-h-kpi.is-loading .asg-h-kpi-value{
  background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:400px 100%;animation:asg-h-shimmer 1.5s infinite;
  border-radius:8px;color:transparent;display:inline-block;min-width:100px;height:34px;
}

/* ── BENTO GRID ────────────────────────────────────────────── */
.asg-h-bento{
  display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.3fr) minmax(0,1fr);
  grid-template-rows:auto auto auto auto;gap:22px;
}
.asg-h-bottom-row{
  grid-column:1 / span 3;grid-row:3;
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;
}
.asg-h-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);padding:30px;display:flex;flex-direction:column;
  animation:asg-h-fadein .5s ease both;overflow:hidden;
}
.asg-h-card-label{
  display:inline-flex;align-items:center;gap:8px;width:fit-content;
  padding:7px 14px;border-radius:999px;background:var(--pill-bg);
  font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(0,0,0,.5);margin-bottom:18px;
}
.asg-h-card-label-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.asg-h-card h3{margin:0 0 6px;font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1;color:#111}
.asg-h-card-desc{font-size:14px;color:var(--muted);line-height:1.55;margin:0 0 18px}

/* ── LISTING HUB EMBEDDED ──────────────────────────────────── */
.asg-h-listings-hub{animation-delay:.3s}
.asg-h-lh-controls{display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.asg-h-lh-tabs{display:inline-flex;gap:3px;padding:3px;border-radius:999px;background:#f7f7f7;border:1px solid rgba(0,0,0,.06)}
.asg-h-lh-tab{
  appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;
  font-size:10px;font-weight:600;padding:5px 10px;border-radius:999px;cursor:pointer;
  transition:all 180ms ease;
  display:inline-flex;align-items:center;gap:6px;
}
.asg-h-lh-tab.is-active{background:#111;color:#fff}
.asg-h-lh-tab-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.45}
.asg-h-lh-tab-dot.is-closed{background:#ef4444;opacity:1}
.asg-h-lh-search{
  flex:1;min-width:160px;height:34px;border-radius:999px;border:1px solid rgba(0,0,0,.08);
  background:#fafafa;color:#111;padding:0 12px;font-size:11px;font-family:inherit;outline:none;
  transition:border-color .18s ease,background .18s ease;
}
.asg-h-lh-search:focus{background:#fff;border-color:rgba(0,0,0,.16)}
.asg-h-lh-filter{
  min-width:110px;height:34px;border-radius:999px;border:1px solid rgba(0,0,0,.08);
  background:#fafafa;color:#111;padding:0 10px;font-size:11px;font-family:inherit;outline:none;
  transition:border-color .18s ease;appearance:none;-webkit-appearance:none;
}
.asg-h-lh-summary{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.asg-h-lh-pill{
  display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;
  background:#fff;border:1px solid rgba(0,0,0,.06);font-size:10px;font-weight:600;
}
.asg-h-lh-pill span{color:var(--muted);font-weight:500}
.asg-h-lh-pill.is-closed::before{
  content:"";width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;
}

.asg-h-lh-list-container{position:relative;overflow:hidden;min-height:0}
.asg-h-lh-scroll{overflow-y:auto;max-height:380px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent}
.asg-h-lh-fade{
  position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(to bottom,rgba(255,255,255,0),rgba(255,255,255,1));
  pointer-events:none;z-index:2;
}

.asg-h-lh-list{display:flex;flex-direction:column;gap:0}
.asg-h-lh-list-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-bottom:1px solid rgba(0,0,0,.04);transition:background .15s;
  cursor:default;
}
.asg-h-lh-list-item:last-child{border-bottom:none}
.asg-h-lh-list-item:hover{background:rgba(0,0,0,.02)}
.asg-h-lh-list-thumb{
  width:72px;height:54px;min-width:72px;border-radius:6px;overflow:hidden;
  background:linear-gradient(135deg,rgba(17,17,17,.06),rgba(17,17,17,.12));
  position:relative;
}
.asg-h-lh-list-thumb img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px!important}
.asg-h-lh-list-thumb-empty{
  width:100%;height:100%;display:grid;place-items:center;color:rgba(255,255,255,.7);
  font-size:8px;font-weight:600;text-align:center;
  background:radial-gradient(circle at top left,rgba(255,255,255,.14),transparent 35%),
    linear-gradient(145deg,#3a3a3a,#1f1f1f);
}
.asg-h-lh-list-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.asg-h-lh-list-address{font-size:15px;font-weight:800;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em;line-height:1.15}
.asg-h-lh-list-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.asg-h-lh-meta-text{font-size:11px;color:var(--muted);font-weight:600;line-height:1.2}
.asg-h-lh-meta-sep{font-size:11px;color:rgba(0,0,0,.28);line-height:1}
.asg-h-lh-list-tags{display:flex;flex-direction:column;align-items:flex-start;gap:4px;flex-shrink:0}
.asg-h-lh-list-type{
  padding:3px 9px;border-radius:999px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;line-height:1;border:1px solid transparent;
}
.asg-h-lh-list-type.is-rent{background:rgba(59,130,246,.1);color:#1d4ed8;border-color:rgba(59,130,246,.24)}
.asg-h-lh-list-type.is-sale{background:rgba(16,185,129,.11);color:#047857;border-color:rgba(16,185,129,.3)}
.asg-h-lh-list-type.is-other{background:rgba(107,114,128,.1);color:#374151;border-color:rgba(107,114,128,.25)}
.asg-h-lh-list-status{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 8px;border-radius:999px;font-size:9px;font-weight:700;
  line-height:1;text-transform:uppercase;letter-spacing:.02em;flex-shrink:0;
  background:rgba(255,255,255,.95);border:1px solid rgba(17,17,17,.08);color:#111;
}
.asg-h-lh-list-status::before{
  content:"";width:6px;height:6px;border-radius:50%;background:#9ca3af;flex-shrink:0;
}
.asg-h-lh-list-status.status-closed::before{background:#ef4444}
.asg-h-lh-list-status.status-coming-soon::before{background:#8b5cf6}
.asg-h-lh-list-status.status-under-contract::before{background:#eab308}
.asg-h-lh-list-actions{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:240px}
.asg-h-lh-list-btn{
  display:inline-flex;align-items:center;justify-content:center;min-height:24px;
  padding:0 8px;border-radius:999px;border:1px solid rgba(17,17,17,.08);
  background:#f7f7f7;color:#111;text-decoration:none;font-size:8px;
  font-weight:600;line-height:1;transition:all 180ms ease;white-space:nowrap;
}
.asg-h-lh-list-btn:hover{background:#111;color:#fff;border-color:#111}
.asg-h-lh-list-btn.is-missing{pointer-events:none;opacity:.3;background:#f7f7f7;color:rgba(17,17,17,.4)}

.asg-h-lh-empty,.asg-h-lh-loading,.asg-h-lh-error{
  padding:20px 14px;border-radius:14px;background:#fafafa;border:1px solid rgba(0,0,0,.06);
  text-align:center;color:var(--muted);font-size:11px;
}
.asg-h-lh-loading-spinner{
  width:18px;height:18px;border-radius:50%;border:2px solid rgba(17,17,17,.12);
  border-top-color:#111;margin:0 auto 7px;animation:hubSpin .8s linear infinite;
}
@keyframes hubSpin{to{transform:rotate(360deg)}}

.asg-h-quick-links{animation-delay:.34s}
.asg-h-listings-hub,.asg-h-quick-links{padding:24px}
.asg-h-ql-top{
  display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;
  margin-bottom:14px;
}
.asg-h-ql-head{min-width:0;flex:1}
.asg-h-ql-search-wrap{width:min(360px,100%);display:flex;flex-direction:column;gap:8px}
.asg-h-ql-search{
  width:100%;height:42px;border:1.5px solid rgba(0,0,0,.08);border-radius:999px;
  padding:0 15px;background:#fafafa;color:#111;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .18s ease,background .18s ease,box-shadow .18s ease;
}
.asg-h-ql-search:focus{
  background:#fff;border-color:rgba(0,0,0,.16);box-shadow:0 0 0 4px rgba(0,0,0,.03);
}
.asg-h-ql-helper{font-size:11px;color:var(--muted);padding-left:4px}
.asg-h-ql-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.asg-h-ql-btn{
  display:flex;align-items:center;gap:10px;min-height:68px;padding:12px 13px;
  background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:16px;
  text-decoration:none;transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;
  color:#111;
}
.asg-h-ql-btn:hover{
  background:#f3f3f1;border-color:rgba(0,0,0,.1);
  transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,23,42,.06);
}
.asg-h-ql-logo-wrap{
  width:38px;height:38px;min-width:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid rgba(0,0,0,.06);overflow:hidden;
}
.asg-h-ql-logo{width:22px;height:22px;object-fit:contain;display:block}
.asg-h-ql-logo-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;letter-spacing:.08em;color:rgba(0,0,0,.56);
}
.asg-h-ql-logo-fallback--icon{
  width:30px;height:30px;border-radius:9px;
  background:rgba(59,130,246,.1);
  border:1px solid rgba(59,130,246,.24);
  color:#3b82f6;
}
.asg-h-ql-logo-fallback--icon svg{
  width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.asg-h-ql-text{min-width:0;display:flex;flex-direction:column}
.asg-h-ql-title{font-size:13px;font-weight:700;color:#111;line-height:1.15}
.asg-h-ql-sub{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-ql-empty{
  text-align:center;padding:24px 18px;border:1px dashed rgba(0,0,0,.1);border-radius:18px;
  color:var(--muted);font-size:14px;background:#fafafa;
}

/* ── LEFT: TEAM DIRECTORY ──────────────────────────────────── */
.asg-h-directory{grid-column:1;grid-row:1 / span 2;animation-delay:.1s}
.asg-h-dir-search{
  width:100%;height:46px;border:1.5px solid rgba(0,0,0,.08);border-radius:999px;
  padding:0 18px;font-size:14px;font-family:inherit;color:#111;outline:none;
  background:#fafafa;transition:border-color .2s;margin-bottom:12px;
}
.asg-h-dir-search:focus{border-color:rgba(0,0,0,.2);background:#fff}
.asg-h-dir-scroll-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.asg-h-dir-results{
  overflow-y:auto;max-height:668px;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent;
  padding-bottom:36px;
}
.asg-h-dir-fade{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,rgba(255,255,255,0),rgba(255,255,255,1));
  pointer-events:none;z-index:2;
}
.asg-h-dir-item{
  display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:14px;
  cursor:pointer;transition:background .15s;
}
.asg-h-dir-item:hover{background:rgba(0,0,0,.03)}
.asg-h-dir-item-photo{
  width:38px;height:38px;min-width:38px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-dir-item-photo.is-init{
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#666;background:#ececec;
}
.asg-h-dir-item-info{flex:1;min-width:0}
.asg-h-dir-item-name{font-size:14px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-dir-item-role{font-size:11px;color:var(--muted);font-weight:500}
.asg-h-dir-item-actions{display:flex;gap:5px;flex-shrink:0}
.asg-h-dir-act{
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(0,0,0,.08);background:#fafafa;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;text-decoration:none;
}
.asg-h-dir-act:hover{background:#111;border-color:#111}
.asg-h-dir-act:hover svg{stroke:#fff}
.asg-h-dir-act svg{width:14px;height:14px;stroke:#555;stroke-width:1.8;fill:none}
.asg-h-dir-jump{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding-top:10px;font-size:14px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:color .15s;text-decoration:none;
}
.asg-h-dir-jump:hover{color:#111}

/* ── POPUP ─────────────────────────────────────────────────── */
.asg-h-overlay{
  position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.asg-h-overlay.is-entering{animation:asg-h-overlayIn .25s ease both}
.asg-h-overlay.is-leaving{animation:asg-h-overlayOut .2s ease both}
.asg-h-popup{
  background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.18);
  width:min(400px,92vw);max-height:90vh;overflow-y:auto;padding:36px 32px 28px;position:relative;
}
.asg-h-popup.is-entering{animation:asg-h-popIn .35s cubic-bezier(.34,1.56,.64,1) both}
.asg-h-popup.is-leaving{animation:asg-h-popOut .2s ease both}
.asg-h-popup-close{
  position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.05);border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .15s;
}
.asg-h-popup-close:hover{background:rgba(0,0,0,.1)}
.asg-h-popup-close svg{width:16px;height:16px;stroke:#555;stroke-width:2;fill:none}
.asg-h-popup-top{display:flex;align-items:center;gap:18px;margin-bottom:22px}
.asg-h-popup-photo{width:72px;height:72px;min-width:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(0,0,0,.06);background:#eee}
.asg-h-popup-photo.is-init{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#666;background:#ececec}
.asg-h-popup-name{font-size:22px;font-weight:800;letter-spacing:-.02em;color:#111;margin:0 0 4px}
.asg-h-popup-badges{display:flex;gap:6px;flex-wrap:wrap}
.asg-h-popup-badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid rgba(0,0,0,.08)}
.asg-h-popup-badge.tier-senior{background:#111;color:#fff;border-color:#111}
.asg-h-popup-badge.tier-junior{background:#eaf2ff;color:#2157a6;border-color:#cfe0ff}
.asg-h-popup-badge.tier-admin{background:#f4efe2;color:#7c5b11;border-color:#e7d7ab}
.asg-h-popup-line{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-top:1px solid rgba(0,0,0,.06)}
.asg-h-popup-line:first-child{border-top:0;padding-top:0}
.asg-h-popup-line-label{color:var(--muted);font-size:13px;flex:0 0 auto}
.asg-h-popup-line-value{color:#111;font-size:14px;font-weight:600;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asg-h-popup-line-value a{color:inherit;text-decoration:none}
.asg-h-popup-line-value a:hover{text-decoration:underline}
.asg-h-popup-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.asg-h-popup-btn{
  display:inline-flex;align-items:center;justify-content:center;min-height:46px;
  padding:0 16px;border-radius:999px;font-size:14px;font-weight:700;
  text-decoration:none;transition:all .15s;border:1px solid rgba(0,0,0,.08);cursor:pointer;font-family:inherit;
}
.asg-h-popup-btn.primary{background:#111;color:#fff;border-color:#111}
.asg-h-popup-btn.primary:hover{background:#333}
.asg-h-popup-btn.secondary{background:#f4f4f2;color:#111}
.asg-h-popup-btn.secondary:hover{background:#eaeae8}

/* TOAST */
.asg-h-copied{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;padding:10px 22px;border-radius:999px;
  font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:all .25s ease;z-index:10001;
}
.asg-h-copied.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CENTER TOP: MARKETING ASSETS ──────────────────────────── */
.asg-h-marketing{grid-column:2;grid-row:2;animation-delay:.2s}
.asg-h-mkt-folders{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.asg-h-mkt-folder{
  display:flex;flex-direction:column;justify-content:flex-end;
  min-height:100px;padding:14px;
  background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.06);
  border-radius:20px;text-decoration:none;
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.asg-h-mkt-folder:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.07)}
.asg-h-mkt-folder-icon{
  position:absolute;top:14px;left:14px;
  width:40px;height:30px;border-radius:8px 8px 10px 10px;
  background:linear-gradient(180deg,#8ec5ff,#56a8ff);
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.08);
}
.asg-h-mkt-folder-icon::before{
  content:"";position:absolute;top:-6px;left:5px;
  width:18px;height:10px;border-radius:6px 6px 0 0;background:#9dd0ff;
}
.asg-h-mkt-folder-name{font-size:13px;font-weight:700;color:#111;line-height:1.2;word-break:break-word}
.asg-h-mkt-folder.is-loading{pointer-events:none;opacity:.5}
.asg-h-mkt-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
.asg-h-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;padding:0 20px;border-radius:14px;
  text-decoration:none;font-size:14px;font-weight:700;
  transition:all .2s;white-space:nowrap;border:none;cursor:pointer;font-family:inherit;
}
.asg-h-btn-dark{background:#111;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.asg-h-btn-dark:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(0,0,0,.16)}
.asg-h-btn-light{background:#f4f4f2;color:#111;border:1px solid rgba(0,0,0,.06)}
.asg-h-btn-light:hover{background:#eee}

/* ── CENTER BOTTOM: INSIGHTS ───────────────────────────────── */
.asg-h-insights{grid-column:2;grid-row:1;animation-delay:.15s}
.asg-h-ins-pills{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.asg-h-ins-pill{
  padding:8px 16px;border-radius:999px;border:1.5px solid rgba(0,0,0,.08);
  background:#fff;color:rgba(0,0,0,.45);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.asg-h-ins-pill:hover{border-color:rgba(0,0,0,.2);color:rgba(0,0,0,.7)}
.asg-h-ins-pill.active{background:#111;color:#fff;border-color:#111}
.asg-h-ins-scroll-wrap{flex:1;position:relative;overflow:visible}
.asg-h-ins-body{overflow-y:auto;overflow-x:visible;max-height:380px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent;padding-bottom:36px}
.asg-h-ins-fade{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,rgba(255,255,255,0),rgba(255,255,255,1));
  pointer-events:none;z-index:2;
}

/* Leaderboard */
.asg-h-lb-total{font-size:28px;font-weight:800;letter-spacing:-.03em;color:#111;margin-bottom:4px}
.asg-h-lb-sub{font-size:13px;color:var(--muted-light);margin-bottom:18px;font-weight:500}
.asg-h-lb-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;position:relative}
.asg-h-lb-hit{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.asg-h-lb-name{
  width:90px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;
  cursor:pointer;transition:color .18s ease;
}
.asg-h-lb-name:hover{color:#111}
.asg-h-lb-bar-wrap{flex:1;height:28px;background:rgba(0,0,0,.03);border-radius:14px;overflow:hidden;position:relative}
.asg-h-lb-bar{
  height:100%;border-radius:14px;display:flex;align-items:center;padding:0 12px;
  font-size:11px;font-weight:700;color:#fff;white-space:nowrap;
  animation:asg-h-barGrow .8s cubic-bezier(.25,.46,.45,.94) both;
  width:var(--bar-w);min-width:fit-content;
}
.asg-h-lb-float{
  position:fixed;top:0;left:0;width:340px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:24px;
  box-shadow:0 28px 70px rgba(0,0,0,.16);padding:18px;z-index:10020;
  opacity:0;visibility:hidden;transform:translateY(10px) scale(.97);
  transition:opacity .18s ease,transform .18s ease,visibility .18s ease;
}
.asg-h-lb-float.show{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.asg-h-lb-hover-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.asg-h-lb-hover-photo{
  width:48px;height:48px;min-width:48px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-lb-hover-photo.is-init{
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#666;background:#ececec;
}
.asg-h-lb-hover-name{font-size:16px;font-weight:800;line-height:1.1;color:#111}
.asg-h-lb-hover-role{font-size:11px;color:var(--muted);margin-top:2px}
.asg-h-lb-hover-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;
}
.asg-h-lb-hover-stat{
  padding:10px 12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:14px;
}
.asg-h-lb-hover-stat-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.38);margin-bottom:4px;
}
.asg-h-lb-hover-stat-value{
  font-size:14px;font-weight:800;color:#111;line-height:1.1;
}
.asg-h-lb-hover-chart-wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;margin-bottom:12px}
.asg-h-lb-mini-bars{padding:12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:16px}
.asg-h-lb-mini-bar-row+.asg-h-lb-mini-bar-row{margin-top:10px}
.asg-h-lb-mini-bar-label{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(0,0,0,.42);margin-bottom:6px}
.asg-h-lb-mini-bar-track{height:8px;background:rgba(0,0,0,.06);border-radius:999px;overflow:hidden}
.asg-h-lb-mini-bar-fill{height:100%;border-radius:999px}
.asg-h-lb-mini-rings{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.asg-h-lb-ring-card{padding:12px;background:#fafafa;border:1px solid rgba(0,0,0,.05);border-radius:16px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;overflow:hidden}
.asg-h-lb-ring{
  --pct:0; position:relative; width:56px;height:56px;border-radius:50%;margin:0 auto;
  background:conic-gradient(#111 calc(var(--pct) * 1%), rgba(0,0,0,.08) 0);
  display:grid;place-items:center;flex-shrink:0;
}
.asg-h-lb-ring::before{content:"";position:absolute;inset:8px;border-radius:50%;background:#fff;display:block}
.asg-h-lb-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#111;line-height:1;margin:0;pointer-events:none;z-index:2}
.asg-h-lb-ring-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.42);line-height:1.1;text-align:center}
.asg-h-lb-hover-btn{
  width:100%;min-height:42px;border:none;border-radius:999px;background:#111;color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
}
.asg-h-lb-hover-btn:hover{background:#2a2a2a}

.asg-h-agent-modal{
  background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.18);
  width:min(560px,92vw);max-height:90vh;overflow-y:auto;padding:34px 30px 28px;position:relative;
}
.asg-h-agent-modal-top{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.asg-h-agent-modal-photo{
  width:74px;height:74px;min-width:74px;border-radius:50%;object-fit:cover;border:3px solid rgba(0,0,0,.06);background:#eee;
}
.asg-h-agent-modal-photo.is-init{
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#666;background:#ececec;
}
.asg-h-agent-modal-name{font-size:24px;font-weight:800;letter-spacing:-.03em;color:#111;line-height:1.05}
.asg-h-agent-modal-role{font-size:13px;color:var(--muted);margin-top:3px}
.asg-h-agent-modal-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;
}
.asg-h-agent-modal-stat{
  padding:14px;background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:18px;
}
.asg-h-agent-modal-stat-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.38);margin-bottom:6px;
}
.asg-h-agent-modal-stat-value{
  font-size:18px;font-weight:800;color:#111;line-height:1.05;
}
.asg-h-agent-modal-chart-area{
  display:flex;justify-content:center;align-items:center;margin:18px 0 8px;
}
.asg-h-agent-modal-chart-card{
  padding:14px;background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:18px;
}
.asg-h-agent-modal-rings{
  display:grid;grid-template-columns:repeat(2,minmax(128px,148px));gap:14px;justify-content:center;width:100%;
}
.asg-h-agent-modal-rings .asg-h-lb-ring-card{
  min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 12px;
}
.asg-h-agent-modal-rings .asg-h-lb-ring{width:76px;height:76px;margin:0 auto 10px}
.asg-h-agent-modal-rings .asg-h-lb-ring::before{inset:11px}
.asg-h-agent-modal-rings .asg-h-lb-ring-val{font-size:14px}
.asg-h-agent-modal-btn{
  width:100%;min-height:76px;border:none;border-radius:999px;background:#06070a;color:#fff;
  font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;position:relative;z-index:3;
  box-shadow:0 14px 30px rgba(0,0,0,.10);margin-top:12px;
}
.asg-h-agent-modal-btn:hover{background:#111319}

/* Recent deals */
.asg-h-rd-item{
  display:flex;align-items:center;gap:14px;padding:12px 10px;
  border-radius:14px;transition:background .15s;border-bottom:1px solid rgba(0,0,0,.04);
}
.asg-h-rd-item:last-child{border-bottom:none}
.asg-h-rd-item:hover{background:rgba(0,0,0,.02)}
.asg-h-rd-photo{width:38px;height:38px;min-width:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,0,0,.06);background:#eee}
.asg-h-rd-photo.is-init{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#666;background:#ececec}
.asg-h-rd-info{flex:1;min-width:0}
.asg-h-rd-addr{font-size:15px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asg-h-rd-agent{font-size:12px;color:var(--muted);font-weight:500}
.asg-h-rd-right{text-align:right;flex-shrink:0}
.asg-h-rd-price{font-size:15px;font-weight:800;color:#111}
.asg-h-rd-badge{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-top:4px;
}

/* Stage health */
.asg-h-sh-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.asg-h-sh-row:last-child{border-bottom:none}
.asg-h-sh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.asg-h-sh-label{flex:1;font-size:14px;font-weight:600;color:#111}
.asg-h-sh-count{font-size:22px;font-weight:800;color:#111;min-width:40px;text-align:right}
.asg-h-sh-vol{font-size:12px;color:var(--muted);text-align:right;min-width:80px}
.asg-h-sh-bar-wrap{flex:1.5;height:8px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden;max-width:160px}
.asg-h-sh-bar{height:100%;border-radius:4px;animation:asg-h-barGrow .8s ease both;width:var(--bar-w)}

/* ── RIGHT: MARKETING ACTIONS ──────────────────────────────── */
.asg-h-actions{grid-column:3;grid-row:1 / span 2;animation-delay:.25s}
.asg-h-agents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.asg-h-agent-thumb{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 4px;border-radius:16px;cursor:pointer;
  transition:all .2s;text-decoration:none;border:2px solid transparent;background:transparent;
}
.asg-h-agent-thumb:hover{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}
.asg-h-agent-thumb.selected{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.25);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.asg-h-agent-thumb-photo{
  width:42px;height:42px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,0,0,.06);transition:all .2s;
}
.asg-h-agent-thumb.selected .asg-h-agent-thumb-photo{border-color:var(--blue)}
.asg-h-agent-thumb-name{font-size:10px;font-weight:600;color:var(--muted);text-align:center;line-height:1.15;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asg-h-agent-thumb.selected .asg-h-agent-thumb-name{color:#111;font-weight:700}

.asg-h-agent-actions-area{min-height:0;overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1)}
.asg-h-agent-actions-area.collapsed{max-height:0;opacity:0;margin:0}
.asg-h-agent-actions-area.expanded{max-height:500px;opacity:1;margin-top:12px}
.asg-h-selected-agent-header{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);
  border-radius:16px;margin-bottom:12px;
}
.asg-h-selected-agent-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(59,130,246,.2)}
.asg-h-selected-agent-name{font-size:14px;font-weight:700;color:#111;flex:1}
.asg-h-selected-agent-clear{
  width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.05);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;font-family:inherit;
}
.asg-h-selected-agent-clear:hover{background:rgba(0,0,0,.1)}
.asg-h-selected-agent-clear svg{width:14px;height:14px;stroke:#555;stroke-width:2;fill:none}

.asg-h-act-grid{display:flex;flex-direction:column;gap:8px}
.asg-h-act-btn{
  display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;
  background:#fafafa;border:1px solid rgba(0,0,0,.06);text-decoration:none;
  transition:all .15s;cursor:pointer;
}
.asg-h-act-btn:hover{background:#f0f0f0;border-color:rgba(0,0,0,.1);transform:translateY(-1px)}
.asg-h-act-icon{width:38px;height:38px;min-width:38px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.asg-h-act-icon svg{width:18px;height:18px}
.asg-h-act-text{flex:1;min-width:0}
.asg-h-act-title{font-size:14px;font-weight:700;color:#111;line-height:1.2}
.asg-h-act-sub{font-size:11px;color:var(--muted);margin-top:1px}
.asg-h-act-arrow{color:rgba(0,0,0,.18);flex-shrink:0;transition:color .15s}
.asg-h-act-btn:hover .asg-h-act-arrow{color:rgba(0,0,0,.45)}
.asg-h-act-placeholder{
  text-align:center;padding:28px 16px;color:var(--muted-light);font-size:14px;font-weight:500;
  border:1.5px dashed rgba(0,0,0,.1);border-radius:16px;
}

/* RESPONSIVE */
@media(max-width:1200px){
  .asg-h-bento{grid-template-columns:1fr 1fr;grid-template-rows:auto}
  .asg-h-directory{grid-column:1;grid-row:1}
  .asg-h-insights{grid-column:2;grid-row:1}
  .asg-h-marketing{grid-column:1;grid-row:2}
  .asg-h-actions{grid-column:2;grid-row:2}
  .asg-h-bottom-row{grid-column:1 / span 2;grid-row:3}
  .asg-h-ql-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:900px){
  .asg-h-kpis{grid-template-columns:1fr 1fr;gap:12px}
  .asg-h-bento{grid-template-columns:1fr}
  .asg-h-directory,.asg-h-marketing,.asg-h-insights,.asg-h-actions,.asg-h-bottom-row{grid-column:1;grid-row:auto}
  .asg-h-directory{order:1}
  .asg-h-insights{order:2}
  .asg-h-marketing{order:3}
  .asg-h-actions{order:4}
  .asg-h-bottom-row{order:5;grid-template-columns:1fr}
  .asg-h-dir-results{max-height:350px}
  .asg-h-mkt-folders{grid-template-columns:1fr 1fr}
  .asg-h-popup{width:min(400px,95vw);padding:28px 24px 22px}
  .asg-h-agents-grid{grid-template-columns:repeat(4,1fr)}
  .asg-h-ql-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .asg-h-ql-search-wrap{width:100%}
  .asg-h-lb-float{display:none}
  .asg-h-agent-modal-grid{grid-template-columns:1fr 1fr}
  .asg-h-lh-list-actions{max-width:180px;gap:3px}
  .asg-h-lh-list-info{max-width:200px}
}
@media(max-width:600px){
  .asg-h-shell{padding:0 0 24px;overflow-x:hidden}
  .asg-h-kpis{grid-template-columns:1fr}
  .asg-h-mkt-folders{grid-template-columns:1fr}
  .asg-h-agents-grid{grid-template-columns:repeat(3,1fr)}
  .asg-h-ql-grid{grid-template-columns:1fr}
  .asg-h-ql-btn{min-height:72px;padding:14px 14px}
  .asg-h-ql-top{margin-bottom:16px}
  .asg-h-ql-search-wrap{width:100%}
  .asg-h-ql-head,.asg-h-ql-search-wrap{flex:0 0 100%;max-width:100%}
  .asg-h-card{padding:22px;overflow:hidden}
  .asg-h-lb-name{width:70px;font-size:11px}
  .asg-h-agent-modal-grid{grid-template-columns:1fr}
  .asg-h-agent-modal-chart-area{grid-template-columns:1fr}
  .asg-h-agent-modal-rings{grid-template-columns:1fr 1fr}
  .asg-h-lh-controls{flex-direction:column;align-items:stretch}
  .asg-h-lh-search{min-width:100%}
  .asg-h-lh-scroll{max-height:340px}
  .asg-h-lh-list-item{flex-wrap:wrap;gap:8px;padding:10px 9px}
  .asg-h-lh-list-thumb{width:58px;height:42px;min-width:58px}
  .asg-h-lh-list-info{flex:1 1 calc(100% - 130px);max-width:100%}
  .asg-h-lh-list-address{font-size:13px}
  .asg-h-lh-meta-text,.asg-h-lh-meta-sep{font-size:10px}
  .asg-h-lh-list-tags{gap:3px}
  .asg-h-lh-list-status,.asg-h-lh-list-type{font-size:8px;padding:3px 7px}
  .asg-h-lh-list-actions{flex:1 1 100%;width:100%;margin-top:2px;gap:3px;max-width:100%;justify-content:flex-start}
}
@media(max-width:420px){
  .asg-h-card{padding:18px}
  .asg-h-ql-btn{padding:14px 12px}
  .asg-h-ql-logo-wrap{width:42px;height:42px;min-width:42px}
  .asg-h-ql-title{font-size:13px}
  .asg-h-ql-sub{font-size:10px}
  .asg-h-agent-modal-rings{grid-template-columns:1fr}
}

  function applyIconPhotoOverridesFromDirectory(rows){
    if(!Array.isArray(rows)||!rows.length) return;
    const byExact={};
    const byFirst={};
    rows.forEach(row=>{
      const key=normalizeAgentName(row&&(row.name||row.display_name));
      if(!key) return;
      const iconSrc=resolveDirectoryRowPhotoUrl(row);
      if(!iconSrc) return;
      byExact[key]=iconSrc;
      const first=(key.split(/[^a-z0-9]/)[0]||"").trim();
      if(first&&!byFirst[first]) byFirst[first]=iconSrc;
    });
    TEAM.forEach(person=>{

      if(!key) return;
      const first=(key.split(/[^a-z0-9]/)[0]||"").trim();
      const iconSrc=byExact[key]||(first?byFirst[first]:"");
      if(iconSrc) person.iconPhoto=iconSrc;
    });
  }

  function parseCSV(text,side){
    const lines=text.trim().split("\n");if(lines.length<2)return[];
    const headers=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/[^a-z ]/g,"").trim());
    return lines.slice(1).map(line=>{
      const vals=[];let cur="",q=false;
      for(let i=0;i<line.length;i++){if(line[i]==='"')q=!q;else if(line[i]===","&&!q){vals.push(cur.trim());cur="";}else cur+=line[i];}
      vals.push(cur.trim());
      const o={};headers.forEach((h,i)=>{o[h]=vals[i]||"";});
      return{agent:o.agent||"",address:o.address||"",price:parseFloat((o.price||"0").replace(/[^0-9.]/g,""))||0,side,stage:o.stage||"",closeDate:o["close date"]||o.closedate||"",photoUrl:o["photo url"]||o.photourl||""};

  }

  function resolveDriveImageUrl(url){
    const raw=String(url||"").trim();
    if(!raw)return"";
    if(!/drive\.google\.com|docs\.google\.com/.test(raw))return raw;
    if(/\/drive\/folders\//.test(raw))return"";

    const filePathMatch=raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(filePathMatch&&filePathMatch[1]){
      return `https://drive.google.com/thumbnail?id=${filePathMatch[1]}&sz=w1200`;
    }

    const idParamMatch=raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(idParamMatch&&idParamMatch[1]){
      return `https://drive.google.com/thumbnail?id=${idParamMatch[1]}&sz=w1200`;
    }

    return raw;
  }

  function positionLeaderboardFloat(rowEl){
    if(!rowEl) return;
    const rect=rowEl.getBoundingClientRect();
    const gap=18;
    const cardW=340;
    let left=rect.right + gap;
    let top=rect.top + rect.height/2;
    if(left + cardW > window.innerWidth - 18){
      left=Math.max(18, rect.left - cardW - gap);
    }
    const maxTop=window.innerHeight - leaderboardFloat.offsetHeight - 18;
    const safeTop=Math.min(Math.max(18, top - leaderboardFloat.offsetHeight/2), Math.max(18,maxTop));
    leaderboardFloat.style.left=left+"px";
    leaderboardFloat.style.top=safeTop+"px";
  }

        const photoHTML=photo
          ?`<img class="asg-h-rd-photo" src="${esc(photo)}" alt="${esc(d.agent)}" onerror="this.outerHTML='<div class=\\'asg-h-rd-photo is-init\\'>${initials(d.agent)}</div>'">`
          :`<div class="asg-h-rd-photo is-init">${initials(d.agent)}</div>`;
        return`<div class="asg-h-rd-item">${photoHTML}<div class="asg-h-rd-info"><div class="asg-h-rd-addr">${esc(d.address)}</div><div class="asg-h-rd-agent">${esc(d.agent)} · ${esc(d.side)}</div></div><div class="asg-h-rd-right"><div class="asg-h-rd-price">${fmt(d.price)}</div><div class="asg-h-rd-badge" style="background:${sc.bg};color:${sc.t}"><span style="width:6px;height:6px;border-radius:50%;background:${sc.d};display:inline-block;${pulse}"></span> ${shortStage}</div></div></div>`;
      }).join("");
    } else if(insightsView==="health"){
      if(!allDeals.length){
        insBody.innerHTML='<div style="color:rgba(0,0,0,.3);font-size:14px;padding:30px 0;text-align:center">Loading...</div>';
        return;
      }
      const stages=["Offer Submitted","Under Contract","A/I or Pending","Closed"];
      const stageData=stages.map(s=>{const deals=allDeals.filter(d=>d.stage===s);return{stage:s,count:deals.length,vol:deals.reduce((a,d)=>a+d.price,0)};});
      const maxCount=Math.max(...stageData.map(s=>s.count),1);
      const totalVol=allDeals.reduce((s,d)=>s+d.price,0);
      const buyCount=allDeals.filter(d=>d.side==="Buy").length;
      const sellCount=allDeals.filter(d=>d.side==="Sell").length;
      insBody.innerHTML=`
        <div style="display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap">
          <div style="flex:1;min-width:100px;padding:14px 16px;background:rgba(0,0,0,.02);border-radius:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.35);margin-bottom:6px">Total Active</div><div style="font-size:22px;font-weight:800;color:#111">${allDeals.length}</div></div>
          <div style="flex:1;min-width:100px;padding:14px 16px;background:rgba(0,0,0,.02);border-radius:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.35);margin-bottom:6px">Buy / Sell</div><div style="font-size:22px;font-weight:800;color:#111">${buyCount} <span style="font-size:14px;color:rgba(0,0,0,.25);font-weight:500">/</span> ${sellCount}</div></div>
          <div style="flex:1;min-width:100px;padding:14px 16px;background:rgba(0,0,0,.02);border-radius:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(0,0,0,.35);margin-bottom:6px">Pipeline Value</div><div style="font-size:22px;font-weight:800;color:#111">${fmt(totalVol)}</div></div>
        </div>
        ${stageData.map((s,i)=>{
          const sc=SC[s.stage];const pct=Math.max(5,Math.round((s.count/maxCount)*100));
          return`<div class="asg-h-sh-row"><span class="asg-h-sh-dot" style="background:${sc.d}"></span><div class="asg-h-sh-label">${esc(s.stage)}</div><div class="asg-h-sh-bar-wrap"><div class="asg-h-sh-bar" style="--bar-w:${pct}%;background:${sc.d};animation-delay:${i*.1}s"></div></div><div class="asg-h-sh-count">${s.count}</div><div class="asg-h-sh-vol">${fmt(s.vol)}</div></div>`;
        }).join("")}`;
    }
  }
  renderInsPills();

  // Listings Hub Functions
  const lhSearch=document.getElementById("asgLhSearch");
  const lhAgentFilter=document.getElementById("asgLhAgentFilter");
  const lhNeighborhoodFilter=document.getElementById("asgLhNeighborhoodFilter");
  const lhSummary=document.getElementById("asgLhSummary");
  const lhListResults=document.getElementById("asgLhListResults");

  function uniqueSortedValues(items,key){
    return [...new Set(items.map(item=>String(item[key]||"").trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b));
  }

  function populateListingFilters(items){
    const agents=uniqueSortedValues(items,"agent");
    const neighborhoods=uniqueSortedValues(items,"neighborhood");

    lhAgentFilter.innerHTML='<option value="">All Agents</option>'+
      agents.map(value=>`<option value="${esc(value)}">${esc(value)}</option>`).join("");

    lhNeighborhoodFilter.innerHTML='<option value="">All Neighborhoods</option>'+
      neighborhoods.map(value=>`<option value="${esc(value)}">${esc(value)}</option>`).join("");
  }

  function renderListingSummary(){
    const activeLabel=cachedCounts.active===1?"active listing":"active listings";
    const closedLabel=cachedCounts.closed===1?"closed listing":"closed listings";
    lhSummary.innerHTML=`
      <div class="asg-h-lh-pill">${cachedCounts.active} <span>${activeLabel}</span></div>
      <div class="asg-h-lh-pill is-closed">${cachedCounts.closed} <span>${closedLabel}</span></div>
    `;
  }

  function getFilteredListings(){
    const query=normalizeText(lhSearch.value);
    const agentFilter=normalizeText(lhAgentFilter.value);
    const neighborhoodFilter=normalizeText(lhNeighborhoodFilter.value);

    return allListings.filter(item=>{
      const haystack=[item.address,item.neighborhood,item.agent,item.status,item.listingType].map(normalizeText).join(" ");
      const matchesQuery=!query||haystack.includes(query);
      const matchesAgent=!agentFilter||normalizeText(item.agent)===agentFilter;
      const matchesNeighborhood=!neighborhoodFilter||normalizeText(item.neighborhood)===neighborhoodFilter;
      return matchesQuery&&matchesAgent&&matchesNeighborhood;
    });
  }

  function listingTypeInfo(type){
    const raw=normalizeText(type);
    if(raw.includes("rent")||raw.includes("lease")){
      return {label:"Rent",cls:"is-rent"};
    }
    if(raw.includes("sale")||raw===""){
      return {label:"Sale",cls:"is-sale"};
    }
    return {label:titleCaseStatus(type),cls:"is-other"};
  }

  function createListStatusBadge(status){
    const safeStatus=titleCaseStatus(status);
    return `<div class="asg-h-lh-list-status ${statusClass(status)}">${esc(safeStatus)}</div>`;
  }

  function listActionButton(label,url){
    if(!url){
      return `<span class="asg-h-lh-list-btn is-missing">${esc(label)}</span>`;
    }
    return `<a class="asg-h-lh-list-btn" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`;
  }

  function renderListingList(items){
    if(!items.length){
      lhListResults.innerHTML='<div class="asg-h-lh-empty">No listings found. Adjust the search or filters.</div>';
      return;
    }

    const list=items.map(item=>{
      const address=esc(item.address||"Untitled Listing");
      const neighborhood=esc(item.neighborhood||"");
      const agent=esc(item.agent||"");
      const coverImage=resolveDriveImageUrl(item.coverImage);
      const listingType=listingTypeInfo(item.listingType);
      const metaParts=[
        agent?`<span class="asg-h-lh-meta-text">${agent}</span>`:"",
        neighborhood?`<span class="asg-h-lh-meta-text">${neighborhood}</span>`:""
      ].filter(Boolean).join('<span class="asg-h-lh-meta-sep">·</span>');

      return`<div class="asg-h-lh-list-item">
        <div class="asg-h-lh-list-thumb">
          ${coverImage
            ?`<img src="${esc(coverImage)}" alt="${address}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;asg-h-lh-list-thumb-empty&quot;>No image</div>'" />`
            :`<div class="asg-h-lh-list-thumb-empty">No image</div>`
          }
        </div>
        <div class="asg-h-lh-list-info">
          <div class="asg-h-lh-list-address">${address}</div>
          ${metaParts?`<div class="asg-h-lh-list-meta">${metaParts}</div>`:""}
        </div>
        <div class="asg-h-lh-list-tags">
          ${createListStatusBadge(item.status)}
          <div class="asg-h-lh-list-type ${listingType.cls}">${esc(listingType.label)}</div>
        </div>
        <div class="asg-h-lh-list-actions">
          ${listActionButton("Photos",item.photos)}
          ${listActionButton("Matterport",item.matterport)}
          ${listActionButton("Floor Plan",item.floorPlan)}
          ${listActionButton("Fact Sheet",item.factSheet)}
          ${listActionButton("Open House",item.openHouse)}
          ${listActionButton("Video",item.video)}
        </div>
      </div>`;
    }).join("");

    lhListResults.innerHTML=`<div class="asg-h-lh-list">${list}</div>`;
  }

  function renderListings(){
    const filtered=getFilteredListings();
    renderListingSummary();
    renderListingList(filtered);
  }

  function setListingsLoading(){
    lhListResults.innerHTML='<div class="asg-h-lh-loading"><div class="asg-h-lh-loading-spinner"></div>Loading listings...</div>';
  }

  function setListingsError(){
    lhSummary.innerHTML="";
    lhListResults.innerHTML='<div class="asg-h-lh-error"><strong>Unable to load listings</strong>Check the web app deployment permissions and endpoint.</div>';
  }

  async function fetchListingView(view){
    const response=await fetch(LISTINGS_API+"?view="+encodeURIComponent(view),{
      method:"GET",
      cache:"no-store"
    });
    if(!response.ok)throw new Error("Request failed");
    const data=await response.json();
    if(!data||!Array.isArray(data.listings))throw new Error("Invalid response");
    return data.listings;
  }

  async function loadListingCounts(){
    try{
      const [activeListings,closedListings]=await Promise.all([
        fetchListingView("active"),
        fetchListingView("closed")
      ]);
      cachedCounts.active=activeListings.length;
      cachedCounts.closed=closedListings.length;
    }catch(error){
      cachedCounts.active=0;
      cachedCounts.closed=0;
    }
  }

  async function fetchListings(view){
    listingsView=view;
    setListingsLoading();

    const tabs=document.querySelectorAll(".asg-h-lh-tab");
    tabs.forEach(tab=>{
      tab.classList.toggle("is-active",tab.getAttribute("data-view")===view);
    });

    try{
      const [viewListings]=await Promise.all([
        fetchListingView(view),
        loadListingCounts()
      ]);

      allListings=viewListings.map(item=>({
        address:item.address||"",
        neighborhood:item.neighborhood||"",
        agent:item.agent||"",
        listingType:item.listingType||"",
        status:item.status||"",
        coverImage:item.coverImage||"",
        photos:item.photos||"",
        matterport:item.matterport||"",
        floorPlan:item.floorPlan||"",
        factSheet:item.factSheet||"",
        openHouse:item.openHouse||"",
        video:item.video||"",
        archived:!!item.archived
      }));

      populateListingFilters(allListings);
      lhSearch.value="";
      renderListings();
    }catch(error){
      setListingsError();
    }
  }

  window._asgLhView=function(view){
    fetchListings(view);
  };

  lhSearch.addEventListener("input",renderListings);
  lhAgentFilter.addEventListener("change",renderListings);
  lhNeighborhoodFilter.addEventListener("change",renderListings);

  // Initialize listings
  fetchListings("active");

  async function loadPipeline(){
    const kpis=document.querySelectorAll("#asg-hero-dash .asg-h-kpi");

    const statsPromise=fetch(STATS_API)
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success)throw new Error("Stats API returned error");
        statsData=data;
        const s=data.summary;
        const totalVolume=(s.totalVolume!==undefined?s.totalVolume:(s.closedVolume||0)+(s.pendingVolume||0));
        const totalTransactions=(s.totalTransactions!==undefined?s.totalTransactions:(s.closedDeals||0)+(s.pendingDeals||0));

        if(kpis[0]){
          kpis[0].classList.remove("is-loading");
          kpis[0].querySelector(".asg-h-kpi-value").textContent=fmt(totalVolume);
          kpis[0].querySelector(".asg-h-kpi-sub").textContent=fmt(s.closedVolume||0)+" closed · "+fmt(s.pendingVolume||0)+" pending";
        }
        if(kpis[1]){
          kpis[1].classList.remove("is-loading");
          kpis[1].querySelector(".asg-h-kpi-value").textContent=fmt(s.closedVolume||0);
          kpis[1].querySelector(".asg-h-kpi-sub").textContent=(s.closedDeals||0)+" closed deals";
        }
        if(kpis[2]){
          kpis[2].classList.remove("is-loading");
          kpis[2].querySelector(".asg-h-kpi-value").textContent=fmt(s.pendingVolume||0);
          kpis[2].querySelector(".asg-h-kpi-sub").textContent=(s.pendingDeals||0)+" pending deals";
        }
        if(kpis[3]){
          kpis[3].classList.remove("is-loading");
          kpis[3].querySelector(".asg-h-kpi-value").textContent=totalTransactions.toString();
          kpis[3].querySelector(".asg-h-kpi-sub").textContent=(s.closedDeals||0)+" closed · "+(s.pendingDeals||0)+" pending";
        }

        renderInsBody();
      })
      .catch(err=>{
        console.warn("Stats API failed, KPIs will stay in loading state:",err);
        kpis.forEach(k=>{
          k.classList.remove("is-loading");
          k.querySelector(".asg-h-kpi-value").textContent="—";
          k.querySelector(".asg-h-kpi-sub").textContent="Unable to load";
        });
      });

    const csvPromise=Promise.all([
      fetch(BUYERS_CSV).then(r=>r.text()).then(t=>parseCSV(t,"Buy")).catch(()=>[]),
      fetch(SELLERS_CSV).then(r=>r.text()).then(t=>parseCSV(t,"Sell")).catch(()=>[])
    ]).then(results=>{
      allDeals=results.flat();
      renderInsBody();
    });

    await Promise.all([statsPromise,csvPromise]);
  }

  function installPageUnlockOverride(){
    if(window.__asgAdminDashPageUnlockInstalled) return;
    window.__asgAdminDashPageUnlockInstalled=true;

    const styleId="asg-admin-dash-page-unlock-override";
    if(!document.getElementById(styleId)){
      const style=document.createElement("style");
      style.id=styleId;
      style.textContent=
        "html,body{overflow:auto!important;overflow-y:auto!important;height:auto!important;max-height:none!important;pointer-events:auto!important;touch-action:auto!important;}"+
        "body{position:static!important;top:auto!important;left:auto!important;right:auto!important;width:auto!important;}";
      (document.head||document.documentElement).appendChild(style);
    }

    function unlockPageNow(){
      const docEl=document.documentElement;
      const body=document.body;
      if(!docEl||!body) return;

      let scrollY=window.scrollY||window.pageYOffset||0;
      const bodyTop=parseInt(body.style.top||"0",10);
      if(!Number.isNaN(bodyTop)&&bodyTop<0) scrollY=Math.max(scrollY,Math.abs(bodyTop));

      [docEl,body].forEach(el=>{
        el.style.setProperty("overflow","auto","important");
        el.style.setProperty("overflow-y","auto","important");
        el.style.setProperty("height","auto","important");
        el.style.setProperty("max-height","none","important");
        el.style.setProperty("pointer-events","auto","important");
        el.style.setProperty("touch-action","auto","important");
      });
      body.style.setProperty("position","static","important");
      body.style.setProperty("top","auto","important");
      body.style.setProperty("left","auto","important");
      body.style.setProperty("right","auto","important");
      body.style.setProperty("width","auto","important");

      if(scrollY>0) window.scrollTo(0,scrollY);
    }

    unlockPageNow();
    setTimeout(unlockPageNow,0);
    setTimeout(unlockPageNow,250);
    setTimeout(unlockPageNow,1000);
    window.addEventListener("load",unlockPageNow);
    window.addEventListener("pageshow",unlockPageNow);
    document.addEventListener("visibilitychange",()=>{
      if(!document.hidden) unlockPageNow();
    });
  }

  installPageUnlockOverride();
  loadPipeline();
})();
</script>
