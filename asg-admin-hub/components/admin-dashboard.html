  function renderListingWorkspace(row){
    if(!row){
      lhBackdrop.classList.remove("is-open");
      lhBackdrop.setAttribute("aria-hidden","true");
      lhWorkspace.classList.remove("is-open");
      lhWorkspace.setAttribute("aria-hidden","true");
      lhWorkspace.innerHTML="";
      return;
    }
    const addr=String(row.address||"").trim();
    try{
      lhWorkspace.innerHTML=buildLhSellDetailBodyHtml(row,addr);
      lhBackdrop.classList.add("is-open");
      lhBackdrop.setAttribute("aria-hidden","false");
      lhWorkspace.classList.add("is-open");
      lhWorkspace.setAttribute("aria-hidden","false");
      wireLhSellWorkspaceEvents();
    }catch(err){
      console.error("Listing workspace render failed:",err);
      lhWorkspace.innerHTML='<div style="padding:24px"><strong>Unable to open listing details.</strong><p style="margin:8px 0 0;font-size:13px;color:#666">'+esc(err&&err.message?err.message:String(err))+'</p></div>';
      lhBackdrop.classList.add("is-open");
      lhWorkspace.classList.add("is-open");
    }
  }

  function openListingWorkspace(address){
    const addr=String(address||"").trim();
    if(!addr)return;
    lhState.activeAddress=addr;
    let row=null;
    for(let i=0;i<lhState.rows.length;i++){
      if(String(lhState.rows[i].address||"").trim()===addr){row=lhState.rows[i];break;}
    }
    renderListingWorkspace(row||{address:addr});
    if(typeof fetchSellPhotosForAddress==="function")fetchSellPhotosForAddress(addr);
    document.body.style.overflow="hidden";
  }

  function closeListingWorkspace(){
    lhState.activeAddress="";
    renderListingWorkspace(null);
    document.body.style.overflow="";
    if(ASG_LH_EMBED.active){
      try{window.parent&&window.parent.postMessage({type:"asg-lh-workspace-close"},"*");}catch(_e){}
    }
  }

  // Embed mode: when admin-dashboard is loaded inside an iframe for a personal hub,
  // we hide the dashboard shell so only the listing workspace overlay shows, and we
  // auto-open the requested listing.
  const ASG_LH_EMBED=(function(){
    try{
      if(window.ASG_LH_EMBED_OVERRIDE&&window.ASG_LH_EMBED_OVERRIDE.active){
        return{
          active:true,
          address:String(window.ASG_LH_EMBED_OVERRIDE.address||"").trim()
        };
      }
      const params=new URLSearchParams(window.location.search||"");
      const mode=String(params.get("asgEmbed")||"").toLowerCase();
      if(mode!=="workspace")return{active:false};
      return{
        active:true,
        address:String(params.get("asgAddress")||"").trim()
      };
    }catch(_e){return{active:false};}
  })();
  if(ASG_LH_EMBED.active){
    try{document.documentElement.classList.add("asg-lh-embed-mode");}catch(_e){}
    const style=document.createElement("style");
    style.textContent=
      "html.asg-lh-embed-mode,html.asg-lh-embed-mode body{background:transparent !important;margin:0 !important;padding:0 !important;}"+
      "html.asg-lh-embed-mode #asg-hero-dash{display:none !important;}"+
      "html.asg-lh-embed-mode #asgLhBackdrop{background:rgba(15,23,42,.55) !important;}"+
      "html.asg-lh-embed-mode #asgLhWorkspace{box-shadow:0 30px 80px rgba(15,23,42,.35) !important;}";
    document.head.appendChild(style);
  }

  window._asgLhOpenFromCard=function(el){
    if(!el)return;
    const addr=el.getAttribute("data-lh-open")||"";
    if(addr)openListingWorkspace(addr);
  };
  window._asgLhOpen=openListingWorkspace;
  window._asgLhClose=closeListingWorkspace;

  function renderListingsHub(){
    renderListingSummary();
    renderListingCards(getFilteredListings());
    if(lhState.activeAddress){
      let row=null;
      for(let i=0;i<lhState.rows.length;i++){
        if(String(lhState.rows[i].address||"").trim()===lhState.activeAddress){row=lhState.rows[i];break;}
      }
      if(row)renderListingWorkspace(row);
      else closeListingWorkspace();
    }
  }

  async function fetchListingApiView(view){
    const response=await fetch(LISTINGS_API+"?view="+encodeURIComponent(view),{method:"GET",cache:"no-store"});
    if(!response.ok)throw new Error("Listings API request failed ("+view+")");
    const data=await response.json();
    if(!data||!Array.isArray(data.listings))throw new Error("Invalid listings response");
    return data.listings;
  }

  function uniqueListingRows(rows){
    const seen={},out=[];
    rows.forEach(row=>{
      const key=normalizeText(row.address||"")+"|"+normalizeText(normalizeListingAgent(row)||"");
      if(!key||seen[key])return;
      seen[key]=true;
      out.push(row);
    });
    return out;
  }

  async function fetchListingsHub(){
    if(lhState.fetching)return;
    lhState.fetching=true;
    lhState.error=null;
    renderListingsHub();
    try{
      let rows=[];
      try{
        rows=await fetchListingApiView("all");
      }catch(_allErr){
        const [activeRows,closedRows]=await Promise.all([
          fetchListingApiView("active"),
          fetchListingApiView("closed").catch(()=>[])
        ]);
        rows=uniqueListingRows(activeRows.concat(closedRows||[]));
      }
      lhState.rows=sortListingsNewestFirst(uniqueListingRows(rows.map((item,i)=>{
        const row=normalizeListingRow(item);
        row._sheetOrder=Number(item.sheetRow)||(i+1);
        if(item.sheetRow)row.sheetRow=Number(item.sheetRow);
        return row;
      })));
      lhState.loaded=true;
      lhState.fetching=false;
      if(!lhState.rows.length){
        lhState.error="Listings API returned 0 rows. Confirm LISTINGS_API matches your Listing Hub deployment.";
      }else{
        lhState.error=null;
      }
      renderListingsHub();
      if(ASG_LH_EMBED.active&&ASG_LH_EMBED.address&&!lhState.activeAddress){
        openListingWorkspace(ASG_LH_EMBED.address);
      }
    }catch(error){
      lhState.fetching=false;
      lhState.error=error&&error.message?error.message:String(error);
      renderListingsHub();
    }
  }

  window._asgLhView=function(view){
    lhState.view=view==="closed"?"closed":"active";
    document.querySelectorAll(".asg-h-lh-tab").forEach(tab=>{
      tab.classList.toggle("is-active",tab.getAttribute("data-view")===lhState.view);
    });
    renderListingsHub();
  };

  const lhSearchClear=document.getElementById("asgLhSearchClear");
  function syncLhSearchClear(){
    if(!lhSearchClear||!lhSearch)return;
    lhSearchClear.classList.toggle("is-visible",!!String(lhSearch.value||"").trim());
  }
  lhSearch.addEventListener("input",()=>{syncLhSearchClear();renderListingsHub();});
  if(lhSearchClear){
    lhSearchClear.addEventListener("click",()=>{
      lhSearch.value="";
      syncLhSearchClear();
      lhSearch.focus();
      renderListingsHub();
    });
  }
  syncLhSearchClear();
  lhBackdrop.addEventListener("click",closeListingWorkspace);

  lhListResults.addEventListener("click",evt=>{
    const card=evt.target.closest("[data-lh-open]");
    if(!card)return;
    evt.preventDefault();
    openListingWorkspace(card.getAttribute("data-lh-open"));
  });
  lhListResults.addEventListener("keydown",evt=>{
    if(evt.key!=="Enter"&&evt.key!==" ")return;
    const card=evt.target.closest("[data-lh-open]");
    if(!card)return;
    evt.preventDefault();
    openListingWorkspace(card.getAttribute("data-lh-open"));
  });
  lhWorkspace.addEventListener("click",evt=>{
    if(evt.target.closest("[data-lh-close],[data-sell-close]"))closeListingWorkspace();
  });
  document.addEventListener("keydown",evt=>{
    if(evt.key==="Escape"&&lhState.activeAddress)closeListingWorkspace();
  });

  fetchListingsHub();

  async function loadPipeline(){
    const kpis=document.querySelectorAll("#asg-hero-dash .asg-h-kpi");

    const statsPromise=fetch(STATS_API)
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success)throw new Error("Stats API returned error");
        statsData=data;
        const s=data.summary;
        const totalVolume=(s.totalVolume!==undefined?s.totalVolume:(s.closedVolume||0)+(s.pendingVolume||0));
        const totalTransactions=(s.totalTransactions!==undefined?s.totalTransactions:(s.closedDeals||0)+(s.pendingDeals||0));

        if(kpis[0]){
          kpis[0].classList.remove("is-loading");
          kpis[0].querySelector(".asg-h-kpi-value").textContent=fmt(totalVolume);
          kpis[0].querySelector(".asg-h-kpi-sub").textContent=fmt(s.closedVolume||0)+" closed · "+fmt(s.pendingVolume||0)+" pending";
        }
        if(kpis[1]){
          kpis[1].classList.remove("is-loading");
          kpis[1].querySelector(".asg-h-kpi-value").textContent=fmt(s.closedVolume||0);
          kpis[1].querySelector(".asg-h-kpi-sub").textContent=(s.closedDeals||0)+" closed deals";
        }
        if(kpis[2]){
          kpis[2].classList.remove("is-loading");
          kpis[2].querySelector(".asg-h-kpi-value").textContent=fmt(s.pendingVolume||0);
          kpis[2].querySelector(".asg-h-kpi-sub").textContent=(s.pendingDeals||0)+" pending deals";
        }
        if(kpis[3]){
          kpis[3].classList.remove("is-loading");
          kpis[3].querySelector(".asg-h-kpi-value").textContent=totalTransactions.toString();
          kpis[3].querySelector(".asg-h-kpi-sub").textContent=(s.closedDeals||0)+" closed · "+(s.pendingDeals||0)+" pending";
        }

        renderInsBody();
      })
      .catch(err=>{
        console.warn("Stats API failed, KPIs will stay in loading state:",err);
        kpis.forEach(k=>{
          k.classList.remove("is-loading");
          k.querySelector(".asg-h-kpi-value").textContent="—";
          k.querySelector(".asg-h-kpi-sub").textContent="Unable to load";
        });
      });

    const csvPromise=Promise.all([
      fetch(BUYERS_CSV).then(r=>r.text()).then(t=>parseCSV(t,"Buy")).catch(()=>[]),
      fetch(SELLERS_CSV).then(r=>r.text()).then(t=>parseCSV(t,"Sell")).catch(()=>[])
    ]).then(results=>{
      allDeals=results.flat();
      renderInsBody();
    });

    await Promise.all([statsPromise,csvPromise]);
  }

  function installPageUnlockOverride(){
    if(window.__asgAdminDashPageUnlockInstalled) return;
    window.__asgAdminDashPageUnlockInstalled=true;

    const styleId="asg-admin-dash-page-unlock-override";
    if(!document.getElementById(styleId)){
      const style=document.createElement("style");
      style.id=styleId;
      style.textContent=
        "html,body{overflow:auto!important;overflow-y:auto!important;height:auto!important;max-height:none!important;pointer-events:auto!important;touch-action:auto!important;}"+
        "body{position:static!important;top:auto!important;left:auto!important;right:auto!important;width:auto!important;}";
      (document.head||document.documentElement).appendChild(style);
    }

    function unlockPageNow(){
      const docEl=document.documentElement;
      const body=document.body;
      if(!docEl||!body) return;

      let scrollY=window.scrollY||window.pageYOffset||0;
      const bodyTop=parseInt(body.style.top||"0",10);
      if(!Number.isNaN(bodyTop)&&bodyTop<0) scrollY=Math.max(scrollY,Math.abs(bodyTop));

      [docEl,body].forEach(el=>{
        el.style.setProperty("overflow","auto","important");
        el.style.setProperty("overflow-y","auto","important");
        el.style.setProperty("height","auto","important");
        el.style.setProperty("max-height","none","important");
        el.style.setProperty("pointer-events","auto","important");
        el.style.setProperty("touch-action","auto","important");
      });
      body.style.setProperty("position","static","important");
      body.style.setProperty("top","auto","important");
      body.style.setProperty("left","auto","important");
      body.style.setProperty("right","auto","important");
      body.style.setProperty("width","auto","important");

      if(scrollY>0) window.scrollTo(0,scrollY);
    }

    unlockPageNow();
    setTimeout(unlockPageNow,0);
    setTimeout(unlockPageNow,250);
    setTimeout(unlockPageNow,1000);
    window.addEventListener("load",unlockPageNow);
    window.addEventListener("pageshow",unlockPageNow);
    document.addEventListener("visibilitychange",()=>{
      if(!document.hidden) unlockPageNow();
    });
  }

  installPageUnlockOverride();
  loadPipeline();
})();
</script>
