  function setupMobileCardCollapse(){

      if(card.classList.contains("asg-ph-card--top-stats"))return "stats";
      if(card.classList.contains("asg-ph-card--top-actions"))return "actions";
      if(card.classList.contains("asg-ph-dt-bento"))return "deals";

    }
    function iconSvg(kind){
      if(kind==="stats")return '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.4" y="2.4" width="4.2" height="4.2"/><rect x="9.4" y="2.4" width="4.2" height="4.2"/><rect x="2.4" y="9.4" width="4.2" height="4.2"/><rect x="9.4" y="9.4" width="4.2" height="4.2"/></svg>';

      if(kind==="deals")return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9.8 4.6c-.5-.5-1.2-.8-2-.8-1.2 0-2.1.7-2.1 1.7 0 2.5 4.7 1.4 4.7 4 0 1.2-1.1 2-2.6 2-1 0-1.9-.3-2.5-.9"/><path d="M8 2.6v10.8"/></svg>';
      if(kind==="listings")return '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.3" y="3" width="11.4" height="10" rx="1.8"/><circle cx="5.4" cy="6.2" r="1.1"/><path d="M3.7 11l3.2-2.7 1.7 1.4 1.8-1.7 1.9 3"/></svg>';
      if(kind==="events")return '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.6" y="3.6" width="10.8" height="9.8" rx="1.8"/><path d="M5.2 2.6v2M10.8 2.6v2M2.6 6.2h10.8"/></svg>';
      if(kind==="branding")return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6l1.5 3.1 3.4.5-2.5 2.4.6 3.4L8 10.4 5 12l.6-3.4L3.1 6.2l3.4-.5z"/></svg>';
      return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.4a4.2 4.2 0 0 0-2.8 7.4c.5.45.85 1 1 1.6h3.6c.14-.6.49-1.15 1-1.6A4.2 4.2 0 0 0 8 2.4Z"/><path d="M6.2 13h3.6M6.7 14.6h2.6"/></svg>';
    }
    mobileCollapseCards.forEach(function(card){
      if(card.getAttribute("data-mobile-collapse-init")==="1")return;
      var toggleLabel=
        card.querySelector(".asg-ph-stats-head .asg-ph-label") ||
        card.querySelector(":scope > .asg-ph-bento-head .asg-ph-label") ||
        card.querySelector(".asg-ph-dt-bento-top .asg-ph-label") ||
        card.querySelector(":scope > .asg-ph-label") ||

      card.setAttribute("data-mobile-collapse-init","1");
      toggleLabel.classList.add("asg-ph-mobile-collapse-toggle");
      if(!toggleLabel.querySelector(".asg-ph-mobile-collapse-icon")){
        var kind=iconKindForCard(card);
        var icon=document.createElement("span");
        icon.className="asg-ph-mobile-collapse-icon is-"+kind;
        icon.setAttribute("aria-hidden","true");
        icon.innerHTML=iconSvg(kind);
        toggleLabel.insertBefore(icon,toggleLabel.firstChild);
      }
      toggleLabel.setAttribute("role","button");
      toggleLabel.setAttribute("tabindex","0");
      card.classList.add("is-mobile-collapsed");
      toggleLabel.addEventListener("click",function(ev){
        if(window.innerWidth>760)return;
        ev.preventDefault();
        card.classList.toggle("is-mobile-collapsed");

        if(ev.key==="Enter"||ev.key===" "){

      });
    });

  function loadStats(period){
    const targetPeriod=period||"ytd2026";
    const periodLabel=targetPeriod==="allTime"?"All-Time":"2026";
    kpiWrap.innerHTML=kpiSkeleton(periodLabel);
    return fetch(STATS_API+"?period="+encodeURIComponent(targetPeriod),{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success||!Array.isArray(data.agents))throw new Error("Bad stats payload");
        const agent=findBestAgentMatch(data.agents,AGENT_PROFILE.name);
        if(!agent){
          kpiWrap.innerHTML='<div class="asg-ph-error" style="grid-column:1/-1">Unable to find '+esc(AGENT_PROFILE.name)+' in '+esc(periodLabel)+' stats.</div>';
          return;
        }
        const totalVolume=Number(agent.grandTotal)||0;
        const totalDeals=Number(agent.totalDeals)||0;
        const closedVol=Number(agent.closedVolume)||0;
        const pendingVol=Number(agent.pendingVolume)||0;
        const pendingDeals=Number(agent.pendingDeals)||0;
        const closedDeals=Number(agent.closedDeals)||0;
        const buyPctNum=(agent.buyPct===undefined||agent.buyPct===null)?null:Math.round(Number(agent.buyPct)||0);
        const buyPct=buyPctNum===null?"-":buyPctNum+"%";
        const sellPct=buyPctNum===null?"-":Math.max(0,100-buyPctNum)+"%";
        if(targetPeriod==="allTime"){
          kpiWrap.innerHTML=[
            kpiCard("All-Time Volume",fmt(totalVolume),totalDeals+" deals"),
            kpiCard("# Transactions",String(totalDeals),closedDeals+" closed · "+pendingDeals+" pending"),
            kpiCard("Seller Side Mix",sellPct,buyPctNum===null?"—":"Buy side "+buyPct),
            kpiCard("Buy Side Mix",buyPct,String(agent.totalZillow||0)+" Zillow reviews")
          ].join("");
        }else{
          kpiWrap.innerHTML=[
            kpiCard(periodLabel+" Volume",fmt(totalVolume),totalDeals+" deals"),
            kpiCard("Closed Volume",fmt(closedVol),closedDeals+" closed"),
            kpiCard("Pending Volume",fmt(pendingVol),pendingDeals+" pending"),
            kpiCard("Buy Side Mix",buyPct,String(agent.totalZillow||0)+" Zillow reviews")
          ].join("");
        }
      })
      .catch(()=>{
        kpiWrap.innerHTML='<div class="asg-ph-error" style="grid-column:1/-1">Unable to load '+esc(periodLabel)+' stats right now.</div>';
      })
      .finally(function(){ syncTopStatsToMarketingHeight(); });
  }

  function loadListings(){
    const fetchView=view=>fetch(LISTINGS_API+"?view="+encodeURIComponent(view),{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(d=>{
        if(!d||!Array.isArray(d.listings))throw new Error("Bad listings payload");
        return d.listings;
      })
      .then(items=>items.map(item=>({
        address:item.address||"",
        neighborhood:item.neighborhood||"",
        agent:item.agent||"",
        status:item.status||"",
        listingType:item.listingType||"",
        coverImage:item.coverImage||"",
        photos:item.photos||"",
        matterport:item.matterport||"",
        floorPlan:item.floorPlan||"",
        factSheet:item.factSheet||"",
        openHouse:item.openHouse||"",
        video:item.video||""
      })).filter(item=>normalize(item.agent)===normalize(AGENT_PROFILE.name)));

    return Promise.all([fetchView("active"),fetchView("closed")])
      .then(results=>{
        listings.active=results[0];
        listings.closed=results[1];
      })
      .catch(()=>{
        listings.active=[];
        listings.closed=[];
        listWrap.innerHTML='<div class="asg-ph-error">Unable to load listings. Check Listings API deployment.</div>';
      });
  }

  function loadTeamYtd(){
    return fetch(STATS_API+"?period=ytd2026",{method:"GET",cache:"no-store"})
      .then(r=>r.json())
      .then(data=>{
        if(!data||!data.success||!data.summary)throw new Error("Bad team summary");
        const s=data.summary;
        const totalVolume=Number(s.totalVolume!==undefined?s.totalVolume:((s.closedVolume||0)+(s.pendingVolume||0)))||0;

  function buildFubDealCards(contacts){
    const cards=[];
    contacts.forEach(contact=>{
      const deals=Array.isArray(contact&&contact.deals)?contact.deals:[];
      if(!deals.length)return;
      const allTasks=Array.isArray(contact&&contact.dealTasks&&contact.dealTasks.tasks)?contact.dealTasks.tasks:[];
      const todoTasks=allTasks.filter(task=>!task.completed);
      const doneCount=allTasks.length-todoTasks.length;
      deals.forEach((deal,idx)=>{
        cards.push({
          id:String((deal&&deal.id)||("deal-"+idx+"-"+(contact&&contact.id||""))),
          deal:deal||{},
          contact:contact||{},
          todoCount:todoTasks.length,
          doneCount:doneCount,
          tasks:allTasks
        });
      });
    });
    return cards;
  }

  /* Roadmap inference: maps a deal stage (FUB) to a 6-step pipeline modeled after deal-tracker.html.
     Stages we recognize (case-insensitive substrings):
       Lead / Prospect → 0
       Contract / Under Contract / Active → 1
       Inspection → 2
       Attorney / Review → 3
       Appraisal / Mortgage / Loan / Commitment → 4
       Clear to Close / Closing → 5
     Status "won" or "closed" → 6 (post-close)
  */
  const DT_ROADMAP_STEPS=[
    {key:"lead",        label:"Lead"},
    {key:"contract",    label:"Contract"},
    {key:"inspection",  label:"Inspection"},
    {key:"attorney",    label:"Attorney"},
    {key:"mortgage",    label:"Mortgage"},
    {key:"closing",     label:"Closing"}
  ];
  function formatEarnestMoneyStatus(deal, tasks){
    var d=deal||{};
    var em=d.earnest;
    if(em&&typeof em==="object"){
      var ini=em.initial||{};
      var bal=em.balance||{};
      var bits=[];
      if(ini.receipt||(ini.sent&&ini.toLender))bits.push("Initial deposited");
      else if(ini.sent)bits.push("Initial sent");
      else if(ini.amount)bits.push("Initial pending");
      if(bal.receipt||(bal.sent&&bal.toLender))bits.push("Balance deposited");
      else if(bal.sent)bits.push("Balance sent");
      else if(bal.amount)bits.push("Balance pending");
      if(bits.length)return bits.join(" · ");
    }
    var arr=(tasks||[]).filter(function(t){
      var n=String((t&&t.name)||(t&&t.title)||"").toLowerCase();
      return /\bearnest\b|\bemd\b|\bdeposit\b/.test(n);
    });
    if(!arr.length)return "\u2014";
    var done=arr.filter(function(t){return !!t.completed;}).length;
    if(done===arr.length)return "Complete \u00b7 "+done+"/"+arr.length+" tasks";
    return "In progress \u00b7 "+done+"/"+arr.length+" tasks";
  }
  function inferRoadmapStep(deal){
    const stage=String(deal&&(deal.stage||deal.stageName)||"").toLowerCase();
    const status=String(deal&&deal.status||"").toLowerCase();
    if(status==="won"||/closed|sold|complete/.test(stage))return 6;
    if(/clear to close|closing/.test(stage))return 5;
    if(/mortgage|appraisal|loan|commitment|underwrit/.test(stage))return 4;
    if(/attorney|review|legal/.test(stage))return 3;
    if(/inspection/.test(stage))return 2;
    if(/contract|under contract|pending|active|ratified/.test(stage))return 1;
    if(/lead|prospect|nurture/.test(stage))return 0;
    return 1;
  }
  function buildRoadmap(deal){
    const current=inferRoadmapStep(deal);
    const closeStr=deal&&deal.closeDate?String(deal.closeDate):"";
    const checkSvg='<svg viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><path d="M2.6 6.2l2.3 2.3L9.4 3.7" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    return DT_ROADMAP_STEPS.map(function(step,i){
      let cls="asg-ph-dt-rm-step";
      if(i<current)cls+=" is-done";
      else if(i===current)cls+=" is-current";
      const dateStr=(i===5&&closeStr)?closeStr:"";
      const dotInner=i<current?checkSvg:"";
      return '<div class="'+cls+'">'+
        '<div class="asg-ph-dt-rm-dot">'+dotInner+'</div>'+
        '<div class="asg-ph-dt-rm-label">'+esc(step.label)+'</div>'+
        (dateStr?'<div class="asg-ph-dt-rm-date">'+esc(dateStr)+'</div>':'')+
        '</div>';
    }).join("");
  }
  function dealProgressFromTasks(card){
    const tasks=Array.isArray(card.tasks)?card.tasks:[];
    const total=tasks.length;
    const done=tasks.filter(function(t){return !!t.completed;}).length;
    const pct=total?Math.round((done/total)*100):0;
    return {done:done,total:total,pct:pct};
  }

  function actionLink(title,sub,href,bg,short,copyValue){
    const safe=safeHref(href);
    const isMailOrTel=/^(mailto:|tel:)/i.test(String(href||""));
    const isAnchor=/^#/.test(safe);
    const target=(isMailOrTel||isAnchor)?"":" target=\"_blank\" rel=\"noopener\"";
    if(safe==="#"&&!isMailOrTel&&!isAnchor){
      return `<span class="asg-ph-action" style="opacity:.45;pointer-events:none"><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><span class="asg-ph-action-copy-spacer"></span><span class="asg-ph-action-arrow"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span></span>`;
    }
    if(copyValue){
      return `<div class="asg-ph-action"><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><button type="button" class="asg-ph-action-circle" data-copy="${esc(copyValue)}" aria-label="Copy link"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5.1" y="4.9" width="7.2" height="8.4" rx="1.6" stroke="currentColor" stroke-width="1.6"/><rect x="2.7" y="2.7" width="7.2" height="8.4" rx="1.6" stroke="currentColor" stroke-width="1.6"/></svg></button><a class="asg-ph-action-arrow" href="${esc(isMailOrTel?href:safe)}"${target}><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a></span></div>`;
    }
    return `<a class="asg-ph-action" href="${esc(isMailOrTel?href:safe)}"${target}><span class="asg-ph-action-icon" style="background:${bg}">${short}</span><span class="asg-ph-action-main"><span class="asg-ph-action-title">${esc(title)}</span><br><span class="asg-ph-action-sub">${esc(sub)}</span></span><span class="asg-ph-action-right"><span class="asg-ph-action-copy-spacer"></span><span class="asg-ph-action-arrow"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span></a>`;
  }
  function copyToClipboard(text){
    const value=String(text||"").trim();
    if(!value)return;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(value).catch(function(){fallbackCopy(value);});
      return;
    }
    fallbackCopy(value);
  }
  function fallbackCopy(value){
    const ta=document.createElement("textarea");
    ta.value=value;
    ta.setAttribute("readonly","");
    ta.style.position="absolute";
    ta.style.left="-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  function showCopyToast(){
    if(!copyToast)return;
    copyToast.classList.add("show");
    if(copyToastTimer)clearTimeout(copyToastTimer);
    copyToastTimer=setTimeout(function(){
      copyToast.classList.remove("show");
    },1200);
  }
  /* ----- Events & Updates (Hub Data API) ----- */
  function pickFirst(obj,keys){
    for(var i=0;i<keys.length;i++){
      var k=keys[i];
      if(obj&&obj[k]!==undefined&&obj[k]!==null&&String(obj[k]).trim()!=="")return String(obj[k]).trim();
    }
    return "";
  }
  function eventOnlineUrl(ev){return pickFirst(ev,["join_online_link","join_link","join_online","online_url","join_url","meeting_url","zoom_url","video_url","webinar_url"]);}
  function pad2(n){return (n<10?"0":"")+n;}
  function gcalDateTime(d){return d.getUTCFullYear()+pad2(d.getUTCMonth()+1)+pad2(d.getUTCDate())+"T"+pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+pad2(d.getUTCSeconds())+"Z";}
  function eventStartDate(ev){
    var iso=ev&&ev.computed_event_datetime_iso||"";
    if(iso){var d=new Date(iso);if(!isNaN(d.getTime()))return d;}
    var raw=((ev&&ev.start_date_display)||"")+" "+((ev&&ev.start_time_display)||"");
    var d2=new Date(raw.trim());
    return isNaN(d2.getTime())?null:d2;
  }
  function buildAddToCalendarUrl(ev){
    var start=eventStartDate(ev);
    if(!start)return "";
    var endIso=pickFirst(ev,["end_datetime_iso","computed_event_end_iso"]);
    var end=endIso?new Date(endIso):null;
    if(!end||isNaN(end.getTime())){end=new Date(start.getTime()+60*60*1000);}
    var details=[ev.description,ev.details_url,eventOnlineUrl(ev)].filter(Boolean).join("\n\n");
    var params=[
      "action=TEMPLATE",
      "text="+encodeURIComponent(ev.title||"ASG Event"),
      "dates="+gcalDateTime(start)+"/"+gcalDateTime(end),
      "details="+encodeURIComponent(details),
      "location="+encodeURIComponent(ev.location_name||ev.location_address||"")
    ];
    return "https://calendar.google.com/calendar/render?"+params.join("&");
  }
  function eventActions(ev){
    var btns=[];
    var join=eventOnlineUrl(ev);
    if(join)btns.push('<a class="asg-ph-ev-btn is-primary" href="'+esc(safeHref(join))+'" target="_blank" rel="noopener">'+asgIconJoin+'<span>Join Online</span></a>');
    var cal=buildAddToCalendarUrl(ev);
    if(cal){var calCls=join?"is-secondary":"is-primary";btns.push('<a class="asg-ph-ev-btn '+calCls+'" href="'+esc(cal)+'" target="_blank" rel="noopener">'+asgIconCal+'<span>Add to Calendar</span></a>');}
    if(ev.details_url)btns.push('<a class="asg-ph-ev-btn is-secondary" href="'+esc(safeHref(ev.details_url))+'" target="_blank" rel="noopener">'+asgIconLink+'<span>Details</span></a>');
    return btns.length?'<div class="asg-ph-ev-actions">'+btns.join("")+"</div>":"";
  }
  function eventSearchBlob(ev){
    return [ev.title,ev.start_date_display,ev.start_time_display,ev.location_name,ev.location_address,ev.description].filter(Boolean).join(" ").toLowerCase();
  }
  function updateSearchBlob(up){
    return [up.title,up.category,up.message_short,up.publish_date_display].filter(Boolean).join(" ").toLowerCase();
  }
  function buildEventFeature(ev){
    var coverUrl=ev.cover_image_url||"";
    var coverInner=coverUrl?'<img class="asg-ph-ev-feature-img" src="'+esc(coverUrl)+'" alt="" loading="lazy">':"";
    var cover='<div class="asg-ph-ev-feature-media">'+coverInner+"</div>";
    var meta=[ev.start_date_display,ev.start_time_display,ev.location_name].filter(Boolean).join(" \u00b7 ");
    var blob=eventSearchBlob(ev);
    return '<div class="asg-ph-ev-feature" data-srch data-srch-text="'+esc(blob)+'">'+cover+
      '<div class="asg-ph-ev-feature-body">'+
        '<span class="asg-ph-ev-feature-eyebrow">Next Up</span>'+
        '<h3 class="asg-ph-ev-feature-title">'+esc(ev.title||"")+"</h3>"+
        '<div class="asg-ph-ev-feature-meta">'+esc(meta)+"</div>"+
        (ev.attire_display?'<div class="asg-ph-ev-feature-meta">Attire: '+esc(ev.attire_display)+"</div>":"")+
        eventActions(ev)+
      "</div></div>";
  }
  function buildEventMini(ev){
    var meta=[ev.start_date_display,ev.start_time_display].filter(Boolean).join(" \u00b7 ");
    var blob=eventSearchBlob(ev);
    return '<div class="asg-ph-ev-mini" data-srch data-srch-text="'+esc(blob)+'">'+
      '<h4 class="asg-ph-ev-mini-title">'+esc(ev.title||"")+"</h4>"+
      '<div class="asg-ph-ev-mini-meta">'+esc(meta)+"</div>"+
      (ev.location_name?'<div class="asg-ph-ev-mini-meta">'+esc(ev.location_name)+"</div>":"")+
      eventActions(ev)+
    "</div>";
  }
  function categoryClass(cat){
    var c=String(cat||"").toLowerCase();
    if(c==="training")return "is-training";
    if(c==="alert"||c==="urgent")return "is-alert";
    if(c==="reminder")return "is-reminder";
    return "is-notice";
  }
  function updateReadMoreUrl(up){return pickFirst(up,["post_url","read_more_url","link","url"])||ASG_UPDATES_FALLBACK_URL;}
  function buildUpdateRow(up){
    var cat=up.category||"";
    var pillCls=cat?" "+categoryClass(cat):"";
    var href=updateReadMoreUrl(up);
    var blob=updateSearchBlob(up);
    return '<div class="asg-ph-up-row" data-srch data-srch-text="'+esc(blob)+'">'+
      '<div class="asg-ph-up-top"><h4 class="asg-ph-up-title">'+esc(up.title||"")+"</h4>"+
        (cat?'<span class="asg-ph-up-pill'+pillCls+'">'+esc(cat)+"</span>":"")+
      "</div>"+
      '<div class="asg-ph-up-meta">'+esc(up.publish_date_display||"")+"</div>"+
      '<p class="asg-ph-up-msg">'+esc(clip(up.message_short,140))+"</p>"+
      '<a class="asg-ph-up-link" href="'+esc(safeHref(href))+'" target="_blank" rel="noopener">Read more'+asgIconLink+'</a>'+
      "</div>";
  }

  function flattenEvents(eventsData){
    var ev=eventsData||{};
    var list=[];
    if(ev.nextUp)list.push(ev.nextUp);
    if(Array.isArray(ev.upcoming))ev.upcoming.forEach(function(e){if(!ev.nextUp||e._rowNumber!==ev.nextUp._rowNumber)list.push(e);});
    if(Array.isArray(ev.future))list=list.concat(ev.future);
    return list;
  }
  function flattenUpdates(updatesData){
    var up=updatesData||{};
    if(Array.isArray(up.ordered))return up.ordered.slice();
    if(up.latest)return [up.latest];
    return [];
  }

  function nextEventFromData(eventsData){
    var ev=eventsData||{};
    if(ev.nextUp)return ev.nextUp;
    var list=flattenEvents(eventsData);
    return list.length?list[0]:null;
  }
  function renderEventsPanel(eventsData,updatesData,query){
    if(!eventsPanel)return;
    eventsState.events=eventsData;
    eventsState.updates=updatesData;
    var allEvents=flattenEvents(eventsData);
    var allUpdates=flattenUpdates(updatesData);
    eventsAll=allEvents;
    updatesAll=allUpdates;
    var q=String(query||"").trim().toLowerCase();
    if(currentEuMode==="updates"){
      var up=q?allUpdates.filter(function(u){return updateSearchBlob(u).indexOf(q)>=0;}):allUpdates;
      if(!up.length){
        eventsPanel.innerHTML='<div class="asg-ph-empty">'+(q?'No updates match your search.':'No updates posted yet.')+'</div>';
        return;
      }
      eventsPanel.innerHTML=up.map(function(u){return buildUpdateRow(u);}).join("");
      return;
    }
    var nextEv=nextEventFromData(eventsData);
    if(q&&nextEv&&eventSearchBlob(nextEv).indexOf(q)<0)nextEv=null;
    if(!nextEv){
      eventsPanel.innerHTML='<div class="asg-ph-empty">'+(q?'No upcoming event matches your search.':'No upcoming events scheduled.')+'</div>';
      return;
    }
    eventsPanel.innerHTML='<div class="asg-ph-eu-events-single">'+buildEventFeature(nextEv)+"</div>";
  }

  function loadEventsAndUpdates(){
    if(!eventsPanel&&!root.querySelector("#asgPhGreetPhoto"))return Promise.resolve();
    return hubDataPromise
      .then(function(payload){
        if(!payload||!payload.success||!payload.data)throw new Error("Bad hub payload");
        applyDirectoryPhoto(payload.data.directory);
        applyDirectoryBranding(payload.data.directory);
        if(eventsPanel){
          renderEventsPanel(payload.data.events||{},payload.data.updates||{},"");
        }
      })
      .catch(function(){
        var u=String(greetPhotoDefault||"").trim();
        if(u)setGreetPhoto(u);
        if(eventsPanel)eventsPanel.innerHTML='<div class="asg-ph-error">Unable to load events &amp; updates right now.</div>';
      });
  }

  function findDirectoryAgentRow(directory){
    var rows=directory&&Array.isArray(directory.rows)?directory.rows:[];
    if(!rows.length)return null;
    var targetEmail=String(AGENT_PROFILE.email||"").toLowerCase().trim();
    var targetName=normalize(AGENT_PROFILE.name);
    var match=rows.find(function(r){
      var email=String(r&&r.email||"").toLowerCase().trim();
      return targetEmail&&email===targetEmail;
    });
    if(!match){
      match=rows.find(function(r){
        var name=normalize(r&&(r.name||r.display_name)||"");
        return targetName&&name===targetName;
      });
    }
    return match||null;
  }

  /* Pulls icon_photo_url for this agent from the Team Directory sheet
     and updates the greeting hero photo + tier in place. */
  function applyDirectoryPhoto(directory){
    var match=findDirectoryAgentRow(directory);
    var fromSheet="";
    if(match){
      fromSheet=String(match.icon_photo_url||match.image_url||match.photo||match.headshot_url||"").trim();
    }
    var url=fromSheet||String(greetPhotoDefault||"").trim();
    if(!url)return;
    if(fromSheet) AGENT_PROFILE.photo=fromSheet;
    setGreetPhoto(url);
  }
  function applyDirectoryBranding(directory){
    var match=findDirectoryAgentRow(directory);
    if(!match)return;
    var fromSheet=Array.isArray(match.computed_branding_materials)?match.computed_branding_materials:[];
    if(!fromSheet.length)return;
    dynamicBrandingMaterials=DOWNLOADABLES.map(function(base,idx){
      var key=BRANDING_ASSET_KEYS[idx]||("asset_"+idx);
      var mapped=fromSheet.find(function(x){return String((x&&x.key)||"")===key;})||{};
      return {
        key:key,
        label:base.label,
        href:String(mapped.href||"").trim(),
        logo:base.logo||"",
        updated_at_display:String(mapped.updated_at_display||"").trim(),
        updated_at_iso:String(mapped.updated_at_iso||"").trim()
      };
    });
    renderDownloadsList();
  }

  /* ----- Resources / Quick Links ----- */
  function quickLinkSearchBlob(link){return [link.title,link.sub,link.fallback].filter(Boolean).join(" ").toLowerCase();}
  function renderQuickLinksGrid(query){
    if(!quickLinksWrap)return;
    var q=String(query||"").trim().toLowerCase();
    var items=q?QUICK_LINKS.filter(l=>quickLinkSearchBlob(l).indexOf(q)>=0):QUICK_LINKS;
    if(!items.length){
      quickLinksWrap.innerHTML='<div class="asg-ph-empty" style="grid-column:1/-1">No links match your search.</div>';
      return;
    }
    quickLinksWrap.innerHTML=items.map(function(link){
      var href=safeHref(link.href);
      var isDead=!/^https?:\/\//i.test(href);
      var fb=link.fallback?esc(link.fallback):esc(link.title.slice(0,3).toUpperCase());
      var logo=link.logo
        ?'<img class="asg-ph-ql-logo" src="'+esc(link.logo)+'" alt="" loading="lazy">'
        :'<div class="asg-ph-ql-logo-fallback">'+fb+"</div>";
      var blob=quickLinkSearchBlob(link);
      return '<a class="asg-ph-ql-card" data-srch data-srch-text="'+esc(blob)+'" href="'+esc(href)+'"'+(isDead?' onclick="return false" style="opacity:.68"':' target="_blank" rel="noopener"')+">"+
        logo+
        '<span class="asg-ph-ql-text"><span class="asg-ph-ql-title">'+esc(link.title)+'</span><span class="asg-ph-ql-sub">'+esc(link.sub||"Quick access")+'</span></span>'+
      "</a>";
    }).join("");
  }

  /* ----- Agent Branding materials list + design meeting CTA ----- */
  function renderDownloadsList(){
    if(!downloadsWrap)return;
    var items=Array.isArray(dynamicBrandingMaterials)?dynamicBrandingMaterials:[];
    if(!items.length){
      downloadsWrap.innerHTML='<div class="asg-ph-empty">No branding materials available right now.</div>';
      return;
    }
    var rows=items.map(function(link){
      var logoHtml=link.logo?'<img class="asg-ph-drive-logo" src="'+esc(link.logo)+'" alt="Google Drive" loading="lazy">':"";
      var href=safeHref(link.href);
      var isDead=href==="#";
      var updatedLabel=String(link.updated_at_display||"").trim();
      var updatedHtml=String(link.key||"")==="marketing_drive"
        ?''
        :'<span class="asg-ph-download-meta">'+esc(updatedLabel?("Updated "+updatedLabel):"Last updated: not tracked yet")+'</span>';
      return '<div class="asg-ph-download-row">'+
        '<span class="asg-ph-download-label-wrap"><span class="asg-ph-download-label-main">'+logoHtml+'<span class="asg-ph-download-label">'+esc(link.label)+'</span></span>'+updatedHtml+'</span>'+
        (isDead
          ?'<span class="asg-ph-download-btn is-disabled" aria-disabled="true">Access</span>'
          :'<a class="asg-ph-download-btn" href="'+esc(href)+'" target="_blank" rel="noopener" aria-label="Access '+esc(link.label)+'">Access</a>')+
      '</div>';
    });
    rows.push(
      '<div class="asg-ph-download-row is-cta">'+
      '<span class="asg-ph-download-label-wrap"><span class="asg-ph-download-label">Update Your Materials</span></span>'+
      '<a class="asg-ph-download-btn" href="https://asgmarketing.as.me/?appointmentType=85904162" target="_blank" rel="noopener" aria-label="Schedule a design meeting">Book</a>'+
      '</div>'
    );
    downloadsWrap.innerHTML=rows.join("");
    syncBottomBentoHeights();
  }

  /* ----- Per-bento search highlight engine -----
     Scoped to the bento body that owns the search input.
     Toggles `.is-searching` on the bento body, applies `.is-srch-match`
     to children that contain the query, and dims the rest. */
  function applyBentoSearch(scopeEl,value){
    if(!scopeEl)return;
    var q=String(value||"").trim().toLowerCase();
    var hasQ=q.length>0;
    var targets=scopeEl.querySelectorAll("[data-srch]");
    targets.forEach(function(el){
      var blob=String(el.getAttribute("data-srch-text")||"").toLowerCase();
      if(!blob)blob=(el.textContent||"").toLowerCase();
      var hit=hasQ&&blob.indexOf(q)>=0;
      el.classList.toggle("is-srch-match",hit);
    });
    scopeEl.classList.toggle("is-searching",hasQ);
    if(hasQ){
      var first=scopeEl.querySelector("[data-srch].is-srch-match");
      if(first&&typeof first.scrollIntoView==="function"){
        try{
          // Gently scroll within the bento body; nearest avoids page-scroll jumps.
          first.scrollIntoView({behavior:"smooth",block:"nearest"});
        }catch(e){}
      }
    }
  }

  function findBestAgentMatch(agents,targetName){
    const targetNorm=normalize(targetName);
    const targetFirst=normalize(firstName(targetName));
    let found=agents.find(a=>normalize(a&&a.name)===targetNorm);
    if(found)return found;
    found=agents.find(a=>{
      const n=normalize(a&&a.name);
      return n.startsWith(targetNorm)||targetNorm.startsWith(n);
    });
    if(found)return found;
    found=agents.find(a=>normalize(a&&a.name).includes(targetNorm));
    if(found)return found;
    const firstMatches=agents.filter(a=>normalize(firstName(a&&a.name))===targetFirst);
    if(firstMatches.length===1)return firstMatches[0];
    return null;
  }
})();
</script>

<!-- ASG Usage Beacon (Command Center adoption tracking) -->
<script>
(function(){
  "use strict";
  if (window.__ASG_BEACON_INITIALIZED__) return;
  window.__ASG_BEACON_INITIALIZED__ = true;

  var DEFAULT_ENDPOINT = "https://script.google.com/macros/s/AKfycbw8Tv0hhbnXmU7Ik_tDX0Yve3aN3PC4sDFtDzUAPAZbDotaZU4wBlOxhjqeuCVdk2n3Yg/exec";
  var ENDPOINT = (window.ASG_USAGE_LOG_API || DEFAULT_ENDPOINT || "").trim();
  if (!ENDPOINT) return;

  var PAGE = "agent-hub-nicolas-gamboa-wills";
  var AGENT_EMAIL = "nicolas.gamboawills@compass.com";
  var AGENT_NAME = "Nicolas Gamboa Wills";

  function getOrCreate(storage, key, gen){
    try { var v = storage.getItem(key); if (v) return v; var n = gen(); storage.setItem(key, n); return n; }
    catch (e) { return gen(); }
  }
  function uuid(){ return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
    : "v-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,10); }

  var visitorId = getOrCreate(localStorage, "asg.visitor_id", uuid);
  var sessionId = getOrCreate(sessionStorage, "asg.session_id", uuid);

  function send(payload){
    payload.timestamp = new Date().toISOString();
    payload.page = PAGE;
    payload.url = location.href;
    payload.referrer = document.referrer || "";
    payload.user_agent = navigator.userAgent;
    payload.visitor_id = visitorId;
    payload.session_id = sessionId;
    payload.agent_email = AGENT_EMAIL;
    payload.agent_name = AGENT_NAME;
    var body = JSON.stringify(payload);
    try {
      if (navigator.sendBeacon && payload.type !== "view") {
        var blob = new Blob([body], { type: "application/json" });
        if (navigator.sendBeacon(ENDPOINT, blob)) return;
      }
    } catch (e1) {}
    try {
      fetch(ENDPOINT, {
        method: "POST", mode: "no-cors", keepalive: true,
        headers: { "Content-Type": "text/plain;charset=UTF-8" },
        body: body
      }).catch(function(){});
    } catch (e2) {}
  }

  function trackView(){ send({ type: "view", label: PAGE }); }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", trackView, { once: true });
  } else {
    trackView();
  }

  document.addEventListener("click", function(ev){
    var el = ev.target && ev.target.closest ? ev.target.closest("[data-track], .asg-track, a[href]") : null;
    if (!el) return;
    var label = el.getAttribute("data-track")
      || el.getAttribute("aria-label")
      || (el.textContent || "").trim().slice(0, 80);
    if (!label) return;
    var meta = {};
    if (el.tagName === "A" && el.href) meta.href = el.href;
    send({ type: "click", label: label, meta: meta });
  }, true);

  window.addEventListener("pagehide", function(){
    send({ type: "session_end", label: PAGE });
  });

  window.asgTrack = function(type, label, meta){
    send({ type: String(type||"custom"), label: String(label||""), meta: meta || null });
  };
})();
</script>
