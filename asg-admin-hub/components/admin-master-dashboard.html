    function initDealsTables() {
      var wraps = root.querySelectorAll('.amd-table-wrap[data-deals-table="1"]');
      for (var wi = 0; wi < wraps.length; wi++) {
        (function (wrap) {
          var table = wrap.querySelector("table");
          var tbody = table ? table.querySelector("tbody") : null;
          if (!table || !tbody) return;
          var search = (wrap.previousElementSibling && wrap.previousElementSibling.matches(".amd-table-tools"))
            ? wrap.previousElementSibling.querySelector("[data-deals-search]")
            : null;
          var buttons = table.querySelectorAll(".amd-sort-btn");
          var state = { q: "", key: "", type: "text", dir: "asc" };

          function parseValue(val, type) {
            if (type === "number") return Number(val) || 0;
            return String(val || "").toLowerCase();
          }

          function updateSortUI() {
            for (var bi = 0; bi < buttons.length; bi++) {
              var b = buttons[bi];
              var arrow = b.querySelector(".amd-sort-arrow");
              var active = b.getAttribute("data-sort-key") === state.key;
              b.classList.toggle("is-active", active);
              if (arrow) arrow.textContent = active ? (state.dir === "desc" ? "↓" : "↑") : "↑";
            }
          }

          function applyTableState() {
            var rows = Array.prototype.slice.call(tbody.querySelectorAll("tr"));
            var dataRows = rows.filter(function (r) {
              var td = r.querySelector("td");
              return !(td && td.hasAttribute("colspan"));
            });

            var q = String(state.q || "").trim().toLowerCase();
            dataRows.forEach(function (row) {
              var txt = row.textContent.toLowerCase();
              row.style.display = (!q || txt.indexOf(q) > -1) ? "" : "none";
            });

            var visible = dataRows.filter(function (r) { return r.style.display !== "none"; });
            if (state.key && visible.length > 1) {
              visible.sort(function (a, b) {
                var ca = a.querySelector("td[data-sort-key='" + state.key + "']");
                var cb = b.querySelector("td[data-sort-key='" + state.key + "']");
                var va = parseValue(ca ? ca.getAttribute("data-sort-value") : "", state.type);
                var vb = parseValue(cb ? cb.getAttribute("data-sort-value") : "", state.type);
                if (va < vb) return state.dir === "desc" ? 1 : -1;
                if (va > vb) return state.dir === "desc" ? -1 : 1;
                return 0;
              });
              visible.forEach(function (r) { tbody.appendChild(r); });
            }

            var existingEmpty = tbody.querySelector("tr[data-filter-empty='1']");
            if (visible.length === 0) {
              if (!existingEmpty) {
                var tr = document.createElement("tr");
                tr.setAttribute("data-filter-empty", "1");
                var td = document.createElement("td");
                td.colSpan = table.querySelectorAll("thead th").length || 1;
                td.style.textAlign = "center";
                td.style.color = "#64748b";
                td.textContent = "No matching deals.";
                tr.appendChild(td);
                tbody.appendChild(tr);
              }
            } else if (existingEmpty) {
              existingEmpty.remove();
            }
          }

          if (search) {
            search.addEventListener("input", function () {
              state.q = this.value || "";
              applyTableState();
            });
          }

          for (var bi = 0; bi < buttons.length; bi++) {
            buttons[bi].addEventListener("click", function () {
              var key = this.getAttribute("data-sort-key") || "";
              var type = this.getAttribute("data-sort-type") || "text";
              if (state.key !== key) {
                state.key = key;
                state.type = type;
                var preferredFirstDir = {
                  agent: "asc",      // alphabetical: Alex first
                  side: "asc",
                  closeDate: "asc",  // soonest upcoming first
                  volume: "desc"
                };
                state.dir = preferredFirstDir[key] || "asc";
              } else {
                state.dir = state.dir === "desc" ? "asc" : "desc";
              }
              updateSortUI();
              applyTableState();
            });
          }

          updateSortUI();
        })(wraps[wi]);
      }
    }

    function buildAgentForecastRows(model) {

        var w = STAGE_WEIGHTS[stageKey] != null ? STAGE_WEIGHTS[stageKey] : 0.5;
        var k = d.agent || "Unknown";
        if (!byAgentPendingWeighted[k]) byAgentPendingWeighted[k] = 0;
        byAgentPendingWeighted[k] += (Number(d.price) || 0) * w;
      });

      var source = (model.ytdLeaderboard || []).length ? model.ytdLeaderboard : model.leaderboard;
      return source.map(function (a) {
        var weightedPending = byAgentPendingWeighted[a.agent] || 0;
        var expected = (Number(a.closedVolume) || 0) + weightedPending;
        return {
          agent: a.agent,
          closedVolume: Number(a.closedVolume) || 0,
          pendingWeighted: weightedPending,
          expectedVolume: expected,
          closedDeals: Number(a.closedDeals) || 0,
          pendingDeals: Number(a.pendingDeals) || 0

      }).sort(function (x, y) {

    function buildQuarterlyTrendSeries() {
      var byYear = {};
      QT_YEARS.forEach(function (y) { byYear[y] = { vol: [0,0,0,0], deals: [0,0,0,0] }; });
      var seen = {};
      function ingest(d) {
        if (!d.closeDate || isNaN(d.closeDate.getTime())) return;
        var year = d.closeDate.getFullYear();
        if (!byYear[year]) return;
        var key = year + '-' + d.closeDate.getMonth() + '-' + (d.address || '') + '-' + (d.price || 0);
        if (seen[key]) return;
        seen[key] = true;
        var q = Math.floor(d.closeDate.getMonth() / 3);
        byYear[year].vol[q] += Number(d.price) || 0;
        byYear[year].deals[q] += 1;
      }
      (state.allTimeClosedDeals || []).forEach(ingest);
      (state.ytdClosedDeals || []).forEach(ingest);

      var rows = QT_YEARS.map(function (year) {
        var b = byYear[year];
        return {
          year: year,
          quarters: b.vol.slice(),
          deals: b.deals.slice(),
          projected: [false, false, false, false],
          total: b.vol[0] + b.vol[1] + b.vol[2] + b.vol[3]
        };
      });

      var r2026 = null;
      for (var ri = 0; ri < rows.length; ri++) {
        if (rows[ri].year === 2026) { r2026 = rows[ri]; break; }
      }
      if (r2026 && r2026.quarters[0] > 0) {
        var byYr = {};
        rows.forEach(function (r) { byYr[r.year] = r; });
        var trendYears = [2023, 2024, 2025];
        r2026.partialActual = [0, 0, 0, 0];
        for (var pq = 0; pq < 4; pq++) {
          var jumps = [];
          var jumpDeals = [];
          for (var ti = 1; ti < trendYears.length; ti++) {
            var prev = byYr[trendYears[ti - 1]];
            var curr = byYr[trendYears[ti]];
            if (prev && curr && prev.quarters[pq] > 0 && curr.quarters[pq] > 0) {
              jumps.push(curr.quarters[pq] - prev.quarters[pq]);
              jumpDeals.push(curr.deals[pq] - prev.deals[pq]);
            }
          }
          var avgJump = jumps.length > 0 ? jumps.reduce(function (s, v) { return s + v; }, 0) / jumps.length : 0;
          var avgDealJump = jumpDeals.length > 0 ? jumpDeals.reduce(function (s, v) { return s + v; }, 0) / jumpDeals.length : 0;
          var base2025 = byYr[2025] ? byYr[2025].quarters[pq] : 0;
          var baseDeals2025 = byYr[2025] ? byYr[2025].deals[pq] : 0;
          var projVal = Math.max(0, Math.round(base2025 + avgJump));
          var projDeals = Math.max(0, Math.round(baseDeals2025 + avgDealJump));

          if (pq === 0) continue;
          r2026.partialActual[pq] = r2026.quarters[pq];
          if (projVal > r2026.quarters[pq]) {
            r2026.quarters[pq] = projVal;
            r2026.deals[pq] = projDeals;
          }
          r2026.projected[pq] = true;
        }
        r2026.total = r2026.quarters[0] + r2026.quarters[1] + r2026.quarters[2] + r2026.quarters[3];
      }

      return rows;
    }

          ? '<text x="' + p.x.toFixed(1) + '" y="' + (p.y - p.r - 6).toFixed(1) + '" text-anchor="middle" fill="#333" font-size="9" font-weight="700"' + ts + ' pointer-events="none">' + esc(p.label) + '</text>'
          : '';
        return (
          visual +
          '<circle class="amd-hit-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + (p.r + 10).toFixed(1) + '" fill="transparent" data-vis-dot="' + p.id + '" data-tip-type="agent" data-tip-agent="' + esc(p.agentName) + '" data-tip-volume="' + p.volume + '" data-tip-deals="' + p.deals + '" data-tip-color="' + p.fill + '" data-tip-rate="' + Math.round(p.closeRate * 100) + '" data-tip-avg="' + p.avgDeal + '"/>' +
          label
        );
      }).join('');

      var toggles = '<div style="display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;margin:0 0 10px 2px;">' +
        '<button class="amd-qt-legend-btn amd-matrix-toggle' + (matrixView === "ytd" ? ' is-active' : '') + '" data-matrix-view="ytd" type="button">YTD</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-toggle' + (matrixView === "allTime" ? ' is-active' : '') + '" data-matrix-view="allTime" type="button">All Time</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "all" ? ' is-active' : '') + '" data-matrix-tier="all" type="button">All</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "senior" ? ' is-active' : '') + '" data-matrix-tier="senior" type="button">Seniors</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "junior" ? ' is-active' : '') + '" data-matrix-tier="junior" type="button">Juniors</button>' +
      '</div>';

      return toggles + '<svg class="amd-viz-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet" style="height:' + h + 'px;overflow:visible">' +
        grid +
        xGrid +
        '<line x1="' + padLeft + '" y1="' + (padTop + plotH) + '" x2="' + (w - padRight) + '" y2="' + (padTop + plotH) + '" stroke="#d4d4d4" stroke-width="1"/>' +
        '<line x1="' + padLeft + '" y1="' + padTop + '" x2="' + padLeft + '" y2="' + (padTop + plotH) + '" stroke="#d4d4d4" stroke-width="1"/>' +
        '<text x="' + (padLeft + plotW / 2).toFixed(1) + '" y="' + (h - 6) + '" text-anchor="middle" fill="#666" font-size="11" font-weight="600"' + ts + '>Total Deals</text>' +
        '<text x="' + 16 + '" y="' + (padTop + plotH / 2).toFixed(1) + '" transform="rotate(-90 16 ' + (padTop + plotH / 2).toFixed(1) + ')" text-anchor="middle" fill="#666" font-size="11" font-weight="600"' + ts + '>Total Volume</text>' +
        dots +
      '</svg>';
    }

    function renderAgentContributionChart(model) {
      var rows = (model.allTimeLeaderboard.length ? model.allTimeLeaderboard : model.leaderboard).slice(0, 8);
      if (!rows.length) return '<div class="amd-empty">No agent leaderboard data.</div>';
      var maxV = Math.max(1, rows[0].totalVolume || 0);
      return rows.map(function (r) {
        var pct = Math.max(4, Math.round((r.totalVolume / maxV) * 100));
        return '<div style="display:grid;grid-template-columns:132px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;">' +
          '<div style="font-size:11px;font-weight:700;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(r.agent) + "</div>" +
          '<div style="height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:#475569;border-radius:999px;"></div></div>' +
          '<div style="font-size:11px;font-weight:700;color:#0f172a;">' + esc(fmtMoney(r.totalVolume)) + "</div>" +
          "</div>";
      }).join("");
    }

    function renderAgentScoreChart(model) {
      var rows = buildAgentScoreRows(model);
      if (!rows.length) return '<div class="amd-empty">No score data yet (requires Directory + All Time feed).</div>';
      function toneStyles(tone) {
        if (tone === "red") {
          return {
            border: "#fecaca",
            bg: "#fff1f2",
            badgeBg: "#fee2e2",
            badgeText: "#991b1b",
            dot: "#b91c1c"
          };
        }
        if (tone === "yellow") {
          return {
            border: "#fde68a",
            bg: "#fffbeb",
            badgeBg: "#fef3c7",
            badgeText: "#92400e",
            dot: "#d97706"
          };
        }
        return {
          border: "#86efac",
          bg: "#f0fdf4",
          badgeBg: "#dcfce7",
          badgeText: "#166534",
          dot: "#15803d"
        };
      }
      return '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;">' +
        rows.map(function (r, idx) {
          var photo = String(r.photo || "");
          var backupPhoto = String(resolveAgentPhotoName(r.key || r.agent) || "");
          var imgSrc = photo || backupPhoto;
          var initials = (r.agent || "A").split(" ").slice(0, 2).map(function (p) { return p ? p.charAt(0) : ""; }).join("");
          var tone = toneStyles(r.statusTone);
          return '<article style="border:1px solid rgba(15,23,42,0.1);border-radius:10px;padding:8px;background:#fff;min-width:0;">' +
            '<div style="border:1px solid ' + tone.border + ';background:' + tone.bg + ';border-radius:10px;padding:7px;">' +
            '<div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">' +
              '<div style="display:grid;grid-template-columns:48px 1fr;gap:9px;align-items:center;min-width:0;">' +
                (imgSrc
                  ? '<div style="position:relative;width:48px;height:48px;border-radius:50%;overflow:hidden;border:1.5px solid #e2e8f0;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;">' +
                      esc(initials) +
                      '<img src="' + esc(imgSrc) + '" data-fb="' + esc(backupPhoto) + '" alt="' + esc(r.agent) + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="if(this.dataset.fb && this.src!==this.dataset.fb){this.src=this.dataset.fb;return;}this.style.display=\'none\';" />' +
                    '</div>'
                  : '<div style="width:48px;height:48px;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;">' + esc(initials) + '</div>') +
                '<div style="min-width:0;">' +
                  '<div style="font-size:13px;font-weight:800;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">#' + (idx + 1) + ' ' + esc(r.agent) + '</div>' +
                  '<div style="font-size:10px;color:#64748b;">Time with ASG: ' + esc(r.tenureLabel || "—") + '</div>' +
                '</div>' +
              '</div>' +
              '<div style="display:grid;grid-template-columns:auto auto;column-gap:8px;row-gap:4px;align-items:center;font-size:11px;color:#475569;text-align:right;">' +
                '<div style="font-weight:700;">All-time</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.totalVolume)) + '</div>' +
                '<div style="font-weight:700;">Current</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.currentVolume || 0)) + '</div>' +
                '<div style="font-weight:700;">Deals</div><div style="font-weight:800;color:#0f172a;">' + fmtNum(r.totalDeals) + '</div>' +
                '<div style="font-weight:700;">Pace</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.annualizedVolume)) + '/yr</div>' +
              '</div>' +
            '</div>' +
            '<div style="margin-top:7px;display:flex;justify-content:space-between;align-items:center;">' +
              '<span style="display:inline-block;padding:2px 7px;border-radius:999px;background:' + tone.badgeBg + ';color:' + tone.badgeText + ';font-size:8px;font-weight:800;letter-spacing:.02em;">' + esc(r.statusLabel) + '</span>' +
              '<div style="width:10px;height:10px;border-radius:50%;background:' + tone.dot + ';"></div>' +
            '</div>' +
            '</div>' +
          '</article>';
        }).join("") +
      '</div>';
    }

    function buildAgentClosingTrendRows(model) {
      var monthlyByAgent = {};
      var allMonthKeys = {};
      var sourceDeals = (state.allTimeClosedDeals || []).concat(state.ytdClosedDeals || []);

      sourceDeals.forEach(function (d) {
        if (!d || !d.closeDate || isNaN(d.closeDate.getTime())) return;
        var key = normalizeAgentKey(d.agent);
        if (!key || isRemovedAgent(key)) return;
        var monthKey = d.closeDate.getFullYear() + "-" + String(d.closeDate.getMonth() + 1).padStart(2, "0");
        allMonthKeys[monthKey] = true;
        if (!monthlyByAgent[key]) monthlyByAgent[key] = {};
        if (!monthlyByAgent[key][monthKey]) monthlyByAgent[key][monthKey] = { volume: 0, deals: 0 };
        monthlyByAgent[key][monthKey].volume += Number(d.price) || 0;
        monthlyByAgent[key][monthKey].deals += 1;
      });

      var monthKeys = Object.keys(allMonthKeys).sort();
      if (!monthKeys.length) return [];
      monthKeys = monthKeys.slice(-18);

      var scores = buildAgentScoreRows(model);
      var topAgents = scores.slice(0, 8);
      if (!topAgents.length) return [];

      return topAgents.map(function (r) {
        var key = normalizeAgentKey(r.agent);
        var months = monthKeys.map(function (mk) {
          var stat = (monthlyByAgent[key] && monthlyByAgent[key][mk]) ? monthlyByAgent[key][mk] : { volume: 0, deals: 0 };
          return { monthKey: mk, volume: stat.volume, deals: stat.deals };
        });
        var peak = months.reduce(function (best, m) {
          if (!best || m.volume > best.volume) return m;
          return best;
        }, null) || { monthKey: "", volume: 0, deals: 0 };
        return {
          agent: r.agent,
          score: r.agentScore || 0,
          months: months,
          peakMonthKey: peak.monthKey,
          peakVolume: peak.volume || 0,
          peakDeals: peak.deals || 0
        };
      });
    }

    function renderAgentClosingTrendsChart(model) {
      var rows = buildAgentClosingTrendRows(model);
      if (!rows.length) return '<div class="amd-empty">No agent closing-trend data yet (needs closed deals with dates).</div>';

      function fmtMonthKey(monthKey) {
        var m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
        if (!m) return "—";
        var d = new Date(Number(m[1]), Number(m[2]) - 1, 1);
        return d.toLocaleDateString(undefined, { month: "short", year: "2-digit" });
      }

      return rows.map(function (r) {
        var vals = r.months.map(function (m) { return Number(m.volume) || 0; });
        var maxV = Math.max(1, vals.reduce(function (mx, v) { return Math.max(mx, v); }, 0));
        var w = 300, h = 44, padX = 4, padY = 4;
        var step = vals.length > 1 ? ((w - padX * 2) / (vals.length - 1)) : 0;
        var pts = vals.map(function (v, i) {
          var x = padX + i * step;
          var y = h - padY - ((v / maxV) * (h - padY * 2));
          return { x: x, y: y, v: v };
        });
        var path = pts.map(function (p, i) {
          return (i ? " L " : "M ") + p.x.toFixed(1) + " " + p.y.toFixed(1);
        }).join("");
        var last = pts.length ? pts[pts.length - 1] : { x: padX, y: h - padY };

        return '<div style="display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(15,23,42,0.08);">' +
          '<div>' +
            '<div style="font-size:12px;font-weight:800;color:#0f172a;">' + esc(r.agent) + '</div>' +
            '<div style="font-size:10px;color:#64748b;">Best month: ' + esc(fmtMonthKey(r.peakMonthKey)) + ' · ' + esc(fmtMoney(r.peakVolume)) + ' · ' + fmtNum(r.peakDeals) + ' deals</div>' +
          '</div>' +
          '<div>' +
            '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%;height:44px;display:block;">' +
              '<path d="' + path + '" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<circle cx="' + last.x.toFixed(1) + '" cy="' + last.y.toFixed(1) + '" r="2.8" fill="#111"/>' +
            '</svg>' +
            '<div style="display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:2px;"><span>Last 18 months</span><span>Peak ' + esc(fmtMoneyRounded(maxV)) + '</span></div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderStageMixChart() {
      var buckets = {};
      (state.ytdPendingDeals || []).forEach(function (d) {
        var s = normalizeStage(d.stage);
        if (!buckets[s]) buckets[s] = { stage: s, deals: 0, volume: 0 };
        buckets[s].deals += 1;
        buckets[s].volume += Number(d.price) || 0;
      });
      var rows = Object.keys(buckets).map(function (k) { return buckets[k]; }).sort(function (a, b) { return b.volume - a.volume; });
      if (!rows.length) return '<div class="amd-empty">No active stage data.</div>';
      var total = rows.reduce(function (s, r) { return s + r.volume; }, 0) || 1;
      return rows.map(function (r) {
        var pct = Math.round((r.volume / total) * 100);
        return '<div style="display:grid;grid-template-columns:140px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;">' +
          '<div style="font-size:11px;font-weight:700;color:#334155;">' + esc(r.stage) + "</div>" +
          '<div style="height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;"><div style="height:100%;width:' + Math.max(4, pct) + '%;background:#64748b;border-radius:999px;"></div></div>' +
          '<div style="font-size:11px;font-weight:700;color:#0f172a;">' + pct + '%</div>' +
          "</div>";
      }).join("");
    }

    // ─────────────────────────────────────────────────────────────
    // DEAL TRACKER (FUB + YTD Pending Sheet)
    // Real fields from sheet: agent, address, price, side, closeDate, stage
    // Derived (biz-day math from closeDate) until FUB is wired: contract,
    // inspection, attorney, appraisal, mortgageCommitment dates.
    // All user toggles (checklist, earnest money, manual date overrides)
    // persist to localStorage keyed by stable deal hash.
    // ─────────────────────────────────────────────────────────────
    var DT_STORE_KEY = "amd-deal-tracker-overrides-v1";
    var dtOverrides = (function () {
      try { return JSON.parse(localStorage.getItem(DT_STORE_KEY) || "{}"); }
      catch (e) { return {}; }
    })();
    function dtSaveOverrides() {
      try { localStorage.setItem(DT_STORE_KEY, JSON.stringify(dtOverrides)); } catch (e) {}
    }
    function dtDealId(d) {
      var raw = String((d.address || "") + "|" + (d.agent || "") + "|" + (d.price || 0)).toLowerCase();
      var h = 0;
      for (var i = 0; i < raw.length; i++) h = ((h << 5) - h + raw.charCodeAt(i)) | 0;
      return "d" + Math.abs(h).toString(36);
    }
    function dtAddBizDays(date, n) {
      if (!date) return null;
      var d = new Date(date.getTime());
      var added = 0;
      while (added < n) {
        d.setDate(d.getDate() + 1);
        var wd = d.getDay();
        if (wd !== 0 && wd !== 6) added++;
      }
      return d;
    }
    function dtSubBizDays(date, n) {
      if (!date) return null;
      var d = new Date(date.getTime());
      var removed = 0;
      while (removed < n) {
        d.setDate(d.getDate() - 1);
        var wd = d.getDay();
        if (wd !== 0 && wd !== 6) removed++;
      }
      return d;
    }
    function dtNormalizeSide(side, stage) {
      var s = String(side || "").toLowerCase();
      var st = String(stage || "").toLowerCase();
      if (s.indexOf("cash") >= 0 || st.indexOf("cash") >= 0) return "cash";
      if (s.indexOf("buy") >= 0) return "buy";
      if (s.indexOf("list") >= 0 || s.indexOf("sell") >= 0) return "sell";
      return s || "buy";
    }
    function dtFmtMoney(n) {
      if (n == null || !n) return "—";
      return "$" + Number(n).toLocaleString("en-US");
    }
    function dtFmtDate(d) {
      if (!d || isNaN(d.getTime())) return "—";
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }
    function dtDayDiff(a, b) {
      if (!a || !b || isNaN(a.getTime()) || isNaN(b.getTime())) return null;
      var ad = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      var bd = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return Math.round((ad - bd) / 86400000);
    }
    function dtRelText(d) {
      if (!d || isNaN(d.getTime())) return "";
      var delta = dtDayDiff(d, new Date());
      if (delta == null) return "";
      if (delta === 0) return "Today";
      if (delta === 1) return "Tomorrow";
      if (delta === -1) return "Yesterday";
      if (delta > 0) return "in " + delta + "d";
      return Math.abs(delta) + "d ago";
    }
    function dtDateStatus(d, done) {
      if (!d || isNaN(d.getTime())) return "empty";
      if (done) return "done";
      var delta = dtDayDiff(d, new Date());
      if (delta == null) return "empty";
      if (delta < 0) return "late";
      if (delta <= 2) return "soon";
      return "ontrack";
    }

    // Build tracker-shaped deal from raw pending sheet row
    function dtBuildDeal(raw) {
      var id = dtDealId(raw);
      var ov = dtOverrides[id] || {};
      var side = dtNormalizeSide(raw.side, raw.stage);
      var closeDate = (raw.closeDate && !isNaN(raw.closeDate.getTime())) ? raw.closeDate : null;

      // Derive contract + milestone dates from closeDate when no explicit values exist.
      // Typical deal timeline is ~45 biz days contract → close.
      var contractDate = ov.contractDate ? new Date(ov.contractDate) : (closeDate ? dtSubBizDays(closeDate, 45) : null);
      var inspectionDate = ov.inspectionDate ? new Date(ov.inspectionDate) : (contractDate ? dtAddBizDays(contractDate, 5) : null);
      var attorneyDate = ov.attorneyDate ? new Date(ov.attorneyDate) : (contractDate ? dtAddBizDays(contractDate, 5) : null);
      var appraisalDate = ov.appraisalDate ? new Date(ov.appraisalDate) : (contractDate ? dtAddBizDays(contractDate, 15) : null);
      var mortgageDate = ov.mortgageDate ? new Date(ov.mortgageDate) : (closeDate ? dtSubBizDays(closeDate, 7) : null);

      var checklist = Object.assign({
        inspectionScheduled: false, inspectionDone: false,
        appraisalDone: false, mortgageCommitment: false,
        finalWalkScheduled: false, finalWalkDone: false,
        closingStatement: false, reviewSent: false,
        commissionStatement: false, socialPost: false, followUp3wk: false
      }, ov.checklist || {});

      var earnest = {
        initial: Object.assign({ amount: null, sent: false, receipt: false, toClient: false, toLender: false }, (ov.earnest || {}).initial || {}),
        balance: Object.assign({ amount: null, sent: false, receipt: false, toClient: false, toLender: false }, (ov.earnest || {}).balance || {})
      };
      // Auto-estimate balance EM as 10% of price if not manually set
      if (earnest.balance.amount == null && raw.price) earnest.balance.amount = Math.round(raw.price * 0.1);
      if (earnest.initial.amount == null) earnest.initial.amount = 5000;

      return {
        id: id,
        raw: raw,
        address: raw.address || "—",
        agent: raw.agent || "—",
        price: raw.price || 0,
        side: side,
        stage: raw.stage || "",
        client: ov.client || "", // awaiting FUB
        lender: ov.lender || "", // awaiting FUB
        dates: {
          contract: contractDate,
          inspection: inspectionDate,
          attorney: attorneyDate,
          appraisal: appraisalDate,
          mortgageCommitment: mortgageDate,
          closing: closeDate
        },
        extended: ov.extended || {},
        checklist: checklist,
        earnest: earnest
      };
    }
    function dtSetOverride(id, path, value) {
      dtOverrides[id] = dtOverrides[id] || {};
      var cur = dtOverrides[id];
      for (var i = 0; i < path.length - 1; i++) {
        cur[path[i]] = cur[path[i]] || {};
        cur = cur[path[i]];
      }
      cur[path[path.length - 1]] = value;
      dtSaveOverrides();
    }
    function dtChecklistProgress(deal) {
      var keys = Object.keys(deal.checklist).filter(function (k) {
        if (k === "commissionStatement") return deal.side === "sell";
        if (k === "appraisalDone" || k === "mortgageCommitment") return deal.side !== "cash";
        return true;
      });
      var done = keys.filter(function (k) { return deal.checklist[k]; }).length;
      return { done: done, total: keys.length, pct: keys.length ? Math.round((done / keys.length) * 100) : 0 };
    }
    function dtDealStatus(deal) {
      var closingDelta = dtDayDiff(deal.dates.closing, new Date());
      var prog = dtChecklistProgress(deal);
      if (closingDelta != null && closingDelta < 0 && prog.pct < 100) return "late";
      if (closingDelta != null && closingDelta <= 7 && closingDelta >= 0 && prog.pct < 80) return "risk";
      if (closingDelta != null && closingDelta <= 7 && closingDelta >= 0) return "closing";
      return "ontrack";
    }

    var DT_CHECKLIST_ITEMS = [
      { key: "inspectionScheduled", label: "Inspection scheduled", meta: "Day 1–3 after contract" },
      { key: "inspectionDone",      label: "Inspection completed", meta: "By day 5" },
      { key: "appraisalDone",       label: "Appraisal done",       meta: "Lender-ordered",  hideIfCash: true },
      { key: "mortgageCommitment",  label: "Mortgage commitment",  meta: "~7 biz days pre-close", hideIfCash: true },
      { key: "finalWalkScheduled",  label: "Final walk scheduled", meta: "Day before close" },
      { key: "finalWalkDone",       label: "Final walk completed", meta: "" },
      { key: "closingStatement",    label: "Closing statement on file", meta: "Required" },
      { key: "reviewSent",          label: "Review sent to client", meta: "Post-close" },
      { key: "commissionStatement", label: "Commission statement sent", meta: "2 days prior (sell)", sellOnly: true },
      { key: "socialPost",          label: "Social media post ready", meta: "" },
      { key: "followUp3wk",         label: "3-week follow-up set",  meta: "Post-close check-in" }
    ];

    function renderTrackerEMRow(deal, which, label, dueDate) {
      var em = deal.earnest[which] || {};
      var dueStatus = dtDateStatus(dueDate, em.sent && em.receipt);
      var badges = [
        { key: "sent",     label: "Sent" },
        { key: "receipt",  label: "Receipt" },
        { key: "toClient", label: "To Client" },
        { key: "toLender", label: "To Lender", hideIfSell: true }
      ];
      var badgesHTML = badges.map(function (b) {
        if (b.hideIfSell && deal.side === "sell") return "";
        var on = !!em[b.key];
        return '<span class="amd-dt-em-badge ' + (on ? "is-on" : "") +
          '" data-amd-dt-em data-deal="' + deal.id + '" data-which="' + which + '" data-key="' + b.key + '">' +
          '<span class="amd-dt-em-badge-check"></span>' + b.label + '</span>';
      }).join("");
      return '<div class="amd-dt-em-row">' +
        '<div class="amd-dt-em-left">' +

        function upcomingWeekendRange_() {

      var volume = Number(circle.getAttribute('data-tip-volume')) || 0;

          '<div class="tip-row"><span class="tip-label">Deals</span><span class="tip-value">' + deals + '</span></div>';
      }

      tip.innerHTML =
        '<div class="tip-title" style="color:#111">' + esc(title) + '</div>' + rows;

      var rootRect = root.getBoundingClientRect();
      var cx = evt.clientX - rootRect.left;
      var cy = evt.clientY - rootRect.top;
      var tipW = tip.offsetWidth || 180;
      var tipH = tip.offsetHeight || 60;
      var left = cx - tipW / 2;

      if (left < 4) left = 4;

      if (top < 4) top = cy + 18;
      tip.style.left = left + 'px';
      tip.style.top = top + 'px';
      tip.classList.add('is-visible');

    function fetchJSON(url) {

    function readDashboardCache(url, maxAgeMs) {
      try {
        var raw = localStorage.getItem(dashboardCacheKey(url));
        if (!raw) return null;
        var entry = JSON.parse(raw);
        if (!entry || !entry.savedAt) return null;
        if (maxAgeMs && Date.now() - Number(entry.savedAt) > maxAgeMs) return null;
        return entry.value == null ? null : entry.value;
      } catch (e) {
        return null;
      }
    }
    function writeDashboardCache(url, value) {

      options = options || {};
      if (!options.force) {
        var cached = readDashboardCache(url, maxAgeMs);
        if (cached) return Promise.resolve(cached);
      }
      return fetchJSON(url).then(function (payload) {
        writeDashboardCache(url, payload);
        return payload;
      });
    }

    function buildOptionList(options, current, formatLabel) {
      var seen = {};
      var out = [];
      var trimmed = String(current || "").trim();
      function push(displayLabel, value) {
        var key = String(value || "").toLowerCase().trim();
        if (!key || seen[key]) return;
        seen[key] = true;
        var sel = trimmed && trimmed.toLowerCase() === key ? " selected" : "";
        out.push('<option value="' + esc(value) + '"' + sel + ">" + esc(displayLabel) + "</option>");
      }
      if (trimmed) {
        var disp = formatLabel ? formatLabel(trimmed) : trimmed;
        push(disp, trimmed);

      for (var i = 0; i < options.length; i++) {
        push(options[i], options[i]);

    // Directory is the agent source of truth (`mred_number` + `name`).
    var directoryAgentByMredCache = { rows: null, map: {} };

    function getListingMlsAgentName(row) {
      if (!row) return "";
      var idxObj = row.idx && typeof row.idx === "object" ? row.idx : null;
      var coId = getListingCoListAgentId(row);
      var byMred = buildDirectoryAgentByMredNumberMap();
      if (coId && byMred[coId]) return byMred[coId];
      var coName = String(row.mlsCoListAgentName || row.coListAgentName || "").trim();
      if (coName) return coName;

        ""

    function buildDirectoryAgentByMredNumberMap() {
      var rows = state.directoryRows || [];
      if (directoryAgentByMredCache.rows === rows) return directoryAgentByMredCache.map;
      var map = {};
      rows.forEach(function (row) {
        if (!row) return;
        var mredNum = normalizeMredLookupKey(
          row.mred_number != null ? row.mred_number :
          (row.mredNumber != null ? row.mredNumber :
          (row.mred_agent_id != null ? row.mred_agent_id :
          (row.idx_agent_id != null ? row.idx_agent_id : "")))
        );
        if (!mredNum) return;
        var name = String(row.name || row.display_name || row.full_name || "").trim();
        if (!name) return;
        map[mredNum] = name;
      });
      directoryAgentByMredCache = { rows: rows, map: map };
      return map;
    }
    function buildDirectoryAgentByNameMap() {
      var rows = state.directoryRows || [];
      if (directoryAgentByNameCache.rows === rows) return directoryAgentByNameCache.map;
      var map = {};
      rows.forEach(function (row) {
        if (!row) return;
        var name = String(row.name || row.display_name || row.full_name || "").trim();
        if (!name) return;
        var key = normalizeAgentKey(name);
        if (key) map[key] = name;
      });
      directoryAgentByNameCache = { rows: rows, map: map };
      return map;
    }
    function resolveAgentFromMlsName(mlsName) {
      var raw = String(mlsName || "").trim();
      if (!raw) return "";
      var key = normalizeAgentKey(raw);
      var byName = buildDirectoryAgentByNameMap();
      if (key && byName[key]) return byName[key];
      var best = "";
      var bestScore = 0;
      var k, score;
      for (k in byName) {
        if (!byName.hasOwnProperty(k)) continue;
        score = 0;
        if (key === k) score = 1;
        else if (key && (key.indexOf(k) >= 0 || k.indexOf(key) >= 0)) score = 0.85;
        if (score > bestScore) {
          bestScore = score;
          best = byName[k];
        }
      }
      return bestScore >= 0.85 ? best : raw;
    }
    function listingListDateMs(row) {

      var ms = d && !isNaN(d.getTime()) ? d.getTime() : 0;
      if (ms) return ms;
      var n = Number(String(raw).replace(/[^0-9]/g, ""));
      return isFinite(n) && n > 19000101 ? n : 0;

      if (typeof raw === "number" && isFinite(raw)) return raw;

    function listingCardFactsText(row) {

        case "requested":     return dateStr ? "Requested · " + dateStr : "Requested";
        case "editing":       return "Editing";
        case "building":      return "Building";
        case "delivered":     return "Delivered";
        default:              return "Not Booked";
      }
    }

    // Stage-2 "Marketing Status" section: horizontal roadmap of milestones
    // with checkpoints + dates + delivery ETAs. Driven by the Listing Hub
    // sheet (photos_status / photos_datetime / matterport_status / etc.).
    function renderMarketingStatusSection(active, address /*, agentBookUrl, agentRequestUrl */) {
      var bookingDate = parseListingBookingDate(active);
      var bookingLabel = bookingDate ? formatBookingDate(bookingDate) : "";
      var sq = getSellerQuestionnaire(active);
      var qReceived = sellerQuestionnaireReceived(active, sq);
      var qSent = !!String(active && (active.sellerQuestionnaireSent || active.sellerQuestionnaireSentAt) || "").trim() ||
                  qReceived ||
                  !!(state.sellQCopied && state.sellQCopied[address]);

      function buildCaptureNode(key, label, icon) {
        var serviceState = getCaptureServiceState(active, key);
        var rawServiceStatus = getMarketingServiceRawStatus(active, key);
        var statusLabel;
        var metaLabel = "";
        if (serviceState === "delivered") {
          statusLabel = rawServiceStatus || "Delivered";
        } else if (serviceState === "editing") {
          statusLabel = rawServiceStatus || "Editing";
          var eta = computeServiceEta(key, bookingDate);
          if (eta) metaLabel = "Ready " + formatBookingDate(eta);
        } else if (serviceState === "building") {
          statusLabel = rawServiceStatus || "Building";
        } else if (serviceState === "requested") {
          statusLabel = rawServiceStatus || "Requested";
        } else if (serviceState === "booked") {
          statusLabel = rawServiceStatus || (bookingLabel ? "Booked · " + bookingLabel : "Booked");
          var etaB = computeServiceEta(key, bookingDate);
          if (etaB) metaLabel = "Delivers " + formatBookingDate(etaB);
        } else {
          statusLabel = rawServiceStatus || (key === "fact_sheet" || key === "open_house_materials" ? "Not Requested" : "Not Booked");
        }
        return { key: key, label: label, icon: icon, tone: SERVICE_STATE_TONE[serviceState], statusLabel: statusLabel, metaLabel: metaLabel };
      }

      var nodes = [
        {
          key: "questionnaire",
          label: "Seller Questionnaire",
          icon: "doc",
          tone: qSent ? "done" : "pending",
          statusLabel: qReceived ? "Received" : (qSent ? "Sent" : "Pending"),
          metaLabel: qReceived ? "Details in Marketing" : (qSent ? "" : "Awaiting seller")
        },
        buildCaptureNode("photos",     "Photos",     "camera"),
        buildCaptureNode("matterport", "Matterport", "cube"),
        buildCaptureNode("floor_plan", "Floor Plan", "plan"),
        buildCaptureNode("video",      "Video",      "video"),
        buildCaptureNode("fact_sheet", "Fact Sheet", "doc"),
        buildCaptureNode("open_house_materials", "Open House Materials", "doc")
      ];

      // Progress accumulator → drives the green→blue gradient rail width.
      var doneCount = 0;
      for (var di = 0; di < nodes.length; di++) {
        if (nodes[di].tone === "done") doneCount++;
        else if (nodes[di].tone === "waiting") doneCount += 0.66;
        else if (nodes[di].tone === "progress") doneCount += 0.5;
      }
      // --amd-roadmap-progress is a unitless 0–1 multiplier of the rail width
      // (the CSS handles dot-center offsets via --amd-roadmap-cols).
      var pct = nodes.length ? (doneCount / (nodes.length - 1)) : 0;
      if (pct < 0) pct = 0;
      if (pct > 1) pct = 1;

      function checkSvg() {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="5 12.5 10 17.5 19 7.5"></polyline></svg>';
      }
      var nodeHtml = nodes.map(function (n) {
        var inner = n.tone === "done"
          ? checkSvg()
          : (BENTO_ICONS[n.icon] || BENTO_ICONS.doc);
        return (
          '<div class="amd-lh-roadmap-node is-' + esc(n.tone) + '">' +
            '<div class="amd-lh-roadmap-dot">' + inner + "</div>" +
            '<div class="amd-lh-roadmap-label">' + esc(n.label) + "</div>" +
            '<div class="amd-lh-roadmap-status">' + esc(n.statusLabel) + "</div>" +
            (n.metaLabel ? '<div class="amd-lh-roadmap-meta">' + esc(n.metaLabel) + "</div>" : "") +
          "</div>"
        );
      }).join("");
      return (
        '<article class="amd-lh-card is-marketing is-marketing-status" data-sell-marketing-status="' + esc(address || "") + '">' +
          '<div class="amd-lh-label">Marketing Status</div>' +
          '<div class="amd-lh-roadmap">' +
            '<div class="amd-lh-roadmap-track" style="--amd-roadmap-cols:' + nodes.length + ';--amd-roadmap-progress:' + pct.toFixed(3) + '">' +
              nodeHtml +
            "</div>" +
          "</div>" +
        "</article>"
      );
    }

    // Render the seller-questionnaire modal overlay inside the dashboard root.
    // CSS is namespaced under #asg-admin-master-dashboard, so mounting it here

    function openSellerQuestionnaireModal(address) {

    function closeSellerQuestionnaireModal() {

    // Resolve a single milestone's status using {URL present → Done,
    // explicit status field, sane fallback}. Returns { label, tone } where
    // tone drives the pill color (done/progress/waiting/pending).
    function resolveMilestoneStatus(rawStatus, hasUrl, fallbackTone) {
      if (hasUrl) return { label: "Done", tone: "done" };
      var raw = String(rawStatus || "").trim();
      if (!raw) return { label: "Not Started", tone: fallbackTone || "pending" };
      var key = raw.toLowerCase();
      if (
        key === "not started" ||
        key === "not scheduled" ||
        key === "n/a" ||
        key === "none" ||
        key === "tbd" ||
        key === "—" ||
        key === "-"
      ) {
        return { label: "Not Started", tone: fallbackTone || "pending" };
      }
      if (
        key.indexOf("done") >= 0 ||
        key.indexOf("complete") >= 0 ||
        key.indexOf("delivered") >= 0 ||
        key.indexOf("received") >= 0 ||
        key.indexOf("ready") >= 0 ||
        key.indexOf("live") >= 0
      ) {
        return { label: titleCase(raw), tone: "done" };
      }
      if (key.indexOf("progress") >= 0 || key.indexOf("scheduled") >= 0 || key.indexOf("booked") >= 0) {
        return { label: titleCase(raw), tone: "progress" };
      }
      if (key.indexOf("request") >= 0 || key.indexOf("pending") >= 0 || key.indexOf("waiting") >= 0) {
        return { label: titleCase(raw), tone: "waiting" };
      }
      return { label: titleCase(raw), tone: fallbackTone || "pending" };
    }
    function titleCase(s) {
      return String(s || "")
        .replace(/[_\-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }
    // Read the seller-questionnaire blob from the listing row. The Apps Script
    // sweep stuffs the Asana task description into seller_questionnaire_content;
    // we also support a structured seller_questionnaire_answers JSON column if
    // an integration provides one.
    function getSellerQuestionnaire(row) {
      if (!row) return { name: "", email: "", phone: "", answers: [], raw: "" };
      var raw = String(
        row.seller_questionnaire_answers ||
        row.sellerQuestionnaireAnswers ||
        row.sellerQuestionnaireContent ||
        row.seller_questionnaire_content ||
        row.seller_questionnaire ||
        row.questionnaire_content ||
        row.questionnaire_answers ||
        ""
      ).trim();
      var answers = [];
      var name = String(row.sellerName || row.seller_name || "").trim();
      var email = String(row.sellerEmail || row.seller_email || "").trim();
      var phone = String(row.sellerPhone || row.seller_phone || "").trim();
      var fieldsRaw = String(row.sellerQuestionnaireFieldsJson || row.seller_questionnaire_fields_json || "").trim();
      if (fieldsRaw) {
        try {
          var parsedFields = JSON.parse(fieldsRaw);
          if (parsedFields && typeof parsedFields === "object") {
            Object.keys(parsedFields).forEach(function (key) {
              var value = parsedFields[key];
              if (value == null || String(value).trim() === "") return;
              answers.push({ question: titleCase(key), answer: String(value) });
            });
          }
        } catch (e) {}
      }
      // Try JSON first (preferred): [{question, answer}, ...] or {q:a}.
      if (!answers.length && raw && (raw.charAt(0) === "[" || raw.charAt(0) === "{")) {
        try {
          var parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            for (var i = 0; i < parsed.length; i++) {
              var it = parsed[i] || {};
              var q = String(it.question || it.q || it.label || "").trim();
              var a = String(it.answer || it.a || it.value || "").trim();
              if (q || a) answers.push({ question: q || "Answer", answer: a });
            }
          } else if (typeof parsed === "object") {
            for (var k in parsed) {
              if (!parsed.hasOwnProperty(k)) continue;
              answers.push({ question: k, answer: String(parsed[k] == null ? "" : parsed[k]) });
            }
          }
        } catch (e) {
          // fall through to heuristic parser
        }
      }
      // Heuristic: parse "Question: Answer" style lines (Asana task description).
      if (!answers.length && raw) {
        var lines = raw.split(/\r?\n/);
        var current = null;
        for (var li = 0; li < lines.length; li++) {
          var line = lines[li].replace(/\s+$/, "");
          if (!line.trim()) {
            if (current) answers.push(current);
            current = null;
            continue;
          }
          var m = line.match(/^([^:]{1,80}):\s*(.*)$/);
          if (m) {
            if (current) answers.push(current);
            current = { question: m[1].trim(), answer: m[2].trim() };
          } else if (current) {
            current.answer += (current.answer ? "\n" : "") + line.trim();
          }
        }
        if (current) answers.push(current);
      }
      // Derive seller contact from common question labels if not provided as columns.
      function findAnswer(rgx) {
        for (var i = 0; i < answers.length; i++) {
          if (rgx.test(answers[i].question)) return answers[i].answer;
        }
        return "";
      }
      if (!name) name = findAnswer(/seller.*name|owner.*name|^name$|full.?name/i);
      if (!name) {
        var first = String(row.sellerFirstName || row.seller_first_name || findAnswer(/seller.*first|first.?name/i) || "").trim();
        var last = String(row.sellerLastName || row.seller_last_name || findAnswer(/seller.*last|last.?name/i) || "").trim();
        name = [first, last].filter(Boolean).join(" ");
      }
      if (!email) email = findAnswer(/email/i);
      if (!phone) phone = findAnswer(/phone|mobile|cell/i);
      return { name: name, email: email, phone: phone, answers: answers, raw: raw };
    }
    function sellerQuestionnaireReceived(row, sq) {
      if (!row) return false;
      sq = sq || getSellerQuestionnaire(row);
      if (sq && (sq.raw || sq.name || sq.email || sq.phone || (sq.answers && sq.answers.length))) return true;
      var status = String(
        row.sellerQuestionnaireStatus ||
        row.seller_questionnaire_status ||
        ""
      ).toLowerCase();
      if (status.indexOf("received") >= 0 || status.indexOf("complete") >= 0 || status.indexOf("submitted") >= 0) return true;
      return !!String(
        row.sellerQuestionnaireReceivedAt ||
        row.seller_questionnaire_received_at ||
        row.sellerQuestionnaireLastSyncAt ||
        row.seller_questionnaire_last_sync_at ||
        ""
      ).trim();
    }
    function listingPhotosScheduled(row) {
      var v = normalizeText((row && row.photosStatus) || "").trim();
      if (!v) return false;
      // "Not scheduled" / "not yet" / "tbd" all mean we should still prompt to schedule.
      if (v.indexOf("not ") === 0 && v.indexOf("schedul") > -1) return false;
      if (v === "not scheduled" || v === "tbd" || v === "n/a" || v === "none" || v === "—") return false;
      // Any other set status (Scheduled, In Progress, Done, Complete, Delivered,
      // Received, Ready, Live, etc.) means photos work is initiated.
      return true;
    }
    function listingPhotoScheduleLink(row) {
      if (!row) return "#";
      var direct =
        row.photoScheduleUrl ||
        row.photosScheduleUrl ||
        row.acuityUrl ||
        row.schedulingUrl ||
        "";
      var cleaned = String(direct || "").trim();
      if (cleaned) return cleaned;
      return listingDetailPageUrl(row.address || "");
    }
    function makeAgentOptions(rows, selected, includeAllLabel) {
      var counts = {};
      (rows || []).forEach(function (row) {
        var name = listingAssignedAgent(row);
        if (!name) return;
        counts[name] = (counts[name] || 0) + 1;
      });
      var names = Object.keys(counts).sort(function (a, b) { return a.localeCompare(b); });
      var html = '<option value="all"' + (selected === "all" ? " selected" : "") + ">" + esc(includeAllLabel || "All Agents") + "</option>";
      for (var i = 0; i < names.length; i++) {
        var nm = names[i];
        html += '<option value="' + esc(nm) + '"' + (selected === nm ? " selected" : "") + ">" + esc(nm) + " · " + counts[nm] + "</option>";
      }
      return html;
    }
    function dealSideKey(v) {
      var s = normalizeText(v);
      if (s.indexOf("buy") > -1) return "buy";
      if (s.indexOf("sell") > -1 || s.indexOf("listing") > -1) return "sell";
      return "other";
    }
    function matchesQuery(textParts, query) {
      var q = normalizeText(query);
      if (!q) return true;
      var hay = textParts.join(" ").toLowerCase();
      return hay.indexOf(q) > -1;
    }
    function toDriveDirectImageUrl(url) {
      var raw = String(url || "").trim();
      if (!raw) return "";
      var id = driveFileIdFromUrl(raw);
      if (id) return "https://lh3.googleusercontent.com/d/" + id + "=w1600";
      return raw;
    }
    function driveFileIdFromUrl(raw) {
      var s = String(raw || "").trim();
      if (!s) return "";
      var m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m && m[1]) return m[1];
      var q = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (q && q[1]) return q[1];
      var uc = s.match(/\/uc\?[^#]*[?&]id=([a-zA-Z0-9_-]+)/);
      if (uc && uc[1]) return uc[1];
      return "";
    }
    function driveImageBackupUrl(raw) {
      var id = driveFileIdFromUrl(raw);
      if (!id) return "";
      return "https://drive.google.com/uc?export=view&id=" + id;
    }
    function getSellPhotosForAddress(address) {
      var key = String(address || "").trim();
      var cached = state.sellPhotosByAddress && state.sellPhotosByAddress[key];
      return Array.isArray(cached) ? cached : [];
    }

    /** Updates only the Photos carousel strip so the Matterport iframe is not torn down. */
    function updateSellPhotoCarouselDOM(address) {
      if (!root) return;

      if (!addr) return;

      if (!carousel) return;
      var photos = getSellPhotosForAddress(addr);

      if (n) {
        idx = ((idx % n) + n) % n;
        state.sellPhotoIndexByAddress[addr] = idx;
      }
      var item = n ? photos[idx] : null;
      var imgWrap = carousel.querySelector(".amd-sell-carousel-img-wrap");
      var countEl = carousel.querySelector(".amd-sell-carousel-count");
      var prevBtn = carousel.querySelector("[data-sell-photo-prev]");
      var nextBtn = carousel.querySelector("[data-sell-photo-next]");
      if (countEl) countEl.textContent = n ? String(idx + 1) + " / " + String(n) : "0 / 0";
      if (prevBtn) prevBtn.disabled = !n;
      if (nextBtn) nextBtn.disabled = !n;
      if (!imgWrap) return;
      var loading = state.sellPhotoLoadingAddress === addr && !n;
      if (item && item.url) {
        imgWrap.innerHTML =
          '<img class="amd-sell-carousel-img" src="' +
          esc(item.url) +
          '" data-backup="' +
          esc(item.backupUrl || "") +
          '" alt="' +
          esc(item.name || addr || "Listing photo") +
          '" loading="lazy" onerror="if(this.dataset.backup && this.src!==this.dataset.backup){this.src=this.dataset.backup;return;} this.onerror=null;">';
      } else if (loading) {
        imgWrap.innerHTML = '<div class="amd-sell-cover-empty" style="height:230px">Loading photos...</div>';
      } else {
        imgWrap.innerHTML = '<div class="amd-sell-cover-empty" style="height:230px">No photos found</div>';
      }
    }
    function normalizePhotoItems(items) {
      var arr = Array.isArray(items) ? items : [];
      var out = [];
      for (var i = 0; i < arr.length; i++) {
        var it = arr[i] || {};
        var u = toDriveDirectImageUrl(String(it.viewUrl || it.url || it.src || "").trim());
        if (!u) continue;
        out.push({ url: u, backupUrl: driveImageBackupUrl(it.viewUrl || it.url || it.src || ""), name: String(it.name || "Photo " + (i + 1)).trim() });
      }
      return out;
    }
    function matterportEmbedUrl(rawUrl) {
      var raw = String(rawUrl || "").trim();
      if (!raw) return "";
      if (raw.indexOf("my.matterport.com/show/?m=") >= 0 || raw.indexOf("matterport.com/discover/space/") >= 0) {
        return raw.replace(/^http:/, "https:");
      }
      var m = raw.match(/m=([a-zA-Z0-9_-]+)/);
      if (m && m[1]) return "https://my.matterport.com/show/?m=" + m[1];
      var s = raw.match(/spaces\/([a-zA-Z0-9_-]+)/);
      if (s && s[1]) return "https://my.matterport.com/show/?m=" + s[1];
      return "";
    }
    function fetchSellPhotosForAddress(address) {
      var key = String(address || "").trim();
      if (!key) return;
      if (state.sellPhotoLoadingAddress === key) return;
      if (getSellPhotosForAddress(key).length) return;
      state.sellPhotoLoadingAddress = key;
      fetchJSON(appendApiQuery(LISTINGS_API, "view=listingphotos&address=" + encodeURIComponent(key)))
        .then(function (payload) {
          var photos = normalizePhotoItems(payload && payload.photos);
          state.sellPhotosByAddress[key] = photos;
          if (state.sellPhotoIndexByAddress[key] == null) state.sellPhotoIndexByAddress[key] = 0;
          state.sellPhotoLoadingAddress = "";
          if (state.sellActiveAddress === key) {
            updateSellPhotoCarouselDOM(key);
          } else {
            render();
          }
        })
        .catch(function () {
          state.sellPhotosByAddress[key] = [];
          state.sellPhotoLoadingAddress = "";
          if (state.sellActiveAddress === key) {
            updateSellPhotoCarouselDOM(key);
          } else {
            render();
          }
        });
    }

    function extractListingsRows(payload) {
      if (!payload || typeof payload !== "object") return [];
      if (Array.isArray(payload.listings)) return payload.listings.slice();
      if (payload.data && Array.isArray(payload.data.listings)) return payload.data.listings.slice();
      if (Array.isArray(payload.rows)) return payload.rows.slice();
      if (payload.data && Array.isArray(payload.data.rows)) return payload.data.rows.slice();
      return [];
    }
    function appendApiQuery(url, query) {
      return String(url || "") + (String(url || "").indexOf("?") >= 0 ? "&" : "?") + query;
    }
    function uniqueListingRows(rows) {
      var seen = {};
      var out = [];
      for (var i = 0; i < (rows || []).length; i++) {
        var row = rows[i] || {};
        var key = normalizeText(row.address || "") + "|" + normalizeText(listingAssignedAgent(row) || "");
        if (!key || key === "|") continue;
        if (seen[key]) continue;
        seen[key] = true;
        out.push(row);
      }
      return out;
    }
    function fetchListingsMaster(options) {
      options = options || {};
      if (state.listingsFetching) {
        render();
        return;
      }
      state.listingsFetching = true;
      state.listingsError = null;
      if (!options.silentStart) render();
      fetchJSONCached(appendApiQuery(LISTINGS_API, "view=active"), CACHE_TTL_LISTINGS_MS, { force: !!options.force })
        .then(function (payload) {
          var rows = extractListingsRows(payload);
          return { rows: rows, source: "active" };
        })
        .then(function (result) {
          var rows = (result && result.rows) || [];
          state.listingsRows = rows;
          state.listingsLoaded = true;
          state.listingsFetching = false;
          if (!rows.length) {
            state.listingsError =
              "Listings API returned 0 active rows. Check IdxListings sync and featured listings (" +
              appendApiQuery(LISTINGS_API, "view=diag") +
              ").";
          } else {
            state.listingsError = null;
          }
          render();
        })
        .catch(function (e) {
          state.listingsError = e && e.message ? e.message : String(e);
          state.listingsFetching = false;
          render();
        });
    }

    function withTimeout(promise, ms, label) {
      var timeoutMs = Number(ms) > 0 ? Number(ms) : REQUEST_TIMEOUT_MS;
      var tag = label || "Request";
      return new Promise(function (resolve, reject) {
        var settled = false;
        var timer = setTimeout(function () {
          if (settled) return;
          settled = true;
          reject(new Error(tag + " timed out after " + timeoutMs + "ms"));
        }, timeoutMs);
        promise.then(
          function (value) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            resolve(value);
          },
          function (err) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            reject(err);
          }
        );
      });
    }

    function load(options) {
      options = options || {};
      if (!state.listingsLoaded && !state.listingsFetching) {
        fetchListingsMaster({ force: !!options.force, silentStart: true });
      }

      var needsAllTimeCore = state.tab === "closed" || state.tab === "summary" || state.tab === "leaderboard";
      var allTimeSummaryUrl = STATS_API + "?period=allTime";
      var allTimeRowsPromise = Promise.resolve([]);
      if (needsAllTimeCore) {
        allTimeRowsPromise = withTimeout(
          fetchAllTimeClosedRowsFromScript(),
          ALL_TIME_ROWS_TIMEOUT_MS,
          "All-time closed rows feed"
        ).catch(function () {
          return [];
        });
      }

      Promise.allSettled([
        withTimeout(fetchJSONCached(STATS_API + "?view=pipeline", CACHE_TTL_CORE_MS, { force: !!options.force }), REQUEST_TIMEOUT_MS, "Pipeline feed"),
        withTimeout(fetchJSONCached(STATS_API + "?period=ytd2026", CACHE_TTL_CORE_MS, { force: !!options.force }), REQUEST_TIMEOUT_MS, "YTD summary feed"),
        needsAllTimeCore
          ? withTimeout(fetchJSONCached(allTimeSummaryUrl, CACHE_TTL_ALL_TIME_MS, { force: !!options.force }), REQUEST_TIMEOUT_MS, "All-time summary feed")
          : Promise.resolve(readDashboardCache(allTimeSummaryUrl, CACHE_TTL_ALL_TIME_MS)),
        withTimeout(fetchJSONCached(HUB_DATA_API + "?view=directory", CACHE_TTL_CORE_MS, { force: !!options.force }), REQUEST_TIMEOUT_MS, "Directory feed")
      ])
        .then(function (results) {
          var pipelineJSON = results[0].status === "fulfilled" ? results[0].value : null;
          var ytdJSON = results[1].status === "fulfilled" ? results[1].value : null;
          var allTimeJSON = results[2].status === "fulfilled" ? results[2].value : null;
          var directoryJSON = results[3].status === "fulfilled" ? results[3].value : null;

          if (
            pipelineJSON &&
            pipelineJSON.success &&
            Array.isArray(pipelineJSON.ytdPending) &&
            Array.isArray(pipelineJSON.ytdClosed)
          ) {
            state.pipelineFeedError = null;
            state.ytdPendingDeals = pipelineJSON.ytdPending.map(function (r) {
              return mapPipelineRow(r, "Pending");
            });
            state.ytdClosedDeals = pipelineJSON.ytdClosed.map(function (r) {
              return mapPipelineRow(r, "Closed");
            });
            state.deals = state.ytdPendingDeals.concat(state.ytdClosedDeals).filter(function (d) {
              return d.agent && d.agent !== "—" && d.address && d.address !== "—";
            });
          } else {
            // Do not hard-fail the whole dashboard: pipeline timeouts, script
            // errors, or response-shape drift would otherwise blank the UI.
            state.ytdPendingDeals = [];
            state.ytdClosedDeals = [];
            state.deals = [];
            state.pipelineFeedError =
              "Pipeline feed unavailable (YTD Pending / YTD Closed). Listings and other tabs still work; refresh when the feed recovers.";
          }

          state.statsAgentsYtd = ytdJSON && Array.isArray(ytdJSON.agents) ? ytdJSON.agents : [];
          state.statsAgentsAllTime = allTimeJSON && Array.isArray(allTimeJSON.agents) ? allTimeJSON.agents : [];
          state.allTimeClosedDeals = extractAllTimeClosedDeals(allTimeJSON);
          state.directoryRows = extractDirectoryRows(directoryJSON);
          invalidateDirectoryAgentCaches();
          state.ytdSummary = ytdJSON && ytdJSON.summary ? ytdJSON.summary : null;
          state.allTimeSummary = allTimeJSON && allTimeJSON.summary ? allTimeJSON.summary : null;
          state.coreFeedsPending = false;
          state.loadedAt = new Date();
          try { render(); } catch (e) { console.error("render:", e); setError(e); }

          if (!needsAllTimeCore && !allTimeJSON) {
            fetchJSONCached(allTimeSummaryUrl, CACHE_TTL_ALL_TIME_MS, { force: !!options.force })
              .then(function (payload) {
                state.statsAgentsAllTime = payload && Array.isArray(payload.agents) ? payload.agents : state.statsAgentsAllTime;
                state.allTimeClosedDeals = extractAllTimeClosedDeals(payload);
                state.allTimeSummary = payload && payload.summary ? payload.summary : state.allTimeSummary;
              })
              .catch(function () {});
          }

          allTimeRowsPromise.then(function (allTimeRowsFromScript) {
            if (!Array.isArray(allTimeRowsFromScript) || !allTimeRowsFromScript.length) return;
            state.allTimeClosedDeals = allTimeRowsFromScript;
            state.loadedAt = new Date();
            try { render(); } catch (e) { console.error("render:", e); setError(e); }
          });
        })
        .catch(function (err) {
          state.coreFeedsPending = false;
          setError(err);
        });
    }

    render();
    load();
  })();
</script>
