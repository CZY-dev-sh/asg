      var closedSplitPct = 0;
      var pendingSplitPct = 0;
      if (sumCP > 0) {
        closedSplitPct = (cv / sumCP) * 100;
        pendingSplitPct = 100 - closedSplitPct;
      }
      var closedPctRounded = sumCP > 0 ? Math.round(closedSplitPct) : 0;
      var pendingPctRounded = sumCP > 0 ? 100 - closedPctRounded : 0;
      var fullClosed = sumCP > 0 && pendingSplitPct < 0.001;
      var fullPending = sumCP > 0 && closedSplitPct < 0.001;
      var miniBarInner;
      if (sumCP <= 0) {

          '<div class="mini-bar-seg mini-bar-seg--neutral" style="width:100%"><span class="mini-bar-seg__label mini-bar-seg__label--neutral">—</span></div>';

          esc(String(closedPctRounded) + "%") +

    function initDealsTables() {
      var wraps = root.querySelectorAll('.amd-table-wrap[data-deals-table="1"]');
      for (var wi = 0; wi < wraps.length; wi++) {
        (function (wrap) {
          var table = wrap.querySelector("table");
          var tbody = table ? table.querySelector("tbody") : null;
          if (!table || !tbody) return;
          var search = (wrap.previousElementSibling && wrap.previousElementSibling.matches(".amd-table-tools"))
            ? wrap.previousElementSibling.querySelector("[data-deals-search]")
            : null;
          var buttons = table.querySelectorAll(".amd-sort-btn");
          var state = { q: "", key: "", type: "text", dir: "asc" };

          function parseValue(val, type) {
            if (type === "number") return Number(val) || 0;
            return String(val || "").toLowerCase();
          }

          function updateSortUI() {
            for (var bi = 0; bi < buttons.length; bi++) {
              var b = buttons[bi];
              var arrow = b.querySelector(".amd-sort-arrow");
              var active = b.getAttribute("data-sort-key") === state.key;
              b.classList.toggle("is-active", active);
              if (arrow) arrow.textContent = active ? (state.dir === "desc" ? "↓" : "↑") : "↑";
            }
          }

          function applyTableState() {
            var rows = Array.prototype.slice.call(tbody.querySelectorAll("tr"));
            var dataRows = rows.filter(function (r) {
              var td = r.querySelector("td");
              return !(td && td.hasAttribute("colspan"));
            });

            var q = String(state.q || "").trim().toLowerCase();
            dataRows.forEach(function (row) {
              var txt = row.textContent.toLowerCase();
              row.style.display = (!q || txt.indexOf(q) > -1) ? "" : "none";
            });

            var visible = dataRows.filter(function (r) { return r.style.display !== "none"; });
            if (state.key && visible.length > 1) {
              visible.sort(function (a, b) {
                var ca = a.querySelector("td[data-sort-key='" + state.key + "']");
                var cb = b.querySelector("td[data-sort-key='" + state.key + "']");
                var va = parseValue(ca ? ca.getAttribute("data-sort-value") : "", state.type);
                var vb = parseValue(cb ? cb.getAttribute("data-sort-value") : "", state.type);
                if (va < vb) return state.dir === "desc" ? 1 : -1;
                if (va > vb) return state.dir === "desc" ? -1 : 1;
                return 0;
              });
              visible.forEach(function (r) { tbody.appendChild(r); });
            }

            var existingEmpty = tbody.querySelector("tr[data-filter-empty='1']");
            if (visible.length === 0) {
              if (!existingEmpty) {
                var tr = document.createElement("tr");
                tr.setAttribute("data-filter-empty", "1");
                var td = document.createElement("td");
                td.colSpan = table.querySelectorAll("thead th").length || 1;
                td.style.textAlign = "center";
                td.style.color = "#64748b";
                td.textContent = "No matching deals.";
                tr.appendChild(td);
                tbody.appendChild(tr);
              }
            } else if (existingEmpty) {
              existingEmpty.remove();
            }
          }

          if (search) {
            search.addEventListener("input", function () {
              state.q = this.value || "";
              applyTableState();
            });
          }

          for (var bi = 0; bi < buttons.length; bi++) {
            buttons[bi].addEventListener("click", function () {
              var key = this.getAttribute("data-sort-key") || "";
              var type = this.getAttribute("data-sort-type") || "text";
              if (state.key !== key) {
                state.key = key;
                state.type = type;
                var preferredFirstDir = {
                  agent: "asc",      // alphabetical: Alex first
                  side: "asc",
                  closeDate: "asc",  // soonest upcoming first
                  volume: "desc"
                };
                state.dir = preferredFirstDir[key] || "asc";
              } else {
                state.dir = state.dir === "desc" ? "asc" : "desc";
              }
              updateSortUI();
              applyTableState();
            });
          }

          updateSortUI();
        })(wraps[wi]);
      }
    }

        if (!byAgentPendingWeighted[k]) byAgentPendingWeighted[k] = 0;
        byAgentPendingWeighted[k] += (Number(d.price) || 0) * w;
      });

      var source = (model.ytdLeaderboard || []).length ? model.ytdLeaderboard : model.leaderboard;
      return source.map(function (a) {
        var weightedPending = byAgentPendingWeighted[a.agent] || 0;
        var expected = (Number(a.closedVolume) || 0) + weightedPending;
        return {
          agent: a.agent,
          closedVolume: Number(a.closedVolume) || 0,
          pendingWeighted: weightedPending,
          expectedVolume: expected,
          closedDeals: Number(a.closedDeals) || 0,
          pendingDeals: Number(a.pendingDeals) || 0

      }).sort(function (x, y) {

    function renderForecastTrendChart(model) {
      var yearRows = {};
      (state.allTimeClosedDeals || []).forEach(function (d) {
        if (!d.closeDate || isNaN(d.closeDate.getTime())) return;
        var y = d.closeDate.getFullYear();

        yearRows[y] += Number(d.price) || 0;
      });
      var years = Object.keys(yearRows).map(function (v) { return Number(v); }).sort(function (a, b) { return a - b; });
      var hasYoY = years.length >= 2;
      var currentYear = model.forecast.year;
      if (hasYoY) {
        var tailYears = years.slice(-6);
        var points = tailYears.map(function (y) {
          return { label: String(y), value: Number(yearRows[y]) || 0, year: y };
        });
        if (!tailYears.some(function (y) { return y === currentYear; })) {
          points.push({ label: String(currentYear), value: Number(model.forecast.closedYtdVolume) || 0, year: currentYear, isCurrentYtd: true });
        } else {
          points = points.map(function (p) {
            if (p.year === currentYear) {
              return { label: p.label + " YTD", value: Number(model.forecast.closedYtdVolume) || 0, year: p.year, isCurrentYtd: true };
            }
            return p;
          });
        }
      } else {

          { label: "Current YTD Closed", value: Number(state.ytdSummary && state.ytdSummary.closedVolume) || 0 },
          { label: "Projected " + model.forecast.year, value: Number(model.forecast.projectedClosedAtRunRate) || 0 }
        ];

      var w = 780;
      var h = 210;
      var padTop = 18;
      var padBottom = 42;
      var padLeft = 10;
      var padRight = 10;
      var plotW = w - padLeft - padRight;
      var plotH = h - padTop - padBottom;
      var yTicks = [0, 0.25, 0.5, 0.75, 1];

      var grid = yTicks.map(function (t) {
        var y = Math.round(padTop + (1 - t) * plotH);

          ? '<text x="' + p.x.toFixed(1) + '" y="' + (p.y - p.r - 6).toFixed(1) + '" text-anchor="middle" fill="#333" font-size="9" font-weight="700"' + ts + ' pointer-events="none">' + esc(p.label) + '</text>'
          : '';
        return (
          visual +
          '<circle class="amd-hit-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + (p.r + 10).toFixed(1) + '" fill="transparent" data-vis-dot="' + p.id + '" data-tip-type="agent" data-tip-agent="' + esc(p.agentName) + '" data-tip-volume="' + p.volume + '" data-tip-deals="' + p.deals + '" data-tip-color="' + p.fill + '" data-tip-rate="' + Math.round(p.closeRate * 100) + '" data-tip-avg="' + p.avgDeal + '"/>' +
          label
        );
      }).join('');

      var toggles = '<div style="display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;margin:0 0 10px 2px;">' +
        '<button class="amd-qt-legend-btn amd-matrix-toggle' + (matrixView === "ytd" ? ' is-active' : '') + '" data-matrix-view="ytd" type="button">YTD</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-toggle' + (matrixView === "allTime" ? ' is-active' : '') + '" data-matrix-view="allTime" type="button">All Time</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "all" ? ' is-active' : '') + '" data-matrix-tier="all" type="button">All</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "senior" ? ' is-active' : '') + '" data-matrix-tier="senior" type="button">Seniors</button>' +
        '<button class="amd-qt-legend-btn amd-matrix-tier' + (matrixTier === "junior" ? ' is-active' : '') + '" data-matrix-tier="junior" type="button">Juniors</button>' +
      '</div>';

      return toggles + '<svg class="amd-viz-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet" style="height:' + h + 'px;overflow:visible">' +
        grid +
        xGrid +
        '<line x1="' + padLeft + '" y1="' + (padTop + plotH) + '" x2="' + (w - padRight) + '" y2="' + (padTop + plotH) + '" stroke="#d4d4d4" stroke-width="1"/>' +
        '<line x1="' + padLeft + '" y1="' + padTop + '" x2="' + padLeft + '" y2="' + (padTop + plotH) + '" stroke="#d4d4d4" stroke-width="1"/>' +
        '<text x="' + (padLeft + plotW / 2).toFixed(1) + '" y="' + (h - 6) + '" text-anchor="middle" fill="#666" font-size="11" font-weight="600"' + ts + '>Total Deals</text>' +
        '<text x="' + 16 + '" y="' + (padTop + plotH / 2).toFixed(1) + '" transform="rotate(-90 16 ' + (padTop + plotH / 2).toFixed(1) + ')" text-anchor="middle" fill="#666" font-size="11" font-weight="600"' + ts + '>Total Volume</text>' +
        dots +
      '</svg>';
    }

    function renderAgentContributionChart(model) {
      var rows = (model.allTimeLeaderboard.length ? model.allTimeLeaderboard : model.leaderboard).slice(0, 8);
      if (!rows.length) return '<div class="amd-empty">No agent leaderboard data.</div>';
      var maxV = Math.max(1, rows[0].totalVolume || 0);
      return rows.map(function (r) {
        var pct = Math.max(4, Math.round((r.totalVolume / maxV) * 100));
        return '<div style="display:grid;grid-template-columns:132px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;">' +
          '<div style="font-size:11px;font-weight:700;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(r.agent) + "</div>" +
          '<div style="height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:#475569;border-radius:999px;"></div></div>' +
          '<div style="font-size:11px;font-weight:700;color:#0f172a;">' + esc(fmtMoney(r.totalVolume)) + "</div>" +
          "</div>";
      }).join("");
    }

    function renderAgentScoreChart(model) {
      var rows = buildAgentScoreRows(model);
      if (!rows.length) return '<div class="amd-empty">No score data yet (requires Directory + All Time feed).</div>';
      function toneStyles(tone) {
        if (tone === "red") {
          return {
            border: "#fecaca",
            bg: "#fff1f2",
            badgeBg: "#fee2e2",
            badgeText: "#991b1b",
            dot: "#b91c1c"
          };
        }
        if (tone === "yellow") {
          return {
            border: "#fde68a",
            bg: "#fffbeb",
            badgeBg: "#fef3c7",
            badgeText: "#92400e",
            dot: "#d97706"
          };
        }
        return {
          border: "#86efac",
          bg: "#f0fdf4",
          badgeBg: "#dcfce7",
          badgeText: "#166534",
          dot: "#15803d"
        };
      }
      return '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;">' +
        rows.map(function (r, idx) {
          var photo = String(r.photo || "");
          var backupPhoto = String(resolveAgentPhotoName(r.key || r.agent) || "");
          var imgSrc = photo || backupPhoto;
          var initials = (r.agent || "A").split(" ").slice(0, 2).map(function (p) { return p ? p.charAt(0) : ""; }).join("");
          var tone = toneStyles(r.statusTone);
          return '<article style="border:1px solid rgba(15,23,42,0.1);border-radius:10px;padding:8px;background:#fff;min-width:0;">' +
            '<div style="border:1px solid ' + tone.border + ';background:' + tone.bg + ';border-radius:10px;padding:7px;">' +
            '<div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">' +
              '<div style="display:grid;grid-template-columns:48px 1fr;gap:9px;align-items:center;min-width:0;">' +
                (imgSrc
                  ? '<div style="position:relative;width:48px;height:48px;border-radius:50%;overflow:hidden;border:1.5px solid #e2e8f0;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;">' +
                      esc(initials) +
                      '<img src="' + esc(imgSrc) + '" data-fb="' + esc(backupPhoto) + '" alt="' + esc(r.agent) + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="if(this.dataset.fb && this.src!==this.dataset.fb){this.src=this.dataset.fb;return;}this.style.display=\'none\';" />' +
                    '</div>'
                  : '<div style="width:48px;height:48px;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;">' + esc(initials) + '</div>') +
                '<div style="min-width:0;">' +
                  '<div style="font-size:13px;font-weight:800;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">#' + (idx + 1) + ' ' + esc(r.agent) + '</div>' +
                  '<div style="font-size:10px;color:#64748b;">Time with ASG: ' + esc(r.tenureLabel || "—") + '</div>' +
                '</div>' +
              '</div>' +
              '<div style="display:grid;grid-template-columns:auto auto;column-gap:8px;row-gap:4px;align-items:center;font-size:11px;color:#475569;text-align:right;">' +
                '<div style="font-weight:700;">All-time</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.totalVolume)) + '</div>' +
                '<div style="font-weight:700;">Current</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.currentVolume || 0)) + '</div>' +
                '<div style="font-weight:700;">Deals</div><div style="font-weight:800;color:#0f172a;">' + fmtNum(r.totalDeals) + '</div>' +
                '<div style="font-weight:700;">Pace</div><div style="font-weight:800;color:#0f172a;">' + esc(fmtMoney(r.annualizedVolume)) + '/yr</div>' +
              '</div>' +
            '</div>' +
            '<div style="margin-top:7px;display:flex;justify-content:space-between;align-items:center;">' +
              '<span style="display:inline-block;padding:2px 7px;border-radius:999px;background:' + tone.badgeBg + ';color:' + tone.badgeText + ';font-size:8px;font-weight:800;letter-spacing:.02em;">' + esc(r.statusLabel) + '</span>' +
              '<div style="width:10px;height:10px;border-radius:50%;background:' + tone.dot + ';"></div>' +
            '</div>' +
            '</div>' +
          '</article>';
        }).join("") +
      '</div>';
    }

    function buildAgentClosingTrendRows(model) {
      var monthlyByAgent = {};
      var allMonthKeys = {};
      var sourceDeals = (state.allTimeClosedDeals || []).concat(state.ytdClosedDeals || []);

      sourceDeals.forEach(function (d) {
        if (!d || !d.closeDate || isNaN(d.closeDate.getTime())) return;
        var key = normalizeAgentKey(d.agent);
        if (!key || isRemovedAgent(key)) return;
        var monthKey = d.closeDate.getFullYear() + "-" + String(d.closeDate.getMonth() + 1).padStart(2, "0");
        allMonthKeys[monthKey] = true;
        if (!monthlyByAgent[key]) monthlyByAgent[key] = {};
        if (!monthlyByAgent[key][monthKey]) monthlyByAgent[key][monthKey] = { volume: 0, deals: 0 };
        monthlyByAgent[key][monthKey].volume += Number(d.price) || 0;
        monthlyByAgent[key][monthKey].deals += 1;
      });

      var monthKeys = Object.keys(allMonthKeys).sort();
      if (!monthKeys.length) return [];
      monthKeys = monthKeys.slice(-18);

      var scores = buildAgentScoreRows(model);
      var topAgents = scores.slice(0, 8);
      if (!topAgents.length) return [];

      return topAgents.map(function (r) {
        var key = normalizeAgentKey(r.agent);
        var months = monthKeys.map(function (mk) {
          var stat = (monthlyByAgent[key] && monthlyByAgent[key][mk]) ? monthlyByAgent[key][mk] : { volume: 0, deals: 0 };
          return { monthKey: mk, volume: stat.volume, deals: stat.deals };
        });
        var peak = months.reduce(function (best, m) {
          if (!best || m.volume > best.volume) return m;
          return best;
        }, null) || { monthKey: "", volume: 0, deals: 0 };
        return {
          agent: r.agent,
          score: r.agentScore || 0,
          months: months,
          peakMonthKey: peak.monthKey,
          peakVolume: peak.volume || 0,
          peakDeals: peak.deals || 0
        };
      });
    }

    function renderAgentClosingTrendsChart(model) {
      var rows = buildAgentClosingTrendRows(model);
      if (!rows.length) return '<div class="amd-empty">No agent closing-trend data yet (needs closed deals with dates).</div>';

      function fmtMonthKey(monthKey) {
        var m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
        if (!m) return "—";
        var d = new Date(Number(m[1]), Number(m[2]) - 1, 1);
        return d.toLocaleDateString(undefined, { month: "short", year: "2-digit" });
      }

      return rows.map(function (r) {
        var vals = r.months.map(function (m) { return Number(m.volume) || 0; });
        var maxV = Math.max(1, vals.reduce(function (mx, v) { return Math.max(mx, v); }, 0));
        var w = 300, h = 44, padX = 4, padY = 4;
        var step = vals.length > 1 ? ((w - padX * 2) / (vals.length - 1)) : 0;
        var pts = vals.map(function (v, i) {
          var x = padX + i * step;
          var y = h - padY - ((v / maxV) * (h - padY * 2));
          return { x: x, y: y, v: v };
        });
        var path = pts.map(function (p, i) {
          return (i ? " L " : "M ") + p.x.toFixed(1) + " " + p.y.toFixed(1);
        }).join("");
        var last = pts.length ? pts[pts.length - 1] : { x: padX, y: h - padY };

        return '<div style="display:grid;grid-template-columns:180px 1fr;gap:10px;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(15,23,42,0.08);">' +
          '<div>' +
            '<div style="font-size:12px;font-weight:800;color:#0f172a;">' + esc(r.agent) + '</div>' +
            '<div style="font-size:10px;color:#64748b;">Best month: ' + esc(fmtMonthKey(r.peakMonthKey)) + ' · ' + esc(fmtMoney(r.peakVolume)) + ' · ' + fmtNum(r.peakDeals) + ' deals</div>' +
          '</div>' +
          '<div>' +
            '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%;height:44px;display:block;">' +
              '<path d="' + path + '" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
              '<circle cx="' + last.x.toFixed(1) + '" cy="' + last.y.toFixed(1) + '" r="2.8" fill="#111"/>' +
            '</svg>' +
            '<div style="display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:2px;"><span>Last 18 months</span><span>Peak ' + esc(fmtMoneyRounded(maxV)) + '</span></div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderStageMixChart() {
      var buckets = {};
      (state.ytdPendingDeals || []).forEach(function (d) {
        var s = normalizeStage(d.stage);
        if (!buckets[s]) buckets[s] = { stage: s, deals: 0, volume: 0 };
        buckets[s].deals += 1;
        buckets[s].volume += Number(d.price) || 0;
      });
      var rows = Object.keys(buckets).map(function (k) { return buckets[k]; }).sort(function (a, b) { return b.volume - a.volume; });
      if (!rows.length) return '<div class="amd-empty">No active stage data.</div>';
      var total = rows.reduce(function (s, r) { return s + r.volume; }, 0) || 1;
      return rows.map(function (r) {
        var pct = Math.round((r.volume / total) * 100);
        return '<div style="display:grid;grid-template-columns:140px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;">' +
          '<div style="font-size:11px;font-weight:700;color:#334155;">' + esc(r.stage) + "</div>" +
          '<div style="height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;"><div style="height:100%;width:' + Math.max(4, pct) + '%;background:#64748b;border-radius:999px;"></div></div>' +
          '<div style="font-size:11px;font-weight:700;color:#0f172a;">' + pct + '%</div>' +
          "</div>";
      }).join("");
    }

    // ─────────────────────────────────────────────────────────────
    // DEAL TRACKER (FUB + YTD Pending Sheet)
    // Real fields from sheet: agent, address, price, side, closeDate, stage
    // Derived (biz-day math from closeDate) until FUB is wired: contract,
    // inspection, attorney, appraisal, mortgageCommitment dates.
    // All user toggles (checklist, earnest money, manual date overrides)
    // persist to localStorage keyed by stable deal hash.
    // ─────────────────────────────────────────────────────────────
    var DT_STORE_KEY = "amd-deal-tracker-overrides-v1";
    var dtOverrides = (function () {
      try { return JSON.parse(localStorage.getItem(DT_STORE_KEY) || "{}"); }
      catch (e) { return {}; }
    })();
    function dtSaveOverrides() {
      try { localStorage.setItem(DT_STORE_KEY, JSON.stringify(dtOverrides)); } catch (e) {}
    }
    function dtDealId(d) {
      var raw = String((d.address || "") + "|" + (d.agent || "") + "|" + (d.price || 0)).toLowerCase();
      var h = 0;
      for (var i = 0; i < raw.length; i++) h = ((h << 5) - h + raw.charCodeAt(i)) | 0;
      return "d" + Math.abs(h).toString(36);
    }
    function dtAddBizDays(date, n) {
      if (!date) return null;
      var d = new Date(date.getTime());
      var added = 0;
      while (added < n) {
        d.setDate(d.getDate() + 1);
        var wd = d.getDay();
        if (wd !== 0 && wd !== 6) added++;
      }
      return d;
    }
    function dtSubBizDays(date, n) {
      if (!date) return null;
      var d = new Date(date.getTime());
      var removed = 0;
      while (removed < n) {
        d.setDate(d.getDate() - 1);
        var wd = d.getDay();
        if (wd !== 0 && wd !== 6) removed++;
      }
      return d;
    }
    function dtNormalizeSide(side, stage) {
      var s = String(side || "").toLowerCase();
      var st = String(stage || "").toLowerCase();
      if (s.indexOf("cash") >= 0 || st.indexOf("cash") >= 0) return "cash";
      if (s.indexOf("buy") >= 0) return "buy";
      if (s.indexOf("list") >= 0 || s.indexOf("sell") >= 0) return "sell";
      return s || "buy";
    }
    function dtFmtMoney(n) {
      if (n == null || !n) return "—";
      return "$" + Number(n).toLocaleString("en-US");
    }
    function dtFmtDate(d) {
      if (!d || isNaN(d.getTime())) return "—";
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }
    function dtDayDiff(a, b) {
      if (!a || !b || isNaN(a.getTime()) || isNaN(b.getTime())) return null;
      var ad = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      var bd = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return Math.round((ad - bd) / 86400000);
    }
    function dtRelText(d) {
      if (!d || isNaN(d.getTime())) return "";
      var delta = dtDayDiff(d, new Date());
      if (delta == null) return "";
      if (delta === 0) return "Today";
      if (delta === 1) return "Tomorrow";
      if (delta === -1) return "Yesterday";
      if (delta > 0) return "in " + delta + "d";
      return Math.abs(delta) + "d ago";
    }
    function dtDateStatus(d, done) {
      if (!d || isNaN(d.getTime())) return "empty";
      if (done) return "done";
      var delta = dtDayDiff(d, new Date());
      if (delta == null) return "empty";
      if (delta < 0) return "late";
      if (delta <= 2) return "soon";
      return "ontrack";
    }

    // Build tracker-shaped deal from raw pending sheet row
    function dtBuildDeal(raw) {
      var id = dtDealId(raw);
      var ov = dtOverrides[id] || {};
      var side = dtNormalizeSide(raw.side, raw.stage);
      var closeDate = (raw.closeDate && !isNaN(raw.closeDate.getTime())) ? raw.closeDate : null;

      // Derive contract + milestone dates from closeDate when no explicit values exist.
      // Typical deal timeline is ~45 biz days contract → close.
      var contractDate = ov.contractDate ? new Date(ov.contractDate) : (closeDate ? dtSubBizDays(closeDate, 45) : null);
      var inspectionDate = ov.inspectionDate ? new Date(ov.inspectionDate) : (contractDate ? dtAddBizDays(contractDate, 5) : null);
      var attorneyDate = ov.attorneyDate ? new Date(ov.attorneyDate) : (contractDate ? dtAddBizDays(contractDate, 5) : null);
      var appraisalDate = ov.appraisalDate ? new Date(ov.appraisalDate) : (contractDate ? dtAddBizDays(contractDate, 15) : null);
      var mortgageDate = ov.mortgageDate ? new Date(ov.mortgageDate) : (closeDate ? dtSubBizDays(closeDate, 7) : null);

      var checklist = Object.assign({
        inspectionScheduled: false, inspectionDone: false,
        appraisalDone: false, mortgageCommitment: false,
        finalWalkScheduled: false, finalWalkDone: false,
        closingStatement: false, reviewSent: false,
        commissionStatement: false, socialPost: false, followUp3wk: false
      }, ov.checklist || {});

      var earnest = {
        initial: Object.assign({ amount: null, sent: false, receipt: false, toClient: false, toLender: false }, (ov.earnest || {}).initial || {}),
        balance: Object.assign({ amount: null, sent: false, receipt: false, toClient: false, toLender: false }, (ov.earnest || {}).balance || {})
      };
      // Auto-estimate balance EM as 10% of price if not manually set
      if (earnest.balance.amount == null && raw.price) earnest.balance.amount = Math.round(raw.price * 0.1);
      if (earnest.initial.amount == null) earnest.initial.amount = 5000;

      return {
        id: id,
        raw: raw,
        address: raw.address || "—",
        agent: raw.agent || "—",
        price: raw.price || 0,
        side: side,
        stage: raw.stage || "",
        client: ov.client || "", // awaiting FUB
        lender: ov.lender || "", // awaiting FUB
        dates: {
          contract: contractDate,
          inspection: inspectionDate,
          attorney: attorneyDate,
          appraisal: appraisalDate,
          mortgageCommitment: mortgageDate,
          closing: closeDate
        },
        extended: ov.extended || {},
        checklist: checklist,
        earnest: earnest
      };
    }
    function dtSetOverride(id, path, value) {
      dtOverrides[id] = dtOverrides[id] || {};
      var cur = dtOverrides[id];
      for (var i = 0; i < path.length - 1; i++) {
        cur[path[i]] = cur[path[i]] || {};
        cur = cur[path[i]];
      }
      cur[path[path.length - 1]] = value;
      dtSaveOverrides();
    }
    function dtChecklistProgress(deal) {
      var keys = Object.keys(deal.checklist).filter(function (k) {
        if (k === "commissionStatement") return deal.side === "sell";
        if (k === "appraisalDone" || k === "mortgageCommitment") return deal.side !== "cash";
        return true;
      });
      var done = keys.filter(function (k) { return deal.checklist[k]; }).length;
      return { done: done, total: keys.length, pct: keys.length ? Math.round((done / keys.length) * 100) : 0 };
    }
    function dtDealStatus(deal) {
      var closingDelta = dtDayDiff(deal.dates.closing, new Date());
      var prog = dtChecklistProgress(deal);
      if (closingDelta != null && closingDelta < 0 && prog.pct < 100) return "late";
      if (closingDelta != null && closingDelta <= 7 && closingDelta >= 0 && prog.pct < 80) return "risk";
      if (closingDelta != null && closingDelta <= 7 && closingDelta >= 0) return "closing";
      return "ontrack";
    }

    var DT_CHECKLIST_ITEMS = [
      { key: "inspectionScheduled", label: "Inspection scheduled", meta: "Day 1–3 after contract" },
      { key: "inspectionDone",      label: "Inspection completed", meta: "By day 5" },
      { key: "appraisalDone",       label: "Appraisal done",       meta: "Lender-ordered",  hideIfCash: true },
      { key: "mortgageCommitment",  label: "Mortgage commitment",  meta: "~7 biz days pre-close", hideIfCash: true },
      { key: "finalWalkScheduled",  label: "Final walk scheduled", meta: "Day before close" },
      { key: "finalWalkDone",       label: "Final walk completed", meta: "" },
      { key: "closingStatement",    label: "Closing statement on file", meta: "Required" },
      { key: "reviewSent",          label: "Review sent to client", meta: "Post-close" },
      { key: "commissionStatement", label: "Commission statement sent", meta: "2 days prior (sell)", sellOnly: true },
      { key: "socialPost",          label: "Social media post ready", meta: "" },
      { key: "followUp3wk",         label: "3-week follow-up set",  meta: "Post-close check-in" }
    ];

    function renderTrackerEMRow(deal, which, label, dueDate) {
      var em = deal.earnest[which] || {};
      var dueStatus = dtDateStatus(dueDate, em.sent && em.receipt);
      var badges = [
        { key: "sent",     label: "Sent" },
        { key: "receipt",  label: "Receipt" },
        { key: "toClient", label: "To Client" },
        { key: "toLender", label: "To Lender", hideIfSell: true }
      ];
      var badgesHTML = badges.map(function (b) {
        if (b.hideIfSell && deal.side === "sell") return "";
        var on = !!em[b.key];
        return '<span class="amd-dt-em-badge ' + (on ? "is-on" : "") +
          '" data-amd-dt-em data-deal="' + deal.id + '" data-which="' + which + '" data-key="' + b.key + '">' +
          '<span class="amd-dt-em-badge-check"></span>' + b.label + '</span>';
      }).join("");
      return '<div class="amd-dt-em-row">' +
        '<div class="amd-dt-em-left">' +
          '<span class="amd-dt-em-kind">' + label + '</span>' +

    function renderTrackerCard(deal) {
      var prog = dtChecklistProgress(deal);
      var status = dtDealStatus(deal);

        cash: '<span class="amd-dt-chip amd-dt-chip-cash">Cash Deal</span>'
      }[deal.side];
      var priceHTML = deal.side === "cash"
        ? '<span class="amd-dt-price is-cash">CASH</span>'
        : '<span class="amd-dt-price">' + dtFmtMoney(deal.price) + '</span>';

      // Timeline
      var checkedMap = {
        contract: !!(deal.dates.contract && dtDayDiff(new Date(), deal.dates.contract) >= 0),

        { key: "closing",           label: "Closing",     date: deal.dates.closing }
      ];
      var timelineHTML = steps.map(function (step) {
        var isCashHide = step.cashHide && deal.side === "cash";

          (ext ? '<span class="amd-dt-tl-ext">Extended</span>' : '') +
        '</div>';
      }).join("");

      var checksHTML = DT_CHECKLIST_ITEMS.map(function (item) {
        if (item.sellOnly && deal.side !== "sell") return "";
        if (item.hideIfCash && deal.side === "cash") return "";
        var done = !!deal.checklist[item.key];
        return '<div class="amd-dt-check ' + (done ? "is-done" : "") +
          '" data-amd-dt-check data-deal="' + deal.id + '" data-key="' + item.key + '">' +
          '<div class="amd-dt-check-box"></div>' +
          '<div>' +
            '<div class="amd-dt-check-label">' + item.label + '</div>' +
            (item.meta ? '<div class="amd-dt-check-meta">' + item.meta + '</div>' : '') +
          '</div>' +
        '</div>';
      }).join("");

      var clientHTML = deal.client
        ? '<span class="amd-dt-meta-item">👤 ' + esc(deal.client) + '</span>'
        : '<span class="amd-dt-meta-item is-missing">Client — awaiting FUB</span>';
      var lenderHTML = deal.side === "cash"
        ? '<span class="amd-dt-meta-item">💵 Cash — no financing</span>'
        : (deal.lender
            ? '<span class="amd-dt-meta-item">🏦 ' + esc(deal.lender) + '</span>'
            : '<span class="amd-dt-meta-item is-missing">Lender — awaiting FUB</span>');

      return '<article class="amd-dt-card" data-deal-id="' + deal.id + '">' +
        '<header class="amd-dt-card-head">' +
          '<div class="amd-dt-chip-row">' + sideChip +
            '<span class="amd-dt-chip-status is-' + status + '">' + statusLabel + '</span>' +
            priceHTML +
          '</div>' +
          '<h3 class="amd-dt-address">' + esc(deal.address) + '</h3>' +

            lenderHTML +

          '<div class="amd-dt-progress" title="Checklist ' + prog.done + '/' + prog.total + '">' +
            '<div class="amd-dt-progress-bar"><div class="amd-dt-progress-fill" style="width:' + prog.pct + '%"></div></div>' +
            '<div class="amd-dt-progress-text">' + prog.done + '/' + prog.total + ' · ' + prog.pct + '%</div>' +
          '</div>' +
        '</header>' +

            '<button class="amd-dt-foot-btn" data-amd-dt-fub="' + deal.id + '">Open in FUB</button>' +
            '<button class="amd-dt-foot-btn is-primary" data-amd-dt-reset="' + deal.id + '">Reset Deal</button>' +
          '</div>' +
        '</footer>' +

    function renderTrackerView(model) {
      var raws = (model.pendingDeals || []).filter(function (d) {
        return d && d.address && d.address !== "—" && d.closeDate && !isNaN(d.closeDate.getTime());
      });
      var allDeals = raws.map(dtBuildDeal);

      // Unique agents (sorted alphabetically) with deal counts
      var agentCounts = {};
      allDeals.forEach(function (d) {
        var a = (d.agent || "—").trim();
        if (!a) a = "—";
        agentCounts[a] = (agentCounts[a] || 0) + 1;
      });
      var agentList = Object.keys(agentCounts).sort(function (a, b) {
        return a.toLowerCase().localeCompare(b.toLowerCase());
      });

      var agentSel = state.dealsTrackerAgent || "all";
      if (agentSel !== "all" && agentCounts[agentSel] == null) {
        agentSel = "all";
        state.dealsTrackerAgent = "all";
      }

      // Scope deals to selected agent first (so side/risk counts reflect that view)
      var deals = agentSel === "all"
        ? allDeals
        : allDeals.filter(function (d) { return (d.agent || "—").trim() === agentSel; });

      // Filters
      var filters = [
        { id: "all",     label: "All Deals" },
        { id: "buy",     label: "Buy Side" },
        { id: "sell",    label: "Sell Side" },
        { id: "cash",    label: "Cash" },
        { id: "closing", label: "Closing ≤ 7 days" },
        { id: "risk",    label: "At Risk" }
      ];
      var counts = {
        all: deals.length,
        buy: deals.filter(function (d) { return d.side === "buy"; }).length,
        sell: deals.filter(function (d) { return d.side === "sell"; }).length,
        cash: deals.filter(function (d) { return d.side === "cash"; }).length,
        closing: deals.filter(function (d) {
          var dd = dtDayDiff(d.dates.closing, new Date());
          return dd != null && dd >= 0 && dd <= 7;
        }).length,
        risk: deals.filter(function (d) {
          var s = dtDealStatus(d);
          return s === "risk" || s === "late";
        }).length
      };

      var fSel = state.dealsTrackerFilter || "all";
      var qSel = (state.dealsTrackerSearch || "").toLowerCase();
      var visible = deals.filter(function (d) {
        if (fSel === "buy" || fSel === "sell" || fSel === "cash") { if (d.side !== fSel) return false; }
        if (fSel === "closing") {
          var dd = dtDayDiff(d.dates.closing, new Date());
          if (!(dd != null && dd >= 0 && dd <= 7)) return false;
        }
        if (fSel === "risk") {
          var st = dtDealStatus(d);
          if (st !== "risk" && st !== "late") return false;
        }
        if (qSel) {
          var hay = (d.address + " " + d.agent + " " + (d.client || "") + " " + (d.lender || "")).toLowerCase();
          if (hay.indexOf(qSel) < 0) return false;
        }
        return true;
      });

      // Sort: soonest closing first
      visible.sort(function (a, b) {
        var at = a.dates.closing ? a.dates.closing.getTime() : Infinity;
        var bt = b.dates.closing ? b.dates.closing.getTime() : Infinity;
        return at - bt;
      });

      var agentOptions =
        '<option value="all">All Agents · ' + allDeals.length + '</option>' +
        agentList.map(function (a) {
          var selected = agentSel === a ? " selected" : "";
          return '<option value="' + esc(a) + '"' + selected + '>' + esc(a) + ' · ' + agentCounts[a] + '</option>';
        }).join("");

      var subCopy = agentSel === "all"
        ? ("Live pipeline from YTD Pending Sheet · " + allDeals.length + " active " + (allDeals.length === 1 ? "deal" : "deals") + " across " + agentList.length + " " + (agentList.length === 1 ? "agent" : "agents"))
        : (esc(agentSel) + " · " + deals.length + " active " + (deals.length === 1 ? "deal" : "deals"));

      var head =
        '<div class="amd-dt-head">' +
          '<div>' +
            '<h3 class="amd-dt-title">Deal Tracker</h3>' +
            '<p class="amd-dt-sub">' + subCopy + '</p>' +
          '</div>' +
          '<div class="amd-dt-toolbar">' +
            '<select class="amd-dt-agent-select ' + (agentSel !== "all" ? "is-scoped" : "") + '" data-amd-dt-agent aria-label="Filter by agent">' + agentOptions + '</select>' +
            '<input class="amd-dt-search" type="search" placeholder="Search address, agent, client, lender…" data-amd-dt-search value="' + esc(state.dealsTrackerSearch || "") + '">' +
          '</div>' +
        '</div>' +
        '<div class="amd-dt-fub-hint">Client name, lender, and exact milestone dates sync from Follow Up Boss. Dates shown are auto-derived from the close date until FUB is wired. Checklist &amp; earnest money toggles save locally per deal.</div>' +
        '<div class="amd-dt-filter-row">' +
          filters.map(function (f) {
            return '<button class="amd-dt-filter ' + (fSel === f.id ? "is-active" : "") + '" data-amd-dt-filter="' + f.id + '" type="button">' +
              '<span>' + f.label + '</span>' +
              '<span class="amd-dt-filter-count">' + (counts[f.id] || 0) + '</span>' +
            '</button>';
          }).join("") +
        '</div>';

      var emptyMsg = agentSel !== "all" && !deals.length
        ? '<div class="amd-dt-empty"><div class="amd-dt-empty-title">No active deals for ' + esc(agentSel) + '</div><div>Switch to All Agents or choose another agent above.</div></div>'
        : '<div class="amd-dt-empty"><div class="amd-dt-empty-title">No deals match your filters</div><div>Try clearing your search or switching tabs.</div></div>';

      var body = visible.length
        ? '<div class="amd-dt-grid">' + visible.map(renderTrackerCard).join("") + '</div>'
        : emptyMsg;

      return head + body;
    }

    function render() {
      var model = computeModel();

        ? state.loadedAt.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })
        : "—";
      var today = new Date();
      var todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
      function toDateMs(value) {
        if (value instanceof Date && !isNaN(value.getTime())) return value.getTime();
        var parsed = parseDate(value);
        return parsed && !isNaN(parsed.getTime()) ? parsed.getTime() : NaN;
      }
      var nextClosing = model.pendingDeals
        .filter(function (d) {
          if (!d) return false;
          var ms = toDateMs(d.closeDate);
          return !isNaN(ms) && ms >= todayStart;
        })
        .sort(function (a, b) { return toDateMs(a.closeDate) - toDateMs(b.closeDate); })[0] || null;

            var at = a && a.closeDate && !isNaN(a.closeDate.getTime()) ? a.closeDate.getTime() : Number.POSITIVE_INFINITY;

            return (Number(b.price) || 0) - (Number(a.price) || 0);

          dealsSubtabs +
          '<div class="amd-panel-head">' +

              renderClosedAllTimeDealRows(state.allTimeClosedDeals) +

      } else if (state.tab === "summary") {

        var atDeals = Number(state.allTimeSummary && (state.allTimeSummary.totalDeals || state.allTimeSummary.totalTransactions)) || 0;
        panelHTML =

        panelHTML =

      } else if (state.tab === "forecast") {

            '<button class="amd-subtab ' + (state.forecastView === "agent" ? "is-active" : "") + '" data-subtab="forecast-agent" type="button">Per Agent Performance</button>' +
          "</div>";
        if (state.forecastView === "team") {
          panelHTML =
          fSubtabs +
          '<div class="amd-panel-head">' +
            '<h3 class="amd-panel-title">Forecast Model</h3>' +
            '<p class="amd-panel-sub">Run-rate + weighted pipeline probability model</p>' +
          "</div>" +
          renderForecastTrendChart(model) +
          '<div class="amd-forecast">' +
            '<div class="amd-f-card"><div class="amd-f-label">Forecasted ' + model.forecast.year + " Volume</div><div class='amd-f-value'>" + fmtMoney(model.forecast.forecastVolume) + "</div><div class='amd-f-meta'>Projected deals: " + fmtNum(Math.round(model.forecast.forecastDeals)) + "</div></div>" +
            '<div class="amd-f-card"><div class="amd-f-label">Monthly Run-Rate</div><div class="amd-f-value">' + fmtMoney(model.forecast.monthlyRunRate) + '</div><div class="amd-f-meta">Based on ' + fmtNum(model.forecast.monthsElapsed) + " months elapsed</div></div>" +
            '<div class="amd-f-card"><div class="amd-f-label">Closed YTD</div><div class="amd-f-value">' + fmtMoney(model.forecast.closedYtdVolume) + '</div><div class="amd-f-meta">Run-rate extrapolation: ' + fmtMoney(model.forecast.projectedClosedAtRunRate) + "</div></div>" +
            '<div class="amd-f-card"><div class="amd-f-label">Weighted Pending Contribution</div><div class="amd-f-value">' + fmtMoney(model.forecast.weightedPendingVolume) + '</div><div class="amd-f-meta">Model confidence: ' + fmtNum(model.forecast.confidence) + "%</div></div>" +
          "</div>" +
          '<div class="amd-model"><strong>Model formula:</strong> <code>Forecast = (Closed YTD / Months Elapsed * 12) + Weighted Pending</code><br><strong>Pending weights:</strong> Offer Submitted 35%, Under Contract 70%, A/I or Pending 90%, fallback 50%.<br><strong>Feed tabs:</strong> YTD Closed, YTD Pending, YTD Summary, All Time Summary, All Time Closed.<br><strong>Note:</strong> True per-year bars require date-level all-time closed rows in the API; current chart uses available all-time benchmark + current year pace.</div>';
        } else {
          var agentForecastRows = buildAgentForecastRows(model);
          panelHTML =
          fSubtabs +
          '<div class="amd-panel-head">' +
            '<h3 class="amd-panel-title">Per Agent Forecast Performance</h3>' +
            '<p class="amd-panel-sub">Expected volume = Closed YTD + weighted active pipeline</p>' +
          "</div>" +
          '<div class="amd-table-wrap"><table><thead><tr><th>Rank</th><th>Agent</th><th>Closed YTD</th><th>Weighted Active</th><th>Expected Volume</th><th>Closed / Active Deals</th></tr></thead><tbody>' +
          (agentForecastRows.length ? agentForecastRows.map(function (r, idx) {
            return "<tr><td>#" + (idx + 1) + "</td><td><strong>" + esc(r.agent) + "</strong></td><td class='amd-money'>" + fmtMoney(r.closedVolume) + "</td><td class='amd-money'>" + fmtMoney(r.pendingWeighted) + "</td><td class='amd-money'>" + fmtMoney(r.expectedVolume) + "</td><td>" + fmtNum(r.closedDeals) + " / " + fmtNum(r.pendingDeals) + "</td></tr>";
          }).join("") : '<tr><td colspan="6" style="text-align:center;color:#64748b">No per-agent forecast data.</td></tr>') +
          "</tbody></table></div>";
        }
      } else if (state.tab === "viz") {
        var vSubtabs =
          '<div class="amd-subtabs">' +
            '<button class="amd-subtab ' + (state.vizView === "team" ? "is-active" : "") + '" data-subtab="viz-team" type="button">Team Performance</button>' +
            '<button class="amd-subtab ' + (state.vizView === "agent" ? "is-active" : "") + '" data-subtab="viz-agent" type="button">Agent Performance</button>' +
          "</div>";
        panelHTML =
          vSubtabs +
          '<div class="amd-panel-head">' +
            '<h3 class="amd-panel-title">Data Visualization</h3>' +
            '<p class="amd-panel-sub">' + (state.vizView === "team" ? "Team performance trends and pacing visuals" : "Agent-level performance and score visuals") + '</p>' +
          "</div>" +
          '<div class="amd-viz-grid">' +
            (state.vizView === "team"
              ? (
                '<div class="amd-viz-card" style="grid-column:1 / span 2;">' +
                  "<h4>Total Closed</h4>" +
                  "<p>X-axis: year, Y-axis: total closed volume</p>" +
                  renderYearVsClosingsLineChart() +
                "</div>" +
                '<div class="amd-viz-card" style="grid-column:1 / span 2;">' +
                  "<h4>Quarterly Trends</h4>" +
                  "<p>Closed volume per quarter — seasonal comparison across years</p>" +
                  renderQuarterlyTrendLegend() +
                  renderQuarterlyTrendChart() +
                "</div>"
              )
              : (
                '<div class="amd-viz-card" style="grid-column:1 / span 2;">' +
                  "<h4>Agent Performance Matrix</h4>" +
                  "<p>X-axis: total deals, Y-axis: total volume, bubble size: average deal size</p>" +
                  renderAgentPerformanceMatrix(model) +
                "</div>" +
                '<div class="amd-viz-card" style="grid-column:1 / span 2;">' +
                  "<h4>Agent Scores (All Time + Seniority)</h4>" +
                  renderAgentScoreChart(model) +
                "</div>"
              )) +
          "</div>";
      } else {
        state.tab = "viz";
        return render();
      }

      root.innerHTML =
        '<div class="amd-shell">' +
          '<div class="amd-head">' +
            "<div>" +
              '<h2 class="amd-title">Team Performance</h2>' +
              '<p class="amd-subtitle">Deals, leaderboard, and visualization views.</p>' +
            "</div>" +
            '<div class="amd-actions">' +
              '<div class="amd-updated">Last refresh: ' + esc(updated) + "</div>" +
              '<button class="amd-btn" id="amdRefreshBtn" type="button">Refresh Data</button>' +
            "</div>" +
          "</div>" +
          '<div class="amd-kpis">' +
            '<article class="amd-kpi"><div class="amd-kpi-head"><div class="amd-kpi-label">Total Pipeline (YTD)</div><span class="amd-kpi-chip pipeline">YTD</span></div><div class="amd-kpi-value">' + fmtMoney(model.pendingVolume + model.closedVolume) + '</div><div class="amd-kpi-meta">' + fmtNum(model.totalDeals) + " deals</div></article>" +
            '<article class="amd-kpi pending"><div class="amd-kpi-head"><div class="amd-kpi-label">Active</div><span class="amd-kpi-chip pending">Pending</span></div><div class="amd-kpi-value">' + fmtMoney(model.pendingVolume) + '</div><div class="amd-kpi-meta">' + fmtNum(model.pendingDeals.length) + " deals</div></article>" +
            '<article class="amd-kpi closed"><div class="amd-kpi-head"><div class="amd-kpi-label">Closed</div><span class="amd-kpi-chip closed">YTD Closed</span></div><div class="amd-kpi-value">' + fmtMoney(model.closedVolume) + '</div><div class="amd-kpi-meta">' + fmtNum(model.closedDeals.length) + " deals</div></article>" +
            '<article class="amd-kpi forecast next-close"><div class="amd-kpi-head"><div class="amd-kpi-label next-close-label">Next Closing <span class="amd-keys-icon" aria-hidden="true">🔑</span></div><span class="amd-kpi-chip next">' + esc(nextCloseDateLabel) + '</span></div><div class="amd-kpi-value">' + (nextClosing ? fmtMoneyFull(nextClosing.price) : "—") + '</div><div class="amd-kpi-meta">' + (nextClosing ? (esc(nextClosing.agent || "—") + " · " + esc(nextClosing.side || "—") + " · " + esc(nextClosing.address || "—")) : "No upcoming close date available") + "</div></article>" +
          "</div>" +
          '<div class="amd-tabs">' +
            '<button class="amd-tab ' + (state.tab === "leaderboard" ? "is-active" : "") + '" data-tab="leaderboard" type="button">Leaderboard</button>' +
            '<button class="amd-tab ' + (state.tab === "deals" ? "is-active" : "") + '" data-tab="deals" type="button">Deals</button>' +
            '<button class="amd-tab ' + (state.tab === "viz" ? "is-active" : "") + '" data-tab="viz" type="button">Data Visualization</button>' +
          "</div>" +
          '<section class="amd-panel">' + panelHTML + "</section>" +
        "</div>";

      var tabs = root.querySelectorAll(".amd-tab");
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].addEventListener("click", function () {
          state.tab = this.getAttribute("data-tab");
          render();
        });
      }
      var subtabs = root.querySelectorAll(".amd-subtab");
      for (var j = 0; j < subtabs.length; j++) {
        subtabs[j].addEventListener("click", function () {
          var key = this.getAttribute("data-subtab");
          if (key === "deals-tracker") state.dealsView = "tracker";
          if (key === "deals-active") state.dealsView = "active";
          if (key === "deals-closed") state.dealsView = "closed";
          if (key === "closed-ytd") state.closedView = "ytd";
          if (key === "closed-allTime") state.closedView = "allTime";
          if (key === "leaderboard-ytd") state.leaderboardView = "ytd";
          if (key === "leaderboard-allTime") state.leaderboardView = "allTime";
          if (key === "viz-team") state.vizView = "team";
          if (key === "viz-agent") state.vizView = "agent";
          if (key === "forecast-team") state.forecastView = "team";
          if (key === "forecast-agent") state.forecastView = "agent";
          render();
        });
      }
      var refreshBtn = root.querySelector("#amdRefreshBtn");
      if (refreshBtn) {
        refreshBtn.addEventListener("click", function () {
          load();
        });
      }
      var qtBtns = root.querySelectorAll('.amd-qt-legend-btn[data-qtf]');
      for (var qb = 0; qb < qtBtns.length; qb++) {
        qtBtns[qb].addEventListener('click', function () {
          state.qtFilter = this.getAttribute('data-qtf');
          render();
        });
      }
      var matrixBtns = root.querySelectorAll('.amd-matrix-toggle');
      for (var mb = 0; mb < matrixBtns.length; mb++) {
        matrixBtns[mb].addEventListener('click', function () {
          state.agentMatrixView = this.getAttribute('data-matrix-view') || 'ytd';
          render();
        });
      }
      var tierBtns = root.querySelectorAll('.amd-matrix-tier');
      for (var tb = 0; tb < tierBtns.length; tb++) {
        tierBtns[tb].addEventListener('click', function () {
          state.agentMatrixTier = this.getAttribute('data-matrix-tier') || 'all';
          render();
        });
      }
      try { initDealTracker(); } catch (e) { console.error("deal-tracker:", e); }
      try { initDealsTables(); } catch (e) { console.error("deals-table:", e); }
      try { initChartTooltips(); } catch (e) { console.error("tooltips:", e); }
    }

    function initDealTracker() {
      var filters = root.querySelectorAll('[data-amd-dt-filter]');
      for (var i = 0; i < filters.length; i++) {
        filters[i].addEventListener('click', function () {
          state.dealsTrackerFilter = this.getAttribute('data-amd-dt-filter');
          render();
        });
      }
      var agentSelect = root.querySelector('[data-amd-dt-agent]');
      if (agentSelect) {
        agentSelect.addEventListener('change', function () {
          state.dealsTrackerAgent = this.value || "all";
          state.dealsTrackerFilter = "all";
          render();
        });
      }
      var search = root.querySelector('[data-amd-dt-search]');
      if (search) {
        search.addEventListener('input', function () {
          var self = this;
          clearTimeout(self._dt);
          self._dt = setTimeout(function () {
            state.dealsTrackerSearch = self.value;
            var pos = self.selectionStart;
            render();
            var s = root.querySelector('[data-amd-dt-search]');
            if (s) { s.focus(); try { s.setSelectionRange(pos, pos); } catch (e) {} }
          }, 120);
        });
      }
      var checks = root.querySelectorAll('[data-amd-dt-check]');
      for (var c = 0; c < checks.length; c++) {
        checks[c].addEventListener('click', function () {
          var id = this.getAttribute('data-deal');
          var key = this.getAttribute('data-key');
          var cur = (dtOverrides[id] && dtOverrides[id].checklist && dtOverrides[id].checklist[key]) || false;
          dtSetOverride(id, ['checklist', key], !cur);
          render();
        });
      }
      var emBadges = root.querySelectorAll('[data-amd-dt-em]');
      for (var e2 = 0; e2 < emBadges.length; e2++) {
        emBadges[e2].addEventListener('click', function () {
          var id = this.getAttribute('data-deal');
          var which = this.getAttribute('data-which');
          var key = this.getAttribute('data-key');
          var cur = (dtOverrides[id] && dtOverrides[id].earnest && dtOverrides[id].earnest[which] && dtOverrides[id].earnest[which][key]) || false;
          dtSetOverride(id, ['earnest', which, key], !cur);
          render();
        });
      }
      var resetBtns = root.querySelectorAll('[data-amd-dt-reset]');
      for (var r = 0; r < resetBtns.length; r++) {
        resetBtns[r].addEventListener('click', function () {
          var id = this.getAttribute('data-amd-dt-reset');
          if (!confirm("Reset all local checklist/earnest/date overrides for this deal?")) return;
          delete dtOverrides[id];
          dtSaveOverrides();
          render();
        });
      }
      var fubBtns = root.querySelectorAll('[data-amd-dt-fub]');
      for (var f = 0; f < fubBtns.length; f++) {
        fubBtns[f].addEventListener('click', function () {
          window.open('https://allstargrouprealestate.followupboss.com/', '_blank');
        });
      }
    }

    var _tipState = { dot: null, origR: null };

    function initChartTooltips() {
      var existing = root.querySelector('.amd-chart-tip');
      if (existing) existing.remove();

      var tip = document.createElement('div');
      tip.className = 'amd-chart-tip';
      root.style.position = 'relative';
      root.appendChild(tip);
      root._tip = tip;

      if (root._tipBound) return;
      root._tipBound = true;

      root.addEventListener('mouseover', function (evt) {
        var t = evt.target;
        if (!(t.classList && t.classList.contains('amd-hit-dot'))) return;
        dismissTip();
        var visId = t.getAttribute('data-vis-dot');
        var visDot = visId ? root.querySelector('#' + visId) : null;
        if (visDot) {
          _tipState.origR = visDot.getAttribute('r') || '4.5';
          visDot.setAttribute('r', String(parseFloat(_tipState.origR) * 1.8));
          _tipState.dot = visDot;
        }
        showChartTip(t, evt);
      });

      root.addEventListener('mouseout', function (evt) {
        var t = evt.target;
        if (!(t.classList && t.classList.contains('amd-hit-dot'))) return;
        dismissTip();
      });
    }

    function showChartTip(circle, evt) {
      var tip = root._tip;
      if (!tip) return;
      var type = circle.getAttribute('data-tip-type');
      var year = circle.getAttribute('data-tip-year');
      var volume = Number(circle.getAttribute('data-tip-volume')) || 0;
      var deals = Number(circle.getAttribute('data-tip-deals')) || 0;
      var color = circle.getAttribute('data-tip-color') || '#222';
      var quarter = circle.getAttribute('data-tip-quarter') || '';
      var title;
      var rows;
      if (type === 'yearly') {
        title = year + ' Total';
        rows =
          '<div class="tip-row"><span class="tip-label">Volume</span><span class="tip-value">' + fmtMoney(volume) + '</span></div>' +
          '<div class="tip-row"><span class="tip-label">Deals</span><span class="tip-value">' + deals + '</span></div>';
      } else if (type === 'agent') {
        var agent = circle.getAttribute('data-tip-agent') || 'Agent';
        var rate = Number(circle.getAttribute('data-tip-rate')) || 0;
        var avg = Number(circle.getAttribute('data-tip-avg')) || 0;
        title = agent;
        rows =
          '<div class="tip-row"><span class="tip-label">Volume</span><span class="tip-value">' + fmtMoney(volume) + '</span></div>' +
          '<div class="tip-row"><span class="tip-label">Deals</span><span class="tip-value">' + deals + '</span></div>' +
          '<div class="tip-row"><span class="tip-label">Avg Deal</span><span class="tip-value">' + fmtMoney(avg) + '</span></div>' +
          '<div class="tip-row"><span class="tip-label">Close Rate</span><span class="tip-value">' + rate + '%</span></div>';
      } else {
        title = quarter + ' ' + year;
        rows =
          '<div class="tip-row"><span class="tip-label">Volume</span><span class="tip-value">' + fmtMoney(volume) + '</span></div>' +
          '<div class="tip-row"><span class="tip-label">Deals</span><span class="tip-value">' + deals + '</span></div>';
      }

      tip.innerHTML =
        '<div class="tip-title" style="color:#111">' + esc(title) + '</div>' + rows;

      var rootRect = root.getBoundingClientRect();
      var cx = evt.clientX - rootRect.left;
      var cy = evt.clientY - rootRect.top;
      var tipW = tip.offsetWidth || 180;
      var tipH = tip.offsetHeight || 60;
      var left = cx - tipW / 2;
      var top = cy - tipH - 14;
      if (left < 4) left = 4;
      if (left + tipW > rootRect.width - 4) left = rootRect.width - tipW - 4;
      if (top < 4) top = cy + 18;
      tip.style.left = left + 'px';
      tip.style.top = top + 'px';
      tip.classList.add('is-visible');
    }

    function dismissTip() {
      var tip = root._tip;
      if (tip) tip.classList.remove('is-visible');
      if (_tipState.dot) {
        try { _tipState.dot.setAttribute('r', _tipState.origR || '4.5'); } catch (e) {}
        _tipState.dot = null;
        _tipState.origR = null;
      }
    }

    function setLoading() {
      root.innerHTML = '<div class="amd-loading">Loading live deals from sheets...</div>';
    }

    function setError(err) {
      root.innerHTML = '<div class="amd-error">Unable to load dashboard data. Please confirm your published sheet links are accessible.<br><small>' + esc(err && err.message ? err.message : "Unknown error") + "</small></div>";
    }

    function fetchJSON(url) {
      return fetch(url, { cache: "no-store" }).then(function (r) {
        if (!r.ok) throw new Error("Request failed (" + r.status + ")");
        return r.json();
      });
    }

    function withTimeout(promise, ms, label) {
      var timeoutMs = Number(ms) > 0 ? Number(ms) : REQUEST_TIMEOUT_MS;
      var tag = label || "Request";
      return new Promise(function (resolve, reject) {
        var settled = false;
        var timer = setTimeout(function () {
          if (settled) return;
          settled = true;
          reject(new Error(tag + " timed out after " + timeoutMs + "ms"));
        }, timeoutMs);
        promise.then(
          function (value) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            resolve(value);
          },
          function (err) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            reject(err);
          }
        );
      });
    }

    function load() {
      setLoading();
      var allTimeRowsPromise = withTimeout(
        fetchAllTimeClosedRowsFromScript(),
        ALL_TIME_ROWS_TIMEOUT_MS,
        "All-time closed rows feed"
      ).catch(function () {
        return [];
      });

      Promise.allSettled([
        withTimeout(fetchJSON(STATS_API + "?view=pipeline"), REQUEST_TIMEOUT_MS, "Pipeline feed"),
        withTimeout(fetchJSON(STATS_API + "?period=ytd2026"), REQUEST_TIMEOUT_MS, "YTD summary feed"),
        withTimeout(fetchJSON(STATS_API + "?period=allTime"), REQUEST_TIMEOUT_MS, "All-time summary feed"),
        withTimeout(fetchJSON(HUB_DATA_API + "?view=directory"), REQUEST_TIMEOUT_MS, "Directory feed")
      ])
        .then(function (results) {
          var pipelineJSON = results[0].status === "fulfilled" ? results[0].value : null;
          var ytdJSON = results[1].status === "fulfilled" ? results[1].value : null;
          var allTimeJSON = results[2].status === "fulfilled" ? results[2].value : null;
          var directoryJSON = results[3].status === "fulfilled" ? results[3].value : null;

          if (
            pipelineJSON &&
            pipelineJSON.success &&
            Array.isArray(pipelineJSON.ytdPending) &&
            Array.isArray(pipelineJSON.ytdClosed)
          ) {
            state.ytdPendingDeals = pipelineJSON.ytdPending.map(function (r) {
              return mapPipelineRow(r, "Pending");
            });
            state.ytdClosedDeals = pipelineJSON.ytdClosed.map(function (r) {
              return mapPipelineRow(r, "Closed");
            });
            state.deals = state.ytdPendingDeals.concat(state.ytdClosedDeals).filter(function (d) {
              return d.agent && d.agent !== "—" && d.address && d.address !== "—";
            });
          } else {
            throw new Error("Pipeline feed unavailable (YTD Pending / YTD Closed).");
          }

          state.statsAgentsYtd = ytdJSON && Array.isArray(ytdJSON.agents) ? ytdJSON.agents : [];
          state.statsAgentsAllTime = allTimeJSON && Array.isArray(allTimeJSON.agents) ? allTimeJSON.agents : [];
          state.allTimeClosedDeals = extractAllTimeClosedDeals(allTimeJSON);
          state.directoryRows = extractDirectoryRows(directoryJSON);
          state.ytdSummary = ytdJSON && ytdJSON.summary ? ytdJSON.summary : null;
          state.allTimeSummary = allTimeJSON && allTimeJSON.summary ? allTimeJSON.summary : null;
          state.loadedAt = new Date();
          try { render(); } catch (e) { console.error("render:", e); setError(e); }

          allTimeRowsPromise.then(function (allTimeRowsFromScript) {
            if (!Array.isArray(allTimeRowsFromScript) || !allTimeRowsFromScript.length) return;
            state.allTimeClosedDeals = allTimeRowsFromScript;
            state.loadedAt = new Date();
            try { render(); } catch (e) { console.error("render:", e); setError(e); }
          });
        })
        .catch(setError);
    }

    load();
  })();
</script>
