<div id="asg-team-directory"></div>

<style>
  #asg-team-directory{
    --card:#ffffff;
    --text:#111111;
    --muted:rgba(17,17,17,.62);
    --line:rgba(17,17,17,.08);
    --pill:#f2f2f0;
    --shadow:0 14px 34px rgba(0,0,0,.06);
    --green-bg:#eaf6ee;
    --green-text:#256844;
    --green-line:#cfe8d8;
    --red-bg:#fbeceb;
    --red-text:#a33d34;
    --red-line:#f0c9c5;
    --purple-bg:#f1ebff;
    --purple-text:#6b46c1;
    --purple-line:#ddd0ff;
    font-family:"Satoshi","Outfit","Poppins",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    width:100%;
    margin:0 auto;
  }

  #asg-team-directory *{
    box-sizing:border-box;
  }

  .asg-dir-shell{
    width:min(100%, 1600px);
    margin:0 auto;
    padding:24px 0 12px;
  }

  .asg-stats{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:18px;
    margin-bottom:22px;
  }

  .asg-stat{
    appearance:none;
    width:100%;
    text-align:left;
    background:#fff;
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:22px 24px;
    cursor:pointer;
    transition:.18s ease;
  }

  .asg-stat:hover{
    transform:translateY(-1px);
    border-color:rgba(17,17,17,.14);
  }

  .asg-stat.is-active{
    border-color:#111;
    box-shadow:0 16px 36px rgba(0,0,0,.1);
  }

  .asg-stat-label{
    font-size:.9rem;
    color:var(--muted);
    margin-bottom:8px;
  }

  .asg-stat-value{
    font-size:2rem;
    line-height:1;
    font-weight:800;
    letter-spacing:-.04em;
    margin-bottom:8px;
  }

  .asg-stat-hint{
    font-size:.82rem;
    color:var(--muted);
  }

  .asg-dir-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:20px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }

  .asg-dir-controls{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
    width:100%;
    justify-content:space-between;
  }

  .asg-dir-controls-left,
  .asg-dir-controls-right{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }

.asg-search-label{
  font-size:1.08rem;
  font-weight:800;
  color:var(--text);
}

  .asg-dir-search{
    min-width:420px;
    height:52px;
    border:1px solid var(--line);
    border-radius:999px;
    padding:0 18px;
    background:#fff;
    font-size:1rem;
    color:var(--text);
    outline:none;
    box-shadow:none;
  }

  .asg-dir-search:focus{
    border-color:rgba(17,17,17,.18);
  }

  .asg-dir-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .asg-pill,
  .asg-toggle{
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--text);
    border-radius:999px;
    padding:11px 16px;
    font-size:.95rem;
    font-weight:600;
    line-height:1;
    cursor:pointer;
    transition:.18s ease;
    text-decoration:none;
  }

  .asg-pill.is-active,
  .asg-toggle.is-active{
    background:var(--text);
    color:#fff;
    border-color:var(--text);
  }

  .asg-dir-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:24px;
  }

  .asg-dir-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:24px;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .asg-dir-card-top{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
    min-width:0;
  }

  .asg-dir-photo{
    width:72px;
    height:72px;
    min-width:72px;
    border-radius:999px;
    object-fit:cover;
    object-position:center;
    border:1px solid var(--line);
    background:#ecece8;
  }

  .asg-dir-photo.is-placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1rem;
    font-weight:700;
    color:#555;
    background:#efefec;
  }

  .asg-dir-meta{
    min-width:0;
    flex:1 1 auto;
  }

  .asg-dir-meta h3{
    margin:0;
    font-size:1.22rem;
    line-height:1.05;
    letter-spacing:-.02em;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .asg-dir-sub{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .asg-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    border-radius:999px;
    padding:6px 10px;
    font-size:.8rem;
    font-weight:700;
    line-height:1;
    border:1px solid var(--line);
    background:var(--pill);
    color:var(--text);
  }

  .asg-badge.is-senior{
    background:#111;
    color:#fff;
    border-color:#111;
  }

  .asg-badge.is-junior{
    background:#eaf2ff;
    color:#2157a6;
    border-color:#cfe0ff;
  }

  .asg-badge.is-admin{
    background:#f4efe2;
    color:#7c5b11;
    border-color:#e7d7ab;
  }

  .asg-badge.is-active{
    background:#fff;
    color:var(--text);
  }

  .asg-badge.is-marketing{
    background:var(--green-bg);
    color:var(--green-text);
    border-color:var(--green-line);
  }

  .asg-badge.is-sales{
    background:var(--red-bg);
    color:var(--red-text);
    border-color:var(--red-line);
  }

  .asg-badge.is-ops{
    background:var(--purple-bg);
    color:var(--purple-text);
    border-color:var(--purple-line);
  }

  .asg-dir-info{
    display:grid;
    gap:10px;
    margin-bottom:18px;
  }

  .asg-dir-line{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:10px 0;
    border-top:1px solid rgba(17,17,17,.06);
  }

  .asg-dir-line:first-child{
    border-top:0;
    padding-top:0;
  }

  .asg-dir-label{
    color:var(--muted);
    font-size:.9rem;
    line-height:1.2;
    flex:0 0 auto;
  }

  .asg-dir-value{
    color:var(--text);
    font-size:.95rem;
    font-weight:600;
    line-height:1.2;
    text-align:right;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .asg-dir-value a{
    color:inherit;
    text-decoration:none;
  }

  .asg-dir-value a:hover{
    text-decoration:underline;
  }

  .asg-fub-wrap{
    display:inline-flex;
    align-items:center;
    gap:8px;
    justify-content:flex-end;
    width:100%;
  }

  .asg-fub-icon{
    width:18px;
    height:18px;
    border-radius:4px;
    object-fit:contain;
    flex:0 0 auto;
  }

  .asg-dir-actions{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:auto;
  }

  .asg-dir-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    padding:12px 14px;
    border-radius:999px;
    text-decoration:none;
    font-size:.94rem;
    font-weight:700;
    line-height:1;
    transition:.18s ease;
    border:1px solid var(--line);
    white-space:nowrap;
  }

  .asg-dir-btn:hover{
    transform:translateY(-1px);
    opacity:.96;
  }

  .asg-dir-btn.primary{
    background:#111;
    color:#fff;
    border-color:#111;
  }

  .asg-dir-btn.secondary{
    background:#f4f4f2;
    color:#111;
  }

  .asg-dir-btn[aria-disabled="true"]{
    opacity:.45;
    pointer-events:none;
  }

  .asg-dir-empty{
    display:none;
    border:1px solid var(--line);
    border-radius:24px;
    background:#fff;
    padding:28px;
    box-shadow:var(--shadow);
    color:var(--muted);
    font-size:1rem;
    font-weight:600;
  }

  .asg-toggle-wrap{
    display:flex;
    justify-content:center;
    margin-top:24px;
  }

  @media (max-width:1280px){
    .asg-stats{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .asg-dir-grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
  }

  @media (max-width:900px){
    .asg-dir-shell{
      padding-top:12px;
    }

    .asg-stats{
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .asg-stat{
      padding:18px;
      border-radius:20px;
    }

    .asg-stat-value{
      font-size:1.6rem;
    }

    .asg-dir-controls{
      align-items:stretch;
    }

    .asg-dir-controls-left,
    .asg-dir-controls-right{
      width:100%;
    }

    .asg-dir-search{
      width:100%;
      min-width:0;
    }

    .asg-dir-grid{
      grid-template-columns:1fr;
      gap:18px;
    }

    .asg-dir-card{
      border-radius:22px;
      padding:18px;
    }

    .asg-dir-photo{
      width:56px;
      height:56px;
      min-width:56px;
    }

    .asg-dir-meta h3{
      font-size:1.08rem;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
    }

    .asg-dir-actions{
      grid-template-columns:1fr 1fr;
    }
  }

  @media (max-width:640px){
    .asg-stats{
      grid-template-columns:1fr;
    }

    .asg-dir-actions{
      grid-template-columns:1fr;
    }

    .asg-dir-line{
      flex-direction:column;
      align-items:flex-start;
      gap:4px;
    }

    .asg-dir-value{
      text-align:left;
      white-space:normal;
      overflow:visible;
    }

    .asg-fub-wrap{
      justify-content:flex-start;
    }
  }
</style>

    { name:"Ellyn Andree", tier:"Admin", status:"Active", role:"Sales Director", email:"ellyn.andree@compass.com", phone:"630-746-9034", fubPhone:"", photo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/9c93bf58-4b7f-467e-8207-cec97c2737c8/DSC00108-Enhanced-NR.jpg?format=2500w", department:"Sales", hours:"9:00 AM - 5:00 PM Mon-Fri", method:"Email", landing:"#", request:"#"},
{ name:"Seph Gagon", tier:"Admin", status:"Active", role:"Transaction Coordinator", email:"seph.gagon@compass.com", phone:"628-600-6137", fubPhone:"", photo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/00b0a8c1-8d90-4c96-9f10-dcd89077c2ae/Seph+Gagon-2.jpg?format=2500w", department:"Ops", hours:"9:00 AM - 5:00 PM Mon-Fri", method:"Email", landing:"#", request:"#"},
{ name:"Ian Drummond", tier:"Admin", status:"Active", role:"Inside Sales Rep ISR", email:"ian.drummond@compass.com", phone:"815-351-0590", fubPhone:"", photo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/cbd3eba2-9fa5-4748-8587-3d806ff27d64/Ian+-+Favorite.jpg?format=2500w", department:"Sales", hours:"9:00 AM - 5:00 PM Mon-Fri", method:"Email", landing:"#", request:"#"},
{ name:"Tim Urmanczy", tier:"Admin", status:"Active", role:"Marketing Director", email:"tim.urmanczy@compass.com", phone:"949-652-0526", fubPhone:"", photo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/0aa4fbce-f39d-4aaf-ad98-77bd0574b747/Tim+Headshot.jpg?format=2500w", department:"Marketing", hours:"7:00 AM - 3:00 PM Mon-Fri", method:"Email", landing:"#", request:"#"},
{ name:"Ellie Ngassa", tier:"Admin", status:"Active", role:"Marketing Coordinator", email:"ellie.ngassa@compass.com", phone:"517-648-0654", fubPhone:"", photo:"https://images.squarespace-cdn.com/content/v1/645525ddf33bc2091db5603a/ac0b5781-e113-4b03-8bd7-6d9425c9dbd3/DSC07726.jpg?format=2500w", department:"Marketing", hours:"9:00 AM - 5:00 PM Mon-Fri", method:"Email", landing:"#", request:"#"}
  ];

  const root = document.getElementById("asg-team-directory");

  const totals = {
    seniors: team.filter(p => p.tier === "Senior").length,
    juniors: team.filter(p => p.tier === "Junior").length,
    admin: team.filter(p => p.tier === "Admin").length,
    agents: team.filter(p => p.tier === "Senior" || p.tier === "Junior").length
  };

  root.innerHTML = `
    <section class="asg-dir-shell">
      <div class="asg-stats">
        <button class="asg-stat is-active" type="button" data-filter="all">
          <div class="asg-stat-label">Total Agents</div>
          <div class="asg-stat-value">${totals.agents}</div>
          <div class="asg-stat-hint">Click to view all agents</div>
        </button>
        <button class="asg-stat" type="button" data-filter="senior">
          <div class="asg-stat-label">Total Seniors</div>
          <div class="asg-stat-value">${totals.seniors}</div>
          <div class="asg-stat-hint">Click to view seniors</div>
        </button>
        <button class="asg-stat" type="button" data-filter="junior">
          <div class="asg-stat-label">Total Juniors</div>
          <div class="asg-stat-value">${totals.juniors}</div>
          <div class="asg-stat-hint">Click to view juniors</div>
        </button>
        <button class="asg-stat" type="button" data-filter="admin">
          <div class="asg-stat-label">Total Admin</div>
          <div class="asg-stat-value">${totals.admin}</div>
          <div class="asg-stat-hint">Click to view admin</div>
        </button>
      </div>

      <div class="asg-dir-top">
        <div class="asg-dir-controls">
          <div class="asg-dir-controls-left">
            <span class="asg-search-label">Search</span>
            <input class="asg-dir-search" type="text" placeholder="Search by name, email, phone..." aria-label="Search team directory">
          </div>

          <div class="asg-dir-controls-right">
            <div class="asg-dir-pills">
              <button class="asg-pill" data-filter="all">All</button>
              <button class="asg-pill is-active" data-filter="senior">Senior</button>
              <button class="asg-pill" data-filter="junior">Junior</button>
              <button class="asg-pill" data-filter="admin">Admin</button>
            </div>
          </div>
        </div>
      </div>

      <div class="asg-dir-empty">No matching team members found.</div>
      <div class="asg-dir-grid"></div>
      <div class="asg-toggle-wrap">
        <button class="asg-toggle" type="button">Show Juniors</button>
      </div>
    </section>
  `;

  const grid = root.querySelector(".asg-dir-grid");
  const empty = root.querySelector(".asg-dir-empty");
  const search = root.querySelector(".asg-dir-search");
  const pills = Array.from(root.querySelectorAll(".asg-pill"));
  const stats = Array.from(root.querySelectorAll(".asg-stat"));
  const toggle = root.querySelector(".asg-toggle");
  const toggleWrap = root.querySelector(".asg-toggle-wrap");

  let activeFilter = "senior";
  let juniorsExpanded = false;

  function escapeHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function telClean(str){
    return String(str || "").replace(/[^\d+]/g,"");
  }

  function badgeClass(tier){
    if(tier === "Junior") return "asg-badge is-junior";
    if(tier === "Admin") return "asg-badge is-admin";
    return "asg-badge is-senior";
  }

  function deptBadgeClass(dept){
    if(dept === "Marketing") return "asg-badge is-marketing";
    if(dept === "Sales") return "asg-badge is-sales";
    if(dept === "Ops") return "asg-badge is-ops";
    return "";
  }

  function initials(name){
    return String(name || "")
      .split(" ")
      .filter(Boolean)
      .slice(0,2)
      .map(part => part[0])
      .join("")
      .toUpperCase();
  }

  function photoMarkup(person){
    if(person.photo){
      return `<img class="asg-dir-photo" src="${escapeHtml(person.photo)}" alt="${escapeHtml(person.name)}">`;
    }
    return `<div class="asg-dir-photo is-placeholder" aria-label="${escapeHtml(person.name)}">${escapeHtml(initials(person.name))}</div>`;
  }

  function visibleSetForDefault(){
    if(activeFilter === "senior"){
      return team.filter(p => p.tier === "Senior" || (juniorsExpanded && p.tier === "Junior"));
    }
    if(activeFilter === "junior") return team.filter(p => p.tier === "Junior");
    if(activeFilter === "admin") return team.filter(p => p.tier === "Admin");
    return team.filter(p => p.tier === "Senior" || p.tier === "Junior" || p.tier === "Admin");
  }

  function syncActiveStates(){
    pills.forEach(p => p.classList.toggle("is-active", p.dataset.filter === activeFilter));
    stats.forEach(s => s.classList.toggle("is-active", s.dataset.filter === activeFilter));
  }

  function render(){
    const q = search.value.trim().toLowerCase();
    let filtered;

    if(q){
      filtered = team.filter(person => {
        const haystack = [
          person.name,
          person.email,
          person.phone,
          person.fubPhone,
          person.role,
          person.status,
          person.tier,
          person.department,
          person.hours,
          person.method
        ].join(" ").toLowerCase();
        return haystack.includes(q);
      });
    } else {
      filtered = visibleSetForDefault();
    }

    syncActiveStates();

    const showToggle = !q && activeFilter === "senior";
    toggleWrap.style.display = showToggle ? "flex" : "none";
    toggle.textContent = juniorsExpanded ? "Hide Juniors" : "Show Juniors";
    toggle.classList.toggle("is-active", juniorsExpanded);

    grid.innerHTML = filtered.map(person => {
      const isAdmin = person.tier === "Admin";

      return `
      <article class="asg-dir-card">
        <div class="asg-dir-card-top">
          ${photoMarkup(person)}
          <div class="asg-dir-meta">
            <h3>${escapeHtml(person.name)}</h3>
            <div class="asg-dir-sub">
              <span class="${badgeClass(person.tier)}">${escapeHtml(person.tier)}</span>
              <span class="asg-badge is-active">${escapeHtml(person.status)}</span>
              ${isAdmin && person.department ? `<span class="${deptBadgeClass(person.department)}">${escapeHtml(person.department)}</span>` : ``}
            </div>
          </div>
        </div>

        <div class="asg-dir-info">
          <div class="asg-dir-line">
            <div class="asg-dir-label">Role</div>
            <div class="asg-dir-value">${escapeHtml(person.role)}</div>
          </div>

          ${person.email ? `
          <div class="asg-dir-line">
            <div class="asg-dir-label">Email</div>
            <div class="asg-dir-value"><a href="mailto:${escapeHtml(person.email)}">${escapeHtml(person.email)}</a></div>
          </div>` : ``}

          ${person.phone ? `
          <div class="asg-dir-line">
            <div class="asg-dir-label">Phone</div>
            <div class="asg-dir-value"><a href="tel:${escapeHtml(telClean(person.phone))}">${escapeHtml(person.phone)}</a></div>
          </div>` : ``}

          ${!isAdmin && person.fubPhone ? `
          <div class="asg-dir-line">
            <div class="asg-dir-label">FUB</div>
            <div class="asg-dir-value">
              <a class="asg-fub-wrap" href="tel:${escapeHtml(telClean(person.fubPhone))}">
                <img class="asg-fub-icon" src="${escapeHtml(FUB_ICON)}" alt="Follow Up Boss">
                <span>${escapeHtml(person.fubPhone)}</span>
              </a>
            </div>
          </div>` : ``}

          ${isAdmin && person.hours ? `
          <div class="asg-dir-line">
            <div class="asg-dir-label">Hours</div>
            <div class="asg-dir-value">${escapeHtml(person.hours)}</div>
          </div>` : ``}

          ${isAdmin && person.method ? `
          <div class="asg-dir-line">
            <div class="asg-dir-label">Best Contact</div>
            <div class="asg-dir-value">${escapeHtml(person.method)}</div>
          </div>` : ``}
        </div>

        <div class="asg-dir-actions">
          ${isAdmin ? `
            <a class="asg-dir-btn secondary" href="${person.email ? `mailto:${escapeHtml(person.email)}` : '#'}" ${person.email ? '' : 'onclick="return false;" aria-disabled="true"'}>Email</a>
            <a class="asg-dir-btn secondary" href="${person.phone ? `tel:${escapeHtml(telClean(person.phone))}` : '#'}" ${person.phone ? '' : 'onclick="return false;" aria-disabled="true"'}>Call</a>
          ` : `
            <a class="asg-dir-btn primary" href="${escapeHtml(person.landing)}" ${person.landing === "#" ? 'onclick="return false;" aria-disabled="true"' : 'target="_blank" rel="noopener"'}>Landing Page</a>
            <a class="asg-dir-btn secondary" href="${escapeHtml(person.request)}" ${person.request === "#" ? 'onclick="return false;" aria-disabled="true"' : 'target="_blank" rel="noopener"'}>Seller Form</a>
            <a class="asg-dir-btn secondary" href="${person.email ? `mailto:${escapeHtml(person.email)}` : '#'}" ${person.email ? '' : 'onclick="return false;" aria-disabled="true"'}>Email</a>
            <a class="asg-dir-btn secondary" href="${person.phone ? `tel:${escapeHtml(telClean(person.phone))}` : '#'}" ${person.phone ? '' : 'onclick="return false;" aria-disabled="true"'}>Call</a>
          `}
        </div>
      </article>`;
    }).join("");

    empty.style.display = filtered.length ? "none" : "block";
  }

  function setFilter(filter){
    activeFilter = filter;
    if(activeFilter !== "senior") juniorsExpanded = false;
    render();
  }

  search.addEventListener("input", render);

  toggle.addEventListener("click", function(){
    juniorsExpanded = !juniorsExpanded;
    render();
  });

  pills.forEach(btn => {
    btn.addEventListener("click", function(){
      setFilter(btn.dataset.filter);
    });
  });

  stats.forEach(card => {
    card.addEventListener("click", function(){
      setFilter(card.dataset.filter);
    });
  });

  render();
})();
</script>
